<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Data Lab</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
/* ── Tokens ───────────────────────────────────────────────────────────────── */
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface-2:#242736;--border:#2e3148;
  --text:#e8eaf0;--text-2:#8b90a7;--text-3:#555b75;
  --accent:#4f7cff;--accent-dim:rgba(79,124,255,.12);--accent-text:#fff;
  --danger:#ff5f5f;--success:#3ecf8e;--warn:#f5a623;
  --numeric:#4f7cff;--categorical:#a78bfa;
  --sidebar-w:220px;--radius:3px;--trans:160ms ease;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Cascadia Code',Consolas,monospace;
}
[data-theme="light"]{
  --bg:#f4f4f6;--surface:#fff;--surface-2:#ececf0;--border:#d8d8e0;
  --text:#111827;--text-2:#6b7280;--text-3:#9ca3af;
  --accent:#2563eb;--accent-dim:rgba(37,99,235,.1);--accent-text:#fff;
  --danger:#dc2626;--success:#16a34a;--warn:#d97706;
  --numeric:#2563eb;--categorical:#7c3aed;
}
[data-theme="nord"]{
  --bg:#2e3440;--surface:#3b4252;--surface-2:#434c5e;--border:#4c566a;
  --text:#eceff4;--text-2:#d8dee9;--text-3:#a0a8bb;
  --accent:#88c0d0;--accent-dim:rgba(136,192,208,.13);--accent-text:#2e3440;
  --danger:#bf616a;--success:#a3be8c;--warn:#ebcb8b;
  --numeric:#81a1c1;--categorical:#b48ead;
}
[data-theme="solarized"]{
  --bg:#002b36;--surface:#073642;--surface-2:#0d4a59;--border:#1a5f70;
  --text:#eee8d5;--text-2:#93a1a1;--text-3:#657b83;
  --accent:#2aa198;--accent-dim:rgba(42,161,152,.13);--accent-text:#002b36;
  --danger:#dc322f;--success:#859900;--warn:#b58900;
  --numeric:#268bd2;--categorical:#6c71c4;
}

/* ── Reset ────────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:13px;line-height:1.5;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit;background:none;border:none;outline:none}
a{color:inherit;text-decoration:none}

/* ── App shell ────────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;transition:grid-template-columns var(--trans)}
.app.collapsed{grid-template-columns:48px 1fr}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
.sidebar{display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);overflow:hidden;position:relative;z-index:10;transition:width var(--trans)}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.brand-icon{color:var(--accent);flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-.02em}
.sidebar-toggle{position:absolute;right:-10px;top:22px;width:20px;height:20px;background:var(--surface-2);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-2);z-index:20;transition:background var(--trans),color var(--trans),border-color var(--trans)}
.sidebar-toggle:hover{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.sidebar-toggle svg{transition:transform var(--trans)}
.app.collapsed .sidebar-toggle svg{transform:rotate(180deg)}
.sidebar-nav{flex:1;display:flex;flex-direction:column;padding:8px 6px;gap:2px;overflow-y:auto;overflow-x:hidden}
.sidebar-footer{border-top:1px solid var(--border);padding:8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);color:var(--text-2);white-space:nowrap;transition:background var(--trans),color var(--trans);width:100%;text-align:left}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-icon{flex-shrink:0;width:16px;height:16px}
.nav-label{font-size:13px;font-weight:450}

/* ── Main ─────────────────────────────────────────────────────────────────── */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg)}
.page{flex:1;overflow-y:auto;padding:24px;display:none}
.page.active{display:block}

/* ── Buttons ──────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;transition:background var(--trans),color var(--trans),filter var(--trans);border:1px solid transparent;white-space:nowrap;cursor:pointer}
.btn-primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.btn-primary:hover{filter:brightness(1.12)}
.btn-ghost{background:transparent;color:var(--text-2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-danger-ghost{background:transparent;color:var(--danger);border-color:transparent}
.btn-danger-ghost:hover{background:rgba(255,95,95,.1)}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-icon{padding:4px;border-radius:var(--radius);color:var(--text-3);transition:color var(--trans),background var(--trans)}
.btn-icon:hover{color:var(--danger);background:rgba(255,95,95,.1)}

/* ── Cards ────────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-2);margin-bottom:12px}

/* ── Badges ───────────────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 6px;border-radius:var(--radius);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.badge-num{background:rgba(79,124,255,.15);color:var(--numeric)}
.badge-cat{background:rgba(167,139,250,.15);color:var(--categorical)}
.badge-cube{background:rgba(62,207,142,.15);color:var(--success)}
.badge-flat{background:var(--surface-2);color:var(--text-2)}
[data-theme="light"] .badge-num{background:rgba(37,99,235,.12)}
[data-theme="light"] .badge-cat{background:rgba(124,58,237,.12)}
[data-theme="nord"] .badge-num{background:rgba(129,161,193,.15)}
[data-theme="nord"] .badge-cat{background:rgba(180,142,173,.15)}
[data-theme="solarized"] .badge-num{background:rgba(38,139,210,.15)}
[data-theme="solarized"] .badge-cat{background:rgba(108,113,196,.15)}

/* ── Section head ─────────────────────────────────────────────────────────── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-2)}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── Dataset header ───────────────────────────────────────────────────────── */
.dataset-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:20px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);flex-wrap:wrap}
.dataset-title{font-size:18px;font-weight:700;letter-spacing:-.03em;margin-bottom:3px}
.dataset-sub{font-size:11px;color:var(--text-2)}
.dataset-meta{display:flex;gap:20px;flex-wrap:wrap;margin-top:2px}
.meta-item{display:flex;flex-direction:column;gap:1px}
.meta-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em}
.meta-value{font-size:20px;font-weight:600;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.meta-value-sm{font-size:13px;font-weight:500}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── Type legend ──────────────────────────────────────────────────────────── */
.type-legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.type-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2)}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.type-dot.numeric{background:var(--numeric)}
.type-dot.categorical{background:var(--categorical)}
.type-dot.weight{background:var(--success)}

/* ── Quality grid ─────────────────────────────────────────────────────────── */
.quality-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:20px}
.quality-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.quality-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:4px}
.quality-col-name{font-size:11px;font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;cursor:pointer;transition:color var(--trans)}
.quality-col-name:hover{color:var(--accent)}
.quality-bar-track{height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden}
.quality-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.quality-footer{display:flex;justify-content:space-between;margin-top:4px}
.quality-pct{font-size:10px;color:var(--text-2)}

/* ── Data table ───────────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:7px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap}
.th-inner{display:flex;align-items:center;gap:5px}
.col-name-btn{color:var(--text);font-weight:550;font-size:11px;padding:0;transition:color var(--trans)}
.col-name-btn:hover{color:var(--accent)}
.col-del{opacity:0;padding:2px;border-radius:2px;color:var(--text-3);transition:opacity var(--trans),color var(--trans),background var(--trans);line-height:1;display:flex;align-items:center}
.data-table th:hover .col-del{opacity:1}
.col-del:hover{color:var(--danger);background:rgba(255,95,95,.12)}
.data-table td{padding:6px 12px;border-bottom:1px solid var(--border);color:var(--text);font-variant-numeric:tabular-nums}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface-2)}
.null-val{color:var(--text-3);font-style:italic;font-family:var(--mono)}
.num-val{color:var(--numeric);font-family:var(--mono)}

/* ── Drop overlay ─────────────────────────────────────────────────────────── */
.drop-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.drop-overlay.active{display:flex}
.drop-box{padding:32px 52px;border:2px dashed var(--accent);border-radius:var(--radius);font-size:15px;font-weight:600;color:var(--accent)}

/* ── Empty state ──────────────────────────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 24px;text-align:center;min-height:300px}
.empty-icon{color:var(--text-3)}
.empty-title{font-size:15px;font-weight:600}
.empty-sub{font-size:13px;color:var(--text-2);max-width:380px;line-height:1.6}
.empty-actions{display:flex;gap:8px;margin-top:8px}

/* ── Form ─────────────────────────────────────────────────────────────────── */
.form-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.form-row:last-child{border-bottom:none}
.form-label{font-size:12px;font-weight:500;color:var(--text-2);min-width:160px;flex-shrink:0}
.form-input{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;font-size:12px;color:var(--text);transition:border-color var(--trans);width:200px}
.form-input:focus{border-color:var(--accent);outline:none}
.form-select{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;font-size:12px;color:var(--text);cursor:pointer;width:200px}
.form-hint{font-size:11px;color:var(--text-3)}

/* ── Theme cards ──────────────────────────────────────────────────────────── */
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px}
.theme-card{border:2px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color var(--trans)}
.theme-card.selected{border-color:var(--accent)}
.theme-card:hover:not(.selected){border-color:var(--text-3)}
.theme-preview{height:44px;border-radius:2px;margin-bottom:8px;display:flex;gap:3px;padding:6px;overflow:hidden}
.theme-bar{border-radius:1px;flex:1}
.theme-name{font-size:11px;font-weight:600;color:var(--text)}
.theme-sub{font-size:10px;color:var(--text-2)}

/* ── Stats grid ───────────────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.stat-item{background:var(--surface-2);border-radius:var(--radius);padding:10px 12px}
.stat-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em}
.stat-value{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}

/* ── Column detail ────────────────────────────────────────────────────────── */
.col-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.col-detail-name{font-size:22px;font-weight:700;letter-spacing:-.03em}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2);padding:0;margin-bottom:16px;transition:color var(--trans)}
.back-btn:hover{color:var(--text)}

/* ── Chart container ──────────────────────────────────────────────────────── */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.chart-wrap .card-title{margin-bottom:8px}

/* ── Distribution grid ────────────────────────────────────────────────────── */
.dist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px}
.dist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.dist-item-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.dist-col-link{font-size:11px;font-weight:550;padding:0;transition:color var(--trans);color:var(--text)}
.dist-col-link:hover{color:var(--accent)}

/* ── Toggle group ─────────────────────────────────────────────────────────── */
.toggle-group{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.toggle-btn{padding:5px 10px;font-size:11px;font-weight:500;color:var(--text-2);transition:background var(--trans),color var(--trans)}
.toggle-btn.active{background:var(--accent);color:var(--accent-text)}
.toggle-btn:hover:not(.active){background:var(--surface);color:var(--text)}

/* ── Toast ────────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;z-index:1000;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── Scrollbar ────────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ── Placeholder pages ────────────────────────────────────────────────────── */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--text-3);text-align:center}
.coming-soon h2{font-size:15px;font-weight:600;color:var(--text-2)}
.coming-soon p{font-size:13px;max-width:360px}

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media(max-width:900px){.theme-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <svg class="brand-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="1" width="7" height="7" rx="1" fill="currentColor"/>
        <rect x="10" y="1" width="7" height="7" rx="1" fill="currentColor" opacity=".5"/>
        <rect x="1" y="10" width="7" height="7" rx="1" fill="currentColor" opacity=".5"/>
        <rect x="10" y="10" width="7" height="7" rx="1" fill="currentColor" opacity=".25"/>
      </svg>
      <span class="brand-name">Data Lab</span>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">

    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="overview">

          <rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="nav-label">Overview</span>
      </button>
      <button class="nav-item" data-page="explore">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none">
          <polyline points="1,12 5,7 8,9 12,3 15,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="1" y1="14.5" x2="15" y2="14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Explore</span>
      </button>
      <button class="nav-item" data-page="transform">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none">

          <line x1="4" y1="8" x2="12" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="7" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Transform</span>
      </button>
      <button class="nav-item" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <line x1="8" y1="10" x2="8" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="14" x2="11" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" data-page="settings">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-label">Settings</span>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main" id="main">
    <div class="drop-overlay" id="dropOverlay"><div class="drop-box">Drop CSV to load</div></div>
    <div class="page active" id="page-overview"></div>
    <div class="page" id="page-explore"></div>
    <div class="page" id="page-column-detail"></div>
    <div class="page" id="page-transform"></div>
    <div class="page" id="page-dashboard"></div>
    <div class="page" id="page-settings"></div>
  </div>
</div>

<input type="file" id="fileInput" accept=".csv" style="display:none"/>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════════
// EMBEDDED DATASET
// ════════════════════════════════════════════════════════════════════════════
const TITANIC_CSV = `survived,pclass,sex,age,sibsp,parch,fare,embarked,class,who,adult_male,deck,embark_town,alive,alone

const State = {
  data: null,
  columns: [],
  weightCol: null,
  isCubed: false,
  fileName: '',
  totalRows: 0,
  transforms: [],
  currentPage: 'overview',
  prevPage: null,

    theme: 'dark',
    weightColumnName: 'Number_of_rows',
    tableRows: 10,

    sampleSize: 5000,
    exportDelimiter: ',',
    exportPrefix: 'datalab',

};

// ════════════════════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════════════════════
const Storage = {
  KEY: 'datalab_v1',
  save() {
    try { localStorage.setItem(this.KEY, JSON.stringify({ settings: State.settings, dashboards: State.dashboards })); } catch(e) {}
  },
  load() {
    try {
      const s = JSON.parse(localStorage.getItem(this.KEY) || '{}');
      if (s.settings) Object.assign(State.settings, s.settings);
      if (s.dashboards) State.dashboards = s.dashboards;
    } catch(e) {}
  },
};

// ════════════════════════════════════════════════════════════════════════════
// DATA ENGINE
// ════════════════════════════════════════════════════════════════════════════
const DataEngine = {

  parseCSV(text, fileName) {
    const result = Papa.parse(text.trim(), { header: true, skipEmptyLines: true, dynamicTyping: false });
    if (!result.data || result.data.length === 0) return false;
    const raw = result.data;
    const headers = result.meta.fields || [];

    // Detect weight column
    const wName = State.settings.weightColumnName;
    const wCol = headers.includes(wName) ? wName : null;

    // Determine which columns look numeric (from sample)
    const numericFlag = {};
    for (const col of headers) {
      const sample = raw.slice(0, 300).filter(r => r[col] !== '' && r[col] != null);
      numericFlag[col] = sample.length > 0 && sample.every(r => r[col] !== '' && !isNaN(parseFloat(r[col])) && isFinite(r[col]));
    }

    // Parse rows
    const rows = raw.map(r => {
      const out = {};
      for (const col of headers) {
        const v = r[col];
        if (v === '' || v == null) { out[col] = null; continue; }
        out[col] = numericFlag[col] ? parseFloat(v) : String(v);
      }
      return out;
    });

    // Infer column metadata
    const columns = headers.map(col => this._analyzeColumn(rows, col, numericFlag[col], col === wCol));

    const totalRows = wCol
      ? rows.reduce((s, r) => s + (r[wCol] != null ? r[wCol] : 1), 0)
      : rows.length;

    State.data = rows;
    State.columns = columns;
    State.weightCol = wCol;
    State.isCubed = !!wCol;
    State.fileName = fileName || 'dataset';
    State.totalRows = totalRows;
    return true;
  },

  _analyzeColumn(rows, col, isNumericRaw, isWeight) {
    const nonNull = rows.filter(r => r[col] != null);
    const nullCount = rows.length - nonNull.length;
    const uniqueVals = new Set(nonNull.map(r => r[col]));
    const uniqueCount = uniqueVals.size;
    let type;
    if (isWeight) type = 'numeric';
    else if (isNumericRaw) type = uniqueCount > 10 ? 'numeric' : 'categorical';
    else type = 'categorical';
    return { name: col, type, nullCount, uniqueCount, isWeight: !!isWeight };
  },

  getWeight(row) {
    if (!State.weightCol) return 1;
    const w = row[State.weightCol];
    return (w != null && w > 0) ? w : 1;
  },

  totalWeight(rows) {
    return rows.reduce((s, r) => s + this.getWeight(r), 0);
  },

  weightedMean(rows, col) {
    const valid = rows.filter(r => r[col] != null);
    if (!valid.length) return null;
    const tw = this.totalWeight(valid);
    if (tw === 0) return null;
    return valid.reduce((s, r) => s + r[col] * this.getWeight(r), 0) / tw;
  },

  weightedVariance(rows, col) {
    const mean = this.weightedMean(rows, col);
    if (mean == null) return null;
    const valid = rows.filter(r => r[col] != null);
    const tw = this.totalWeight(valid);
    if (tw === 0) return null;
    return valid.reduce((s, r) => s + this.getWeight(r) * Math.pow(r[col] - mean, 2), 0) / tw;
  },

  weightedStd(rows, col) {
    const v = this.weightedVariance(rows, col);
    return v != null ? Math.sqrt(v) : null;
  },

  weightedQuantile(rows, col, q) {
    const valid = rows.filter(r => r[col] != null).sort((a, b) => a[col] - b[col]);
    if (!valid.length) return null;
    const tw = this.totalWeight(valid);
    const target = q * tw;
    let cum = 0;
    for (const r of valid) {
      cum += this.getWeight(r);
      if (cum >= target) return r[col];
    }
    return valid[valid.length - 1][col];
  },

  columnStats(rows, col) {
    const meta = State.columns.find(c => c.name === col);
    if (!meta) return null;
    const nonNull = rows.filter(r => r[col] != null);
    const nullPct = rows.length > 0 ? (meta.nullCount / rows.length * 100) : 0;

    if (meta.type === 'numeric') {
      const vals = nonNull.map(r => r[col]);
      return {
        type: 'numeric',
        count: nonNull.length,
        nullCount: meta.nullCount,
        nullPct,
        mean: this.weightedMean(rows, col),
        std: this.weightedStd(rows, col),
        min: vals.length ? Math.min(...vals) : null,
        max: vals.length ? Math.max(...vals) : null,
        q25: this.weightedQuantile(rows, col, 0.25),
        median: this.weightedQuantile(rows, col, 0.5),
        q75: this.weightedQuantile(rows, col, 0.75),
        uniqueCount: meta.uniqueCount,
      };
    } else {
      const tw = this.totalWeight(rows);
      const counts = {};
      for (const r of nonNull) {
        const v = String(r[col]);
        counts[v] = (counts[v] || 0) + this.getWeight(r);
      }
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      return {
        type: 'categorical',
        count: nonNull.length,
        nullCount: meta.nullCount,
        nullPct,
        uniqueCount: meta.uniqueCount,
        valueCounts: sorted,
        topValue: sorted[0]?.[0] ?? '—',
        topPct: sorted[0] && tw > 0 ? (sorted[0][1] / tw * 100) : 0,
      };
    }
  },

  weightedHistogram(rows, col, bins = 20) {
    const valid = rows.filter(r => r[col] != null);
    if (valid.length < 2) return null;
    const vals = valid.map(r => r[col]);
    let min = Math.min(...vals), max = Math.max(...vals);
    if (min === max) { min -= 0.5; max += 0.5; }
    const step = (max - min) / bins;
    const counts = new Array(bins).fill(0);
    const centers = [];
    for (let i = 0; i < bins; i++) centers.push(min + (i + 0.5) * step);
    for (const r of valid) {
      const i = Math.min(bins - 1, Math.floor((r[col] - min) / step));
      counts[i] += this.getWeight(r);
    }
    return { x: centers, counts, min, max, step };
  },

  pearsonR(rows, col1, col2) {
    const valid = rows.filter(r => r[col1] != null && r[col2] != null);
    if (valid.length < 3) return 0;
    const mx = this.weightedMean(valid, col1);
    const my = this.weightedMean(valid, col2);
    const tw = this.totalWeight(valid);
    let cov = 0, vx = 0, vy = 0;
    for (const r of valid) {
      const w = this.getWeight(r);
      const dx = r[col1] - mx, dy = r[col2] - my;
      cov += w * dx * dy; vx += w * dx * dx; vy += w * dy * dy;
    }
    cov /= tw; vx /= tw; vy /= tw;
    const d = Math.sqrt(vx * vy);
    return d === 0 ? 0 : Math.max(-1, Math.min(1, cov / d));
  },

  correlationMatrix(colNames) {
    const n = colNames.length;
    const m = Array.from({length: n}, () => new Array(n).fill(0));
    for (let i = 0; i < n; i++) {
      for (let j = i; j < n; j++) {
        const r = i === j ? 1 : this.pearsonR(State.data, colNames[i], colNames[j]);
        m[i][j] = r; m[j][i] = r;
      }
    }
    return m;
  },

  sampleRows(n) {
    if (!State.data) return [];
    const data = State.data;
    if (data.length <= n) return [...data];
    const used = new Set();
    const result = [];
    while (result.length < n) {
      const i = Math.floor(Math.random() * data.length);
      if (!used.has(i)) { used.add(i); result.push(data[i]); }
    }
    return result;
  },

  randomSampleRows(n) {
    return this.sampleRows(n);
  },
};

// FORMATTER
// ════════════════════════════════════════════════════════════════════════════
const Fmt = {
  number(v, dec = 2) {
    if (v == null || isNaN(v)) return '—';
    if (Math.abs(v) >= 1e9) return (v/1e9).toFixed(1)+'B';
    if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1)+'M';
    if (Math.abs(v) >= 1e3 && Number.isInteger(v)) return v.toLocaleString();
    if (Number.isInteger(v)) return v.toString();
    return parseFloat(v.toFixed(dec)).toLocaleString(undefined, {maximumFractionDigits: dec});
  },
  pct(v) { return v == null ? '—' : v.toFixed(1)+'%'; },
  cell(v, colName) {
    if (v == null) return '<span class="null-val">null</span>';
    const meta = State.columns.find(c => c.name === colName);
    if (meta?.type === 'numeric') return `<span class="num-val">${this.number(v)}</span>`;
    const s = String(v);
    return s.length > 40 ? s.slice(0,38)+'…' : s;
  },
  qualityColor(nullPct) {
    if (nullPct < 5)  return 'var(--success)';
    if (nullPct < 20) return 'var(--warn)';
    if (nullPct < 50) return '#f97316';
    return 'var(--danger)';
  },
};

// CHARTS
// ════════════════════════════════════════════════════════════════════════════
const Charts = {
  _css(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); },
  _layout(o = {}) {
    const border = this._css('--border');
    const text2  = this._css('--text-2');
    const font   = '-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif';
    const base = {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      font:{ family:font, size:11, color:this._css('--text') },
      margin:{ t:10, r:16, b:36, l:48 },
      xaxis:{ gridcolor:border, linecolor:border, zerolinecolor:border,
              tickfont:{ size:10, color:text2 }, titlefont:{ size:11, color:text2 } },
      yaxis:{ gridcolor:border, linecolor:border, zerolinecolor:border,
              tickfont:{ size:10, color:text2 }, titlefont:{ size:11, color:text2 } },
      showlegend:false,
    };
    return Object.assign(base, o);
  },
  _cfg(extra = {}) { return Object.assign({ displayModeBar:false, responsive:true }, extra); },

  histogram(id, rows, col, bins=20) {
    const h = DataEngine.weightedHistogram(rows, col, bins);
    if (!h) return;
    Plotly.newPlot(id, [{
      type:'bar', x:h.x, y:h.counts,
      marker:{ color:this._css('--accent'), opacity:.85 },
      hovertemplate:'%{y:,.0f}<extra></extra>',
    }], this._layout({ bargap:.05, height:220,
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, title:{text:col,font:{size:11}} },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, title:{text:'count',font:{size:11}} },
    }), this._cfg());
  },

  barH(id, labels, values, color, height) {
    color = color || this._css('--categorical');
    height = height || Math.max(160, labels.length * 22 + 60);
    Plotly.newPlot(id, [{
      type:'bar', orientation:'h',
      x:values, y:labels,
      marker:{ color, opacity:.85 },
      hovertemplate:'%{x:,.0f}<extra></extra>',
    }], this._layout({
      height, bargap:.2,
      margin:{ t:10, r:16, b:30, l:120 },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')} },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, automargin:true },
    }), this._cfg());
  },

  heatmap(id, matrix, cols) {
    const h = Math.max(300, cols.length * 30 + 100);
    Plotly.newPlot(id, [{
      type:'heatmap', z:matrix, x:cols, y:cols,
      colorscale:[ [0,'#ff5f5f'], [0.5,'rgba(100,100,120,0.15)'], [1, this._css('--accent')] ],
      zmid:0, zmin:-1, zmax:1,
      hovertemplate:'%{x} × %{y}: %{z:.2f}<extra></extra>',
      showscale:true,
      colorbar:{ thickness:10, len:.8, tickfont:{size:9,color:this._css('--text-2')} },
    }], this._layout({
      height:h,
      margin:{ t:10, r:60, b:100, l:100 },
      xaxis:{ tickangle:-40, gridcolor:this._css('--border'), linecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, automargin:true },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, automargin:true },
    }), this._cfg());
  },

  scatter(id, rows, xCol, yCol, colorCol, mode) {
    const accent = this._css('--accent');
    const valid = rows.filter(r => r[xCol] != null && r[yCol] != null);
    if (!valid.length) return;
    const xs = valid.map(r => r[xCol]);
    const ys = valid.map(r => r[yCol]);
    if (mode === 'density') {
      Plotly.newPlot(id, [{
        type:'histogram2d', x:xs, y:ys,
        colorscale:[ [0,'transparent'], [0.2,this._css('--accent-dim')], [1,accent] ],
        hovertemplate:'%{z} pts<extra></extra>',
        showscale:false,
      }], this._layout({
        height:320,
        xaxis:{ title:{text:xCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
        yaxis:{ title:{text:yCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
      }), this._cfg());
    } else {
      const colors = colorCol && valid[0]?.[colorCol] != null
        ? valid.map(r => r[colorCol]) : accent;
      const isCatColor = colorCol && State.columns.find(c=>c.name===colorCol)?.type==='categorical';
      Plotly.newPlot(id, [{
        type:'scattergl', mode:'markers',
        x:xs, y:ys,
        marker:{ size:4, opacity:.6,
          color: isCatColor ? undefined : colors,
          colorscale: isCatColor ? undefined : 'Viridis',
          showscale: (!isCatColor && colorCol) ? true : false,
          colorbar:{ thickness:8, len:.7, tickfont:{size:9,color:this._css('--text-2')} },
        },
        text: valid.map(r => colorCol ? `${colorCol}: ${r[colorCol]}` : ''),
        hovertemplate:`${xCol}: %{x}<br>${yCol}: %{y}${colorCol?'<br>%{text}':''}<extra></extra>`,
      }], this._layout({
        height:320,
        xaxis:{ title:{text:xCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
        yaxis:{ title:{text:yCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
      }), this._cfg());
    }
  },

  miniHist(id, rows, col) {
    const h = DataEngine.weightedHistogram(rows, col, 14);
    if (!h) return;
    Plotly.newPlot(id, [{
      type:'bar', x:h.x, y:h.counts,
      marker:{ color:this._css('--accent'), opacity:.8 },
    }], {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      margin:{ t:2, r:4, b:22, l:28 }, height:90,
      font:{ family:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif', size:9, color:this._css('--text-2') },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, showgrid:false },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, showgrid:false, showticklabels:false },
      bargap:.05, showlegend:false,
    }, this._cfg({ staticPlot:true }));
  },

  miniBar(id, labels, values) {
    Plotly.newPlot(id, [{
      type:'bar', x:labels.slice(0,10), y:values.slice(0,10),
      marker:{ color:this._css('--categorical'), opacity:.8 },
    }], {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      margin:{ t:2, r:4, b:28, l:28 }, height:90,
      font:{ family:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif', size:9, color:this._css('--text-2') },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, tickangle:-30, showgrid:false },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, showgrid:false, showticklabels:false },
      bargap:.2, showlegend:false,
    }, this._cfg({ staticPlot:true }));
  },

  corrBar(id, labels, values) {
    const accent  = this._css('--accent');
    const danger  = this._css('--danger');
    const colors  = values.map(v => v >= 0 ? accent : danger);
    const h = Math.max(120, labels.length * 20 + 50);
    Plotly.newPlot(id, [{
      type:'bar', orientation:'h',
      x:values.map(Math.abs), y:labels,
      marker:{ color:colors, opacity:.85 },
      hovertemplate:'%{x:.2f}<extra></extra>',
    }], {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      height:h, margin:{ t:6, r:16, b:24, l:100 },
      font:{ family:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif', size:10, color:this._css('--text-2') },
      xaxis:{ range:[0,1], gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10} },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10}, automargin:true },
      bargap:.25, showlegend:false,
    }, this._cfg());
  },
};

    _scatterMode: null,
    render() {
      const el = document.getElementById('page-explore');
      if (!State.data) {
        el.innerHTML = `<div class="empty-state"><div class="empty-title">No dataset loaded</div><div class="empty-sub">Load a CSV from the Overview page.</div></div>`;
        return;
      }
      if (this._scatterMode === null) this._scatterMode = State.settings.pairplotMode;
      const visibleCols = State.columns.filter(c => !c.isWeight);
      const numCols = visibleCols.filter(c => c.type==='numeric');
      const sm = this._scatterMode;

      el.innerHTML = `
        <div class="section-head"><span class="section-title">Distributions</span></div>
        <div class="dist-grid" id="distGrid" style="margin-bottom:24px">
          ${visibleCols.map(col => {
            const safeId = 'mini-' + col.name.replace(/[^a-zA-Z0-9]/g,'_');
            return `<div class="dist-item">
              <div class="dist-item-head">
                <div class="type-dot ${col.type}" style="flex-shrink:0"></div>
                <button class="dist-col-link" onclick="UI.openColumnDetail('${col.name}','explore')">${col.name}</button>
              </div>
              <div id="${safeId}" style="height:90px"></div>
            </div>`;
          }).join('')}
        </div>

        ${numCols.length > 1 ? `
        <div class="section-head">
          <span class="section-title">Correlation matrix</span>
          <span style="font-size:11px;color:var(--text-3)">${State.isCubed?'weighted ':''}Pearson r</span>
        </div>
        <div class="chart-wrap" style="margin-bottom:24px"><div id="chart-heatmap"></div></div>` : ''}

        ${numCols.length > 1 ? `
        <div class="section-head">
          <span class="section-title">Scatter</span>
          <div class="toggle-group">
            <button class="toggle-btn ${sm==='sample'?'active':''}" onclick="Pages.explore.setMode('sample')">Sample</button>
            <button class="toggle-btn ${sm==='density'?'active':''}" onclick="Pages.explore.setMode('density')">Density</button>
          </div>
        </div>
        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--text-2)">X</span>
            <select class="form-select" id="scX" style="width:150px" onchange="Pages.explore.renderScatter()">
              ${numCols.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:var(--text-2)">Y</span>
            <select class="form-select" id="scY" style="width:150px" onchange="Pages.explore.renderScatter()">
              ${numCols.map((c,i)=>`<option value="${c.name}" ${i===1?'selected':''}>${c.name}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:var(--text-2)">Color</span>
            <select class="form-select" id="scColor" style="width:150px" onchange="Pages.explore.renderScatter()">
              <option value="">— none —</option>
              ${visibleCols.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}
            </select>
            ${sm==='sample'?`<span style="font-size:11px;color:var(--text-3)">${Math.min(State.settings.sampleSize,State.data.length).toLocaleString()} rows sampled</span>`:''}
          </div>
          <div id="chart-scatter" style="height:320px"></div>
        </div>` : ''}
      `;
      requestAnimationFrame(() => {
        for (const col of visibleCols) {
          const safeId = 'mini-' + col.name.replace(/[^a-zA-Z0-9]/g,'_');
          if (col.type === 'numeric') {
            Charts.miniHist(safeId, State.data, col.name);
          } else {
            const s = DataEngine.columnStats(State.data, col.name);
            Charts.miniBar(safeId, s.valueCounts.slice(0,10).map(([v])=>v), s.valueCounts.slice(0,10).map(([,c])=>c));
          }
        }
        if (numCols.length > 1) {
          const mat = DataEngine.correlationMatrix(numCols.map(c=>c.name));
          Charts.heatmap('chart-heatmap', mat, numCols.map(c=>c.name));
          this.renderScatter();
        }
      });
    },
    setMode(m) { this._scatterMode = m; this.render(); },
    renderScatter() {
      const xEl = document.getElementById('scX');
      const yEl = document.getElementById('scY');
      const cEl = document.getElementById('scColor');
      if (!xEl || !yEl) return;
      const rows = DataEngine.sampleRows(State.settings.sampleSize);
      Charts.scatter('chart-scatter', rows, xEl.value, yEl.value, cEl?.value||null, this._scatterMode||'sample');
    },
  },

  // ── Transform ─────────────────────────────────────────────────────────────
  transform: {
    render() {
      document.getElementById('page-transform').innerHTML = `
        <div class="coming-soon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M6 12h36M12 24h24M20 36h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <h2>Transform</h2>
          <p>Filter, rollup, pivot, and calculated columns — coming in Phase 3.</p>
        </div>`;
    },
  },

  // ── Dashboard ─────────────────────────────────────────────────────────────
  dashboard: {
    render() {
      document.getElementById('page-dashboard').innerHTML = `
        <div class="coming-soon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="4" width="40" height="28" rx="2" stroke="currentColor" stroke-width="2"/><line x1="24" y1="32" x2="24" y2="44" stroke="currentColor" stroke-width="2"/><line x1="16" y1="44" x2="32" y2="44" stroke="currentColor" stroke-width="2"/></svg>
          <h2>Dashboard</h2>
          <p>Drag-and-drop dashboard builder with standalone HTML export — coming in Phase 4.</p>
        </div>`;
    },
  },

  // ── Settings ──────────────────────────────────────────────────────────────
  settings: {
    THEMES: [
      { id:'dark',      name:'Dark',      sub:'Charcoal',  bg:'#0f1117', bars:['#4f7cff','#2e3148','#1a1d27'] },
      { id:'light',     name:'Light',     sub:'Neutral',   bg:'#f4f4f6', bars:['#2563eb','#d8d8e0','#ffffff'] },
      { id:'nord',      name:'Nord',      sub:'Blue-gray', bg:'#2e3440', bars:['#88c0d0','#4c566a','#3b4252'] },
      { id:'solarized', name:'Solarized', sub:'Warm',      bg:'#002b36', bars:['#2aa198','#1a5f70','#073642'] },
    ],
    render() {
      const s  = State.settings;
      const el = document.getElementById('page-settings');
      el.innerHTML = `
        <div class="section-head" style="margin-bottom:12px"><span class="section-title">Theme</span></div>
        <div class="theme-grid" style="margin-bottom:28px">
          ${this.THEMES.map(t => `
            <div class="theme-card ${s.theme===t.id?'selected':''}" onclick="Themes.apply('${t.id}');Pages.settings.render()">
              <div class="theme-preview" style="background:${t.bg}">${t.bars.map(c=>`<div class="theme-bar" style="background:${c}"></div>`).join('')}</div>
              <div class="theme-name">${t.name}</div>
              <div class="theme-sub">${t.sub}</div>
            </div>`).join('')}
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Dataset</span></div>
        <div class="card" style="margin-bottom:20px">
          <div class="form-row">
            <label class="form-label">Weight column name</label>
            <input class="form-input" id="s-weightCol" value="${s.weightColumnName}" placeholder="Number_of_rows" onblur="Pages.settings.save()"/>
            <span class="form-hint">Auto-detected on load — re-load CSV after changing</span>
          </div>
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Table display</span></div>
        <div class="card" style="margin-bottom:20px">
          <div class="form-row">
            <label class="form-label">Sample rows shown</label>
            <input class="form-input" id="s-tableRows" type="number" min="5" max="200" value="${s.tableRows}" style="width:80px" onblur="Pages.settings.save()"/>
          </div>
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Chart defaults</span></div>
        <div class="card" style="margin-bottom:20px">
          <div class="form-row">
            <label class="form-label">Scatter sample size</label>
            <input class="form-input" id="s-sampleSize" type="number" min="100" max="50000" step="500" value="${s.sampleSize}" style="width:100px" onblur="Pages.settings.save()"/>
            <span class="form-hint">rows used for scatter plots</span>
          </div>
          <div class="form-row">
            <label class="form-label">Default scatter mode</label>
            <div class="toggle-group">
              <button class="toggle-btn ${s.pairplotMode==='sample'?'active':''}" onclick="State.settings.pairplotMode='sample';Storage.save();Pages.settings.render()">Sample</button>
              <button class="toggle-btn ${s.pairplotMode==='density'?'active':''}" onclick="State.settings.pairplotMode='density';Storage.save();Pages.settings.render()">Density</button>
            </div>
          </div>
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Export</span></div>
        <div class="card">
          <div class="form-row">
            <label class="form-label">Filename prefix</label>
            <input class="form-input" id="s-exportPrefix" value="${s.exportPrefix}" onblur="Pages.settings.save()"/>
          </div>
          <div class="form-row">
            <label class="form-label">CSV delimiter</label>
            <select class="form-select" id="s-exportDelim" style="width:160px" onchange="Pages.settings.save()">
              <option value="," ${s.exportDelimiter===','?'selected':''}>Comma (,)</option>
              <option value=";" ${s.exportDelimiter===';'?'selected':''}>Semicolon (;)</option>
              <option value="	" ${s.exportDelimiter==='\t'?'selected':''}>Tab</option>
            </select>
          </div>
        </div>
      `;
    },
    save() {
      const g = id => document.getElementById(id);
      if (g('s-weightCol'))     State.settings.weightColumnName = g('s-weightCol').value.trim() || 'Number_of_rows';
      if (g('s-tableRows'))     State.settings.tableRows        = Math.max(5,Math.min(200,+g('s-tableRows').value||10));
      if (g('s-sampleSize'))    State.settings.sampleSize       = Math.max(100,Math.min(50000,+g('s-sampleSize').value||5000));
      if (g('s-exportPrefix'))  State.settings.exportPrefix     = g('s-exportPrefix').value.trim() || 'datalab';
      if (g('s-exportDelim'))   State.settings.exportDelimiter  = g('s-exportDelim').value;
      Storage.save();
      UI.toast('Settings saved');
    },
  },
};

// ════════════════════════════════════════════════════════════════════════════
// THEMES
// ════════════════════════════════════════════════════════════════════════════
const Themes = {
  apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    State.settings.theme = theme;
    Storage.save();
    const p = State.currentPage;
    if (p === 'explore')       setTimeout(() => Pages.explore.render(), 50);
    if (p === 'column-detail') setTimeout(() => Pages.columnDetail.render(), 50);
  },
};

// ════════════════════════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════════════════════════
const UI = {
  init() {
    Storage.load();
    Themes.apply(State.settings.theme);
    this._setupNav();
    this._setupSidebarToggle();
    this._setupDragDrop();
    this._setupFileInput();
    this.loadTitanic();
    this.navigate('overview');
  },

  navigate(page) {
    State.prevPage    = State.currentPage;
    State.currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pid = page === 'column-detail' ? 'page-column-detail' : `page-${page}`;
    document.getElementById(pid)?.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    const map = {
      'overview':       () => Pages.overview.render(),
      'explore':        () => Pages.explore.render(),
      'column-detail':  () => Pages.columnDetail.render(),
      'transform':      () => Pages.transform.render(),
      'dashboard':      () => Pages.dashboard.render(),
      'settings':       () => Pages.settings.render(),
    };
    map[page]?.();
  },

  openColumnDetail(col, from) {
    State.columnDetail = col;
    State.prevPage = from || State.currentPage;
    this.navigate('column-detail');
  },

  loadCSV(text, name) {
    const ok = DataEngine.parseCSV(text, name);
    if (!ok) { this.toast('Could not parse CSV.'); return; }
    this.navigate('overview');
    this.toast(`Loaded ${name} — ${State.data.length.toLocaleString()} rows`);
  },

  loadTitanic() { this.loadCSV(TITANIC_CSV, 'titanic'); },

  triggerFileOpen() { document.getElementById('fileInput').click(); },

  _setupFileInput() {
    document.getElementById('fileInput').addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => this.loadCSV(ev.target.result, f.name.replace(/\.csv$/i,''));
      r.readAsText(f);
      e.target.value = '';
    });
  },

  _setupNav() {
    document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.page));
    });
  },

  _setupSidebarToggle() {
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      document.getElementById('app').classList.toggle('collapsed');
    });
  },

  _setupDragDrop() {
    const ov = document.getElementById('dropOverlay');
    let depth = 0;
    document.addEventListener('dragenter', e => { e.preventDefault(); depth++; ov.classList.add('active'); });
    document.addEventListener('dragleave', () => { depth--; if (depth <= 0) { depth=0; ov.classList.remove('active'); } });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault(); depth=0; ov.classList.remove('active');
      const f = e.dataTransfer.files[0];
      if (!f || !f.name.match(/\.csv$/i)) { this.toast('Drop a .csv file.'); return; }
      const r = new FileReader();
      r.onload = ev => this.loadCSV(ev.target.result, f.name.replace(/\.csv$/i,''));
      r.readAsText(f);
    });
  },

  toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(this._tt);
    this._tt = setTimeout(() => el.classList.remove('show'), 2800);
  },
};

document.addEventListener('DOMContentLoaded', () => UI.init());
</script>
</body>
</html>

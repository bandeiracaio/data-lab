// ════════════════════════════════════════════════════════════════════════════
// MODELS ENGINE  (Phase 5b — Scorecard)
// ════════════════════════════════════════════════════════════════════════════
const ModelsEngine = {

  // ── Top-level orchestrator ───────────────────────────────────────────────
  runScorecard(params) {
    const {
      target, predictors, data, columns,
      maxBins = 5, preBinsK = 20, minBinSize = 0.05,
      monotonicity = 'auto', catOrdering = 'event_rate',
      ivThreshold = 0.02,
      lambda = 0.01, maxIter = 500,
      PDO = 20, baseScore = 600, baseOdds = 1 / 19,
      weightCol = null,
    } = params;

    const wFn = r => weightCol ? (Number(r[weightCol]) || 1) : 1;

    // Rows with valid binary target
    const allRows = data.filter(r => { const t = Number(r[target]); return t === 0 || t === 1; });
    if (!allRows.length) throw new Error('No rows with binary target (0/1)');

    const totalE  = allRows.reduce((s,r) => s + Number(r[target]) * wFn(r), 0);
    const totalNE = allRows.reduce((s,r) => s + (1 - Number(r[target])) * wFn(r), 0);
    if (totalE === 0 || totalNE === 0) throw new Error('Target must have both events (1) and non-events (0)');

    // Training rows (use _split if present)
    const hasSplit = columns.some(c => c.name === '_split');
    const trainRows = hasSplit ? allRows.filter(r => r['_split'] === 'train') : allRows;
    if (!trainRows.length) throw new Error('No training rows found');

    const trainE  = trainRows.reduce((s,r) => s + Number(r[target]) * wFn(r), 0);
    const trainNE = trainRows.reduce((s,r) => s + (1 - Number(r[target])) * wFn(r), 0);

    // ── Per-predictor binning ─────────────────────────────────────────────
    const woe_tables = {};
    const iv_summary = {};

    const varConfig = params.varConfig || {};

    for (const col of predictors) {
      if (col === target || col === weightCol) continue;
      const colMeta = columns.find(c => c.name === col);
      const isCat = colMeta?.type === 'categorical';
      // Per-variable overrides (fall back to global param)
      const colMono = varConfig[col]?.monotonicity || monotonicity;
      const colCatOrd = varConfig[col]?.catOrdering || catOrdering;

      let preBinsArr;
      if (isCat) {
        const ordered = this.categoryOrder(trainRows, col, target, colCatOrd, wFn);
        preBinsArr = this.catPreBin(trainRows, col, target, ordered, wFn);
      } else {
        preBinsArr = this.preBin(trainRows, col, target, preBinsK, wFn);
      }
      if (preBinsArr.length < 1) continue;

      // DP → monotonicity → WoE
      let merged = this.dpOptimize(preBinsArr, maxBins, trainE, trainNE);
      if (!isCat && colMono !== 'unconstrained') {
        merged = this.enforceMonotonicity(merged, colMono, trainE, trainNE);
      }
      let bins = this.computeWoE(merged, trainE, trainNE);

      // Add null bin if column has any nulls in training data
      const nb = this.nullBin(trainRows, col, target, wFn, trainE, trainNE);
      if (nb) bins = [...bins, nb];

      const colIV = bins.reduce((s,b) => s + (b.iv || 0), 0);
      iv_summary[col] = colIV;
      woe_tables[col] = bins;
    }

    // Filter to predictors that pass IV threshold
    const usedPredictors = predictors.filter(col => col !== target && col !== weightCol && (iv_summary[col] || 0) >= ivThreshold && woe_tables[col]);
    const P = usedPredictors.length;
    if (!P) throw new Error(`No predictors passed IV threshold (${ivThreshold}). Try lowering IV threshold or adding more predictors.`);

    // ── Compress → LR ────────────────────────────────────────────────────
    const compressed = this.compress(trainRows, usedPredictors, target, wFn, woe_tables);
    const { coef, intercept } = this.fitLR(compressed, P, lambda, maxIter);

    // ── Points scaling ────────────────────────────────────────────────────
    const points_tables = this.scalePoints(coef, intercept, usedPredictors, woe_tables, P, PDO, baseScore, baseOdds);

    // ── Evaluate per split ────────────────────────────────────────────────
    const tempModel = { predictors: usedPredictors, woe_tables, coef, intercept };
    const metrics = {};
    const splits = hasSplit ? ['train','validation','test'] : ['full'];
    for (const split of splits) {
      const splitRows = split === 'full' ? allRows : allRows.filter(r => r['_split'] === split);
      if (!splitRows.length) continue;
      const scored = splitRows.map(r => ({
        target: Number(r[target]),
        score: this.predictProba(r, tempModel),
        w: wFn(r),
      }));
      metrics[split] = this.evaluate(scored);
    }

    return {
      type: 'scorecard',
      id: '_mdl_' + Math.random().toString(36).slice(2, 8),
      name: 'Scorecard',
      params,
      target,
      predictors: usedPredictors,
      allPredictors: predictors,
      woe_tables,
      coef,
      intercept,
      points_tables,
      iv_summary,
      metrics,
      createdAt: Date.now(),
    };
  },

  // ── Stage 1: Numeric pre-binning (K weighted-quantile bins) ─────────────
  preBin(rows, col, targetCol, K, wFn) {
    const valid = rows.filter(r =>
      r[col] != null && r[col] !== '' && !isNaN(Number(r[col])) &&
      (Number(r[targetCol]) === 0 || Number(r[targetCol]) === 1)
    );
    if (valid.length < 2) return [];
    const sorted = [...valid].sort((a, b) => Number(a[col]) - Number(b[col]));
    const totalW = sorted.reduce((s, r) => s + wFn(r), 0);
    const step = totalW / Math.min(K, valid.length);

    const bins = [];
    let items = [], cumW = 0, targetW = step, lower = -Infinity;

    for (let i = 0; i < sorted.length; i++) {
      const r = sorted[i];
      const val = Number(r[col]);
      items.push(r);
      cumW += wFn(r);
      const isLast = i === sorted.length - 1;
      const nextDiff = isLast || Number(sorted[i + 1][col]) !== val;

      if ((cumW >= targetW && nextDiff) || isLast) {
        const events = items.reduce((s, x) => s + Number(x[targetCol]) * wFn(x), 0);
        const weight = items.reduce((s, x) => s + wFn(x), 0);
        bins.push({ lower, upper: val, events, nonevents: weight - events, weight });
        lower = val; items = []; targetW += step;
      }
    }
    if (bins.length) bins[bins.length - 1].upper = Infinity;
    return bins;
  },

  // ── Stage 2a: Categorical ordering ───────────────────────────────────────
  categoryOrder(rows, col, targetCol, mode, wFn) {
    const map = new Map();
    for (const r of rows) {
      const c = r[col];
      if (c == null || c === '') continue;
      if (!map.has(c)) map.set(c, { e: 0, w: 0 });
      const w = wFn(r);
      map.get(c).e += Number(r[targetCol]) * w;
      map.get(c).w += w;
    }
    const cats = [...map.entries()].map(([cat, s]) => ({
      cat, e: s.e, w: s.w, rate: s.w > 0 ? s.e / s.w : 0,
    }));
    if (mode === 'frequency')    return cats.sort((a, b) => a.w - b.w).map(c => c.cat);
    if (mode === 'alphabetical') return cats.map(c => c.cat).sort((a, b) => String(a).localeCompare(String(b)));
    return cats.sort((a, b) => a.rate - b.rate).map(c => c.cat); // event_rate / target_mean / default
  },

  // ── Stage 2b: Categorical pre-bins (one bin per ordered category) ────────
  catPreBin(rows, col, targetCol, orderedCats, wFn) {
    return orderedCats.map(cat => {
      const cr = rows.filter(r => r[col] === cat);
      const events = cr.reduce((s, r) => s + Number(r[targetCol]) * wFn(r), 0);
      const weight = cr.reduce((s, r) => s + wFn(r), 0);
      return { cats: [cat], events, nonevents: weight - events, weight };
    }).filter(b => b.weight > 0);
  },

  // ── Stage 3: DP optimization (O(K² × maxBins)) ───────────────────────────
  dpOptimize(preBins, maxBins, totalE, totalNE) {
    const K = preBins.length;
    if (K <= maxBins) return preBins;

    // Prefix sums for O(1) segment IV
    const pE = new Array(K + 1).fill(0);
    const pNE = new Array(K + 1).fill(0);
    for (let i = 0; i < K; i++) {
      pE[i + 1]  = pE[i]  + preBins[i].events;
      pNE[i + 1] = pNE[i] + preBins[i].nonevents;
    }
    const ivSeg = (l, r) => this._ivSeg(pE[r] - pE[l], pNE[r] - pNE[l], totalE, totalNE);

    const NI = -Infinity;
    const dp    = Array.from({length: maxBins + 1}, () => new Float64Array(K + 1).fill(NI));
    const split = Array.from({length: maxBins + 1}, () => new Int16Array(K + 1).fill(-1));
    dp[0][0] = 0;

    for (let j = 1; j <= maxBins; j++) {
      for (let i = j; i <= K; i++) {
        for (let l = j - 1; l < i; l++) {
          if (dp[j - 1][l] === NI) continue;
          const val = dp[j - 1][l] + ivSeg(l, i);
          if (val > dp[j][i]) { dp[j][i] = val; split[j][i] = l; }
        }
      }
    }

    // Best number of bins (use all up to maxBins, pick the one maximising IV)
    let bestJ = 1, bestIV = NI;
    for (let j = 1; j <= maxBins; j++) {
      if (dp[j][K] > bestIV) { bestIV = dp[j][K]; bestJ = j; }
    }

    // Backtrack split points
    const pts = [];
    let rem = K, j = bestJ;
    while (j > 0) { pts.unshift(split[j][rem]); rem = split[j][rem]; j--; }

    // Build merged bins
    return pts.map((start, g) => {
      const end = g + 1 < pts.length ? pts[g + 1] : K;
      const grp = preBins.slice(start, end);
      const events    = grp.reduce((s, b) => s + b.events, 0);
      const nonevents = grp.reduce((s, b) => s + b.nonevents, 0);
      const weight    = grp.reduce((s, b) => s + b.weight, 0);
      const bin = { events, nonevents, weight };
      if (grp[0].cats !== undefined) bin.cats = grp.flatMap(b => b.cats);
      else { bin.lower = grp[0].lower; bin.upper = grp[grp.length - 1].upper; }
      return bin;
    });
  },

  _ivSeg(e, ne, totalE, totalNE) {
    if (e <= 0 || ne <= 0 || totalE <= 0 || totalNE <= 0) return 0;
    const er = e / totalE, ner = ne / totalNE;
    return (er - ner) * Math.log(er / ner);
  },

  // ── Stage 4: Monotonicity enforcement ────────────────────────────────────
  enforceMonotonicity(bins, mode, totalE, totalNE) {
    if (mode === 'unconstrained') return bins;
    const woe = b => {
      const er = b.events / totalE, ner = b.nonevents / totalNE;
      return (er > 0 && ner > 0) ? Math.log(er / ner) : 0;
    };
    const tryDir = dir => {
      const bs = bins.map(b => ({ ...b }));
      let changed = true;
      while (changed) {
        changed = false;
        for (let i = 0; i < bs.length - 1; i++) {
          const ok = dir === 'asc' ? woe(bs[i]) <= woe(bs[i + 1]) : woe(bs[i]) >= woe(bs[i + 1]);
          if (!ok) {
            const m = { events: bs[i].events + bs[i+1].events, nonevents: bs[i].nonevents + bs[i+1].nonevents, weight: bs[i].weight + bs[i+1].weight };
            if (bs[i].cats) m.cats = [...bs[i].cats, ...bs[i+1].cats];
            else { m.lower = bs[i].lower; m.upper = bs[i+1].upper; }
            bs.splice(i, 2, m); changed = true; break;
          }
        }
      }
      return bs;
    };
    if (mode === 'ascending')  return tryDir('asc');
    if (mode === 'descending') return tryDir('desc');
    // auto: pick direction with higher total IV
    const ivTotal = arr => arr.reduce((s, b) => s + this._ivSeg(b.events, b.nonevents, totalE, totalNE), 0);
    const asc = tryDir('asc'), desc = tryDir('desc');
    return ivTotal(asc) >= ivTotal(desc) ? asc : desc;
  },

  // ── Stage 5: Null bin ─────────────────────────────────────────────────────
  nullBin(rows, col, targetCol, wFn, totalE, totalNE) {
    const nullRows = rows.filter(r => r[col] == null || r[col] === '' || (typeof r[col] === 'number' && isNaN(r[col])));
    if (!nullRows.length) return null;
    const events = nullRows.reduce((s, r) => s + Number(r[targetCol]) * wFn(r), 0);
    const weight = nullRows.reduce((s, r) => s + wFn(r), 0);
    const nonevents = weight - events;
    const er = totalE > 0 ? events / totalE : 0;
    const ner = totalNE > 0 ? nonevents / totalNE : 0;
    const woe = (er > 0 && ner > 0) ? Math.log(er / ner) : 0;
    const iv  = (er > 0 && ner > 0) ? (er - ner) * woe : 0;
    return { isNull: true, events, nonevents, weight, woe, iv, label: 'Missing', binIdx: -1 };
  },

  // ── Stage 6: WoE + IV per bin ─────────────────────────────────────────────
  computeWoE(bins, totalE, totalNE) {
    return bins.map((b, i) => {
      const er = totalE > 0 ? b.events / totalE : 0;
      const ner = totalNE > 0 ? b.nonevents / totalNE : 0;
      const woe = (er > 0 && ner > 0) ? Math.log(er / ner) : 0;
      const iv  = (er > 0 && ner > 0) ? (er - ner) * woe : 0;
      let label;
      if (b.cats) {
        label = b.cats.length === 1 ? String(b.cats[0]) : b.cats.join(' / ');
      } else {
        const lo = b.lower, hi = b.upper;
        label = lo === -Infinity ? `≤ ${Fmt.num(hi)}` :
                hi === Infinity  ? `> ${Fmt.num(lo)}` :
                                   `> ${Fmt.num(lo)} to ${Fmt.num(hi)}`;
      }
      return { ...b, woe, iv, label, binIdx: i };
    });
  },

  // ── Stage 7: Compress rows into bin-combination groups ───────────────────
  compress(rows, predictors, targetCol, wFn, woe_tables) {
    const getBin = (r, col) => {
      const bins = woe_tables[col];
      if (!bins) return null;
      const val = r[col];
      if (val == null || val === '' || (typeof val === 'number' && isNaN(val)))
        return bins.find(b => b.isNull) || null;
      if (bins[0].cats !== undefined)
        return bins.find(b => b.cats?.some(c => String(c) === String(val))) || null;
      const nv = Number(val);
      return bins.find(b => nv > b.lower && nv <= b.upper) || bins.find(b => !b.isNull) || null;
    };

    const groups = new Map();
    for (const r of rows) {
      const binObjs = predictors.map(col => getBin(r, col));
      const key = binObjs.map(b => b ? b.binIdx : -1).join('|');
      if (!groups.has(key)) {
        groups.set(key, {
          woeValues: binObjs.map(b => b ? (b.woe || 0) : 0),
          events: 0, nonevents: 0, weight: 0,
        });
      }
      const g = groups.get(key);
      const w = wFn(r);
      g.events    += Number(r[targetCol]) * w;
      g.nonevents += (1 - Number(r[targetCol])) * w;
      g.weight    += w;
    }
    return [...groups.values()];
  },

  // ── Stage 8: L2-regularised logistic regression (gradient descent) ───────
  fitLR(compressed, P, lambda, maxIter) {
    const coef = new Array(P).fill(0);
    let intercept = 0;
    const lr = 0.1;
    const sig = z => 1 / (1 + Math.exp(-Math.max(-30, Math.min(30, z))));

    for (let iter = 0; iter < maxIter; iter++) {
      const gC = new Array(P).fill(0);
      let gI = 0, totalW = 0;

      for (const row of compressed) {
        const { woeValues: wv, events, weight } = row;
        const y = events / weight;
        let z = intercept;
        for (let j = 0; j < P; j++) z += coef[j] * wv[j];
        const resid = (sig(z) - y) * weight;
        gI += resid;
        for (let j = 0; j < P; j++) gC[j] += resid * wv[j];
        totalW += weight;
      }

      const sc = 1 / (totalW || 1);
      intercept -= lr * sc * gI;
      for (let j = 0; j < P; j++) {
        coef[j] -= lr * (sc * gC[j] + 2 * lambda * coef[j]);
      }
    }
    return { coef, intercept };
  },

  // ── Stage 9: PDO points scaling ────────────────────────────────────────
  scalePoints(coef, intercept, predictors, woe_tables, P, PDO, baseScore, baseOdds) {
    const B = PDO / Math.log(2);
    const A = baseScore + B * Math.log(baseOdds);
    // base_pts = A - B*β₀ (intercept contribution to total score)
    // Each predictor bin contributes: -B * βⱼ * WoEⱼ  (no intercept split)
    // Total = base_pts + Σ pts  →  logOdds = (A - total) / B = β₀ + Σβⱼ*WoEⱼ = logit ✓
    const base_pts = Math.round(A - B * intercept);
    const tables = {};
    for (let j = 0; j < P; j++) {
      const col = predictors[j];
      tables[col] = (woe_tables[col] || []).map(b => ({
        ...b,
        points: Math.round(-B * coef[j] * b.woe),
      }));
    }
    tables._meta = { A, B, base_pts, baseScore, PDO, baseOdds };
    return tables;
  },

  // ── Probability prediction (for evaluation + apply_model) ────────────────
  predictProba(row, model) {
    const { predictors, woe_tables, coef, intercept } = model;
    let z = intercept;
    for (let j = 0; j < predictors.length; j++) {
      const col = predictors[j];
      const bin = this._findBin(row[col], woe_tables[col]);
      z += coef[j] * (bin ? bin.woe || 0 : 0);
    }
    return 1 / (1 + Math.exp(-Math.max(-30, Math.min(30, z))));
  },

  // ── Score a single row → totalPoints + prob + woe/bin per predictor ──────
  scoreRow(row, model) {
    const { predictors, points_tables } = model;
    const { A = 0, B = 20 / Math.log(2), base_pts = 0 } = points_tables._meta || {};
    // totalPoints = base_pts + Σ variable_pts  →  logOdds = (A - totalPoints) / B = logit ✓
    let varPts = 0;
    const woeValues = {}, binLabels = {};
    for (const col of predictors) {
      const bins = points_tables[col];
      if (!bins) continue;
      const bin = this._findBin(row[col], bins);
      const b = bin || bins[0] || {};
      varPts += b.points || 0;
      woeValues[col] = b.woe || 0;
      binLabels[col] = b.label || '';
    }
    const totalPoints = base_pts + varPts;
    const logOdds = (A - totalPoints) / B;
    const prob = 1 / (1 + Math.exp(-Math.max(-30, Math.min(30, logOdds))));
    return { totalPoints, varPts, base_pts, prob, woeValues, binLabels };
  },

  _findBin(val, bins) {
    if (!bins) return null;
    if (val == null || val === '' || (typeof val === 'number' && isNaN(val)))
      return bins.find(b => b.isNull) || null;
    if (bins[0]?.cats !== undefined)
      return bins.find(b => b.cats?.some(c => String(c) === String(val))) || null;
    const nv = Number(val);
    return bins.find(b => nv > b.lower && nv <= b.upper) || bins.find(b => !b.isNull) || null;
  },

  // ── Evaluation: Gini / AUC / KS ──────────────────────────────────────────
  evaluate(scored) {
    if (!scored.length) return { gini: null, auc: null, ks: null };
    const sorted = [...scored].sort((a, b) => b.score - a.score);
    const totalE  = sorted.reduce((s, r) => s + r.target * r.w, 0);
    const totalNE = sorted.reduce((s, r) => s + (1 - r.target) * r.w, 0);
    if (totalE === 0 || totalNE === 0) return { gini: null, auc: null, ks: null };

    let cumE = 0, cumNE = 0, auc = 0, ks = 0;
    let prevTPR = 0, prevFPR = 0;
    for (const r of sorted) {
      cumE  += r.target * r.w;
      cumNE += (1 - r.target) * r.w;
      const tpr = cumE / totalE, fpr = cumNE / totalNE;
      auc += (tpr + prevTPR) / 2 * (fpr - prevFPR);
      ks = Math.max(ks, Math.abs(tpr - fpr));
      prevTPR = tpr; prevFPR = fpr;
    }
    return { gini: 2 * auc - 1, auc, ks };
  },

};

// ════════════════════════════════════════════════════════════════════════════
// CHARTS
// ════════════════════════════════════════════════════════════════════════════
const Charts = {
  _css(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); },
  _layout(o = {}) {
    const border = this._css('--border');
    const text2  = this._css('--text-2');
    const font   = '-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif';
    const base = {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      font:{ family:font, size:11, color:this._css('--text') },
      margin:{ t:10, r:16, b:36, l:48 },
      xaxis:{ gridcolor:border, linecolor:border, zerolinecolor:border,
              tickfont:{ size:10, color:text2 }, titlefont:{ size:11, color:text2 } },
      yaxis:{ gridcolor:border, linecolor:border, zerolinecolor:border,
              tickfont:{ size:10, color:text2 }, titlefont:{ size:11, color:text2 } },
      showlegend:false,
    };
    return Object.assign(base, o);
  },
  _cfg(extra = {}) { return Object.assign({ displayModeBar:false, responsive:true }, extra); },

  histogram(id, rows, col, bins=20) {
    const h = DataEngine.weightedHistogram(rows, col, bins);
    if (!h) return;
    Plotly.newPlot(id, [{
      type:'bar', x:h.x, y:h.counts,
      marker:{ color:this._css('--accent'), opacity:.85 },
      hovertemplate:'%{y:,.0f}<extra></extra>',
    }], this._layout({ bargap:.05, height:220,
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, title:{text:col,font:{size:11}} },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, title:{text:'count',font:{size:11}} },
    }), this._cfg());
  },

  barH(id, labels, values, color, height) {
    color = color || this._css('--categorical');
    height = height || Math.max(160, labels.length * 22 + 60);
    Plotly.newPlot(id, [{
      type:'bar', orientation:'h',
      x:values, y:labels,
      marker:{ color, opacity:.85 },
      hovertemplate:'%{x:,.0f}<extra></extra>',
    }], this._layout({
      height, bargap:.2,
      margin:{ t:10, r:16, b:30, l:120 },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')} },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, automargin:true },
    }), this._cfg());
  },

  heatmap(id, matrix, cols) {
    const h = Math.max(300, cols.length * 30 + 100);
    Plotly.newPlot(id, [{
      type:'heatmap', z:matrix, x:cols, y:cols,
      colorscale:[ [0,'#ff5f5f'], [0.5,'rgba(100,100,120,0.15)'], [1, this._css('--accent')] ],
      zmid:0, zmin:-1, zmax:1,
      hovertemplate:'%{x} × %{y}: %{z:.2f}<extra></extra>',
      showscale:true,
      colorbar:{ thickness:10, len:.8, tickfont:{size:9,color:this._css('--text-2')} },
    }], this._layout({
      height:h,
      margin:{ t:10, r:60, b:100, l:100 },
      xaxis:{ tickangle:-40, gridcolor:this._css('--border'), linecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, automargin:true },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')}, automargin:true },
    }), this._cfg());
  },

  scatter(id, rows, xCol, yCol, colorCol, mode) {
    const accent = this._css('--accent');
    const valid = rows.filter(r => r[xCol] != null && r[yCol] != null);
    if (!valid.length) return;
    const xs = valid.map(r => r[xCol]);
    const ys = valid.map(r => r[yCol]);
    if (mode === 'density') {
      Plotly.newPlot(id, [{
        type:'histogram2d', x:xs, y:ys,
        colorscale:[ [0,'transparent'], [0.2,this._css('--accent-dim')], [1,accent] ],
        hovertemplate:'%{z} pts<extra></extra>',
        showscale:false,
      }], this._layout({
        height:320,
        xaxis:{ title:{text:xCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
        yaxis:{ title:{text:yCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
      }), this._cfg());
    } else {
      const isCatColor = colorCol && State.columns.find(c=>c.name===colorCol)?.type==='categorical';
      let colors;
      if (isCatColor) {
        const cats = [...new Set(valid.map(r => r[colorCol]))];
        const pal = this._catPalette(cats.length);
        const cmap = Object.fromEntries(cats.map((c, i) => [c, pal[i]]));
        colors = valid.map(r => cmap[r[colorCol]]);
      } else {
        colors = colorCol && valid[0]?.[colorCol] != null ? valid.map(r => r[colorCol]) : accent;
      }
      Plotly.newPlot(id, [{
        type:'scattergl', mode:'markers',
        x:xs, y:ys,
        marker:{ size:4, opacity:.6,
          color: colors,
          colorscale: isCatColor ? undefined : 'Viridis',
          showscale: (!isCatColor && colorCol) ? true : false,
          colorbar:{ thickness:8, len:.7, tickfont:{size:9,color:this._css('--text-2')} },
        },
        text: valid.map(r => colorCol ? `${colorCol}: ${r[colorCol]}` : ''),
        hovertemplate:`${xCol}: %{x}<br>${yCol}: %{y}${colorCol?'<br>%{text}':''}<extra></extra>`,
      }], this._layout({
        height:320,
        xaxis:{ title:{text:xCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
        yaxis:{ title:{text:yCol}, gridcolor:this._css('--border'), linecolor:this._css('--border'),
                zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
      }), this._cfg());
    }
  },

  miniHist(id, rows, col) {
    const h = DataEngine.weightedHistogram(rows, col, 14);
    if (!h) return;
    Plotly.newPlot(id, [{
      type:'bar', x:h.x, y:h.counts,
      marker:{ color:this._css('--accent'), opacity:.8 },
    }], {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      margin:{ t:2, r:4, b:22, l:28 }, height:90,
      font:{ family:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif', size:9, color:this._css('--text-2') },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, showgrid:false },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, showgrid:false, showticklabels:false },
      bargap:.05, showlegend:false,
    }, this._cfg({ staticPlot:true }));
  },

  miniBar(id, labels, values) {
    Plotly.newPlot(id, [{
      type:'bar', x:labels.slice(0,10), y:values.slice(0,10),
      marker:{ color:this._css('--categorical'), opacity:.8 },
    }], {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      margin:{ t:2, r:4, b:28, l:28 }, height:90,
      font:{ family:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif', size:9, color:this._css('--text-2') },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, tickangle:-30, showgrid:false },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'), zerolinecolor:this._css('--border'),
              tickfont:{size:9}, showgrid:false, showticklabels:false },
      bargap:.2, showlegend:false,
    }, this._cfg({ staticPlot:true }));
  },

  corrBar(id, labels, values) {
    const accent  = this._css('--accent');
    const danger  = this._css('--danger');
    const colors  = values.map(v => v >= 0 ? accent : danger);
    const h = Math.max(120, labels.length * 20 + 50);
    Plotly.newPlot(id, [{
      type:'bar', orientation:'h',
      x:values.map(Math.abs), y:labels,
      marker:{ color:colors, opacity:.85 },
      hovertemplate:'%{x:.2f}<extra></extra>',
    }], {
      paper_bgcolor:'transparent', plot_bgcolor:'transparent',
      height:h, margin:{ t:6, r:16, b:24, l:100 },
      font:{ family:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif', size:10, color:this._css('--text-2') },
      xaxis:{ range:[0,1], gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10} },
      yaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10}, automargin:true },
      bargap:.25, showlegend:false,
    }, this._cfg());
  },

  _catColors: ['#4f7cff','#f97316','#10b981','#e879f9','#f59e0b','#06b6d4','#ef4444','#8b5cf6'],
  _catPalette(n) { return Array.from({length:n}, (_,i) => this._catColors[i % this._catColors.length]); },

  boxViolin(id, rows, numCol, groupCol, type='box') {
    const cats = [...new Set(rows.map(r=>r[groupCol]).filter(v=>v!=null))].slice(0,12);
    if (!cats.length) return;
    const colors = this._catPalette(cats.length);
    const traces = cats.map((cat,i) => {
      const vals = rows.filter(r=>r[groupCol]===cat && r[numCol]!=null).map(r=>r[numCol]);
      return {
        type, name:String(cat), y:vals,
        marker:{ color:colors[i] },
        ...(type==='violin' ? { box:{visible:true}, meanline:{visible:true}, opacity:0.7 } : {}),
      };
    });
    Plotly.newPlot(id, traces, this._layout({
      height:340, showlegend:true,
      legend:{ font:{size:10,color:this._css('--text-2')} },
      yaxis:{ title:{text:numCol,font:{size:11}},
              gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
      xaxis:{ gridcolor:this._css('--border'), linecolor:this._css('--border'),
              tickfont:{size:10,color:this._css('--text-2')} },
    }), this._cfg());
  },

  groupHist(id, rows, numCol, groupCol) {
    const cats = [...new Set(rows.map(r=>r[groupCol]).filter(v=>v!=null))].slice(0,8);
    if (!cats.length) return;
    const colors = this._catPalette(cats.length);
    const traces = cats.map((cat,i) => ({
      type:'histogram', name:String(cat),
      x: rows.filter(r=>r[groupCol]===cat && r[numCol]!=null).map(r=>r[numCol]),
      opacity:0.65, marker:{ color:colors[i] },
      hovertemplate:'%{y:,.0f}<extra>'+String(cat)+'</extra>',
    }));
    Plotly.newPlot(id, traces, this._layout({
      height:300, barmode:'overlay', showlegend:true,
      legend:{ font:{size:10,color:this._css('--text-2')} },
      xaxis:{ title:{text:numCol,font:{size:11}},
              gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
      yaxis:{ title:{text:'count',font:{size:11}},
              gridcolor:this._css('--border'), linecolor:this._css('--border'),
              zerolinecolor:this._css('--border'), tickfont:{size:10,color:this._css('--text-2')} },
    }), this._cfg());
  },

  pairplot(id, rows, numCols, groupCol) {
    const accent = this._css('--accent');
    const dims = numCols.map(c => ({ label:c, values:rows.map(r=>r[c]) }));
    let marker = { size:3, opacity:0.55, color:accent };
    if (groupCol) {
      const cats = [...new Set(rows.map(r=>r[groupCol]).filter(v=>v!=null))];
      const palette = this._catPalette(cats.length);
      const colorMap = Object.fromEntries(cats.map((c,i)=>[c,palette[i]]));
      marker = { size:3, opacity:0.6, color:rows.map(r=>colorMap[r[groupCol]]??accent) };
    }
    const h = Math.max(380, numCols.length * 160);
    Plotly.newPlot(id, [{
      type:'splom', dimensions:dims, marker,
      diagonal:{ visible:true },
      showupperhalf:false,
      text: groupCol ? rows.map(r=>String(r[groupCol]??'')) : undefined,
      hovertemplate: groupCol ? '%{xaxis.title.text}: %{x}<br>%{yaxis.title.text}: %{y}<br>'+groupCol+': %{text}<extra></extra>' : undefined,
    }], this._layout({
      height:h,
      legend:{ font:{size:10,color:this._css('--text-2')} },
      margin:{ t:20, r:20, b:60, l:60 },
    }), this._cfg());
  },

  _registry: [],
  _register(title, divId) {
    const el = document.getElementById(divId);
    if (!el || !el.data) return;
    const existing = this._registry.findIndex(c => c.title === title);
    const id = existing >= 0 ? this._registry[existing].id
                             : `chart_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
    const entry = { id, title, traces: JSON.parse(JSON.stringify(el.data)), layout: JSON.parse(JSON.stringify(el.layout || {})) };
    if (existing >= 0) this._registry[existing] = entry;
    else this._registry.push(entry);
  },
};

// MODAL
// ════════════════════════════════════════════════════════════════════════════
const Modal = {
  _cb: null,
  show(title, body, onConfirm) {
    const ov = document.getElementById('modal-overlay');
    ov.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${title}</div>
      ${body}
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.hide()">Cancel</button>
        <button class="btn btn-primary" onclick="Modal._confirm()">Apply</button>
      </div>
    </div>`;
    ov.classList.add('open');
    ov.onclick = () => this.hide();
    this._cb = onConfirm;
  },
  hide() {
    document.getElementById('modal-overlay').classList.remove('open');
    this._cb = null;
  },
  _confirm() { if (this._cb) { const cb = this._cb; this.hide(); cb(); } },
};

// PAGES
// ════════════════════════════════════════════════════════════════════════════
const Pages = {

  // ── Overview ──────────────────────────────────────────────────────────────
  overview: {
    _sortCol: null,
    _sortDir: 1,
    sortBy(col) {
      if (this._sortCol === col) this._sortDir *= -1;
      else { this._sortCol = col; this._sortDir = 1; }
      this._renderTable();
    },
    _getSample() {
      if (!this._sortCol) return DataEngine.randomSampleRows(State.settings.tableRows);
      const d = this._sortDir, c = this._sortCol;
      return [...State.data].sort((a, b) => {
        const av = a[c], bv = b[c];
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return (av < bv ? -1 : av > bv ? 1 : 0) * d;
      }).slice(0, State.settings.tableRows);
    },
    _renderTable() {
      const columns = State.columns;
      const sample  = this._getSample();
      const sc = this._sortCol, sd = this._sortDir;
      const tableEl = document.getElementById('ov-table-wrap');
      if (!tableEl) return;
      tableEl.innerHTML = `<table class="data-table">
        <thead><tr>${columns.map(col => {
          const active = col.name === sc;
          const arrow  = active ? (sd === 1 ? ' ▲' : ' ▼') : '';
          return `<th class="${active?'sort-active':''}"><div class="th-inner">
            <button class="col-name-btn" onclick="UI.openColumnDetail('${col.name}')">${col.name}</button>
            ${col.isWeight ? `<span class="badge badge-cube" style="font-size:8px;padding:1px 4px">W</span>` : ''}
            <button class="col-sort btn-icon" onclick="Pages.overview.sortBy('${col.name}')" title="Sort">${active?(sd===1?'▲':'▼'):'⇅'}</button>
            <button class="col-del btn-icon" onclick="Pages.overview.deleteColumn('${col.name}')" title="Remove">${I.x}</button>
          </div></th>`;
        }).join('')}</tr></thead>
        <tbody>${sample.map(row => `<tr>${columns.map(col => `<td>${Fmt.cell(row[col.name], col.name)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>`;
    },
    render() {
      const el = document.getElementById('page-overview');
      if (!State.data) {
        el.innerHTML = `<div class="empty-state">
          <svg class="empty-icon" width="52" height="52" viewBox="0 0 52 52" fill="none">
            <rect x="4" y="8" width="44" height="36" rx="2" stroke="currentColor" stroke-width="2"/>
            <line x1="4" y1="18" x2="48" y2="18" stroke="currentColor" stroke-width="2"/>
            <line x1="18" y1="8" x2="18" y2="44" stroke="currentColor" stroke-width="2"/>
          </svg>
          <div class="empty-title">No dataset loaded</div>
          <div class="empty-sub">Drop a CSV file anywhere, or choose one of the options below.</div>
          <div class="empty-actions">
            <button class="btn btn-primary" onclick="UI.triggerFileOpen()">${I.upload} Open CSV</button>
            <button class="btn btn-ghost" onclick="UI.loadTitanic()">Load Titanic</button>
          </div>
        </div>`;
        return;
      }
      const { columns, fileName, totalRows, isCubed, weightCol, data } = State;
      const numCols = columns.filter(c => c.type==='numeric' && !c.isWeight);
      const catCols = columns.filter(c => c.type==='categorical');
      const sample  = this._getSample();

      el.innerHTML = `
        <div class="dataset-header">
          <div>
            <div class="dataset-title">${fileName}</div>
            <div class="dataset-sub">${isCubed ? `Cube — statistics weighted by <strong>${weightCol}</strong>` : 'Flat dataset — each row has weight 1'}</div>
          </div>
          <div class="dataset-meta">
            <div class="meta-item"><span class="meta-label">Rows</span><span class="meta-value">${Fmt.number(totalRows,0)}</span></div>
            <div class="meta-item"><span class="meta-label">Columns</span><span class="meta-value">${columns.length}</span></div>
            <div class="meta-item"><span class="meta-label">Numeric</span><span class="meta-value">${numCols.length}</span></div>
            <div class="meta-item"><span class="meta-label">Categorical</span><span class="meta-value">${catCols.length}</span></div>
          </div>
          <div class="header-actions">
            <span class="badge ${isCubed?'badge-cube':'badge-flat'}">${isCubed?'CUBE':'FLAT'}</span>
            <button class="btn btn-ghost btn-sm" onclick="UI.triggerFileOpen()">${I.upload} Load CSV</button>
          </div>
        </div>

        <div class="type-legend">
          <div class="type-legend-item"><div class="type-dot numeric"></div>${numCols.length} numeric</div>
          <div class="type-legend-item"><div class="type-dot categorical"></div>${catCols.length} categorical</div>
          ${isCubed ? `<div class="type-legend-item"><div class="type-dot weight"></div>1 weight column (${weightCol})</div>` : ''}
        </div>

        <div class="section-head">
          <span class="section-title">Column quality</span>
        </div>
        <div class="quality-grid">
          ${columns.map(col => {
            const pct = data.length > 0 ? col.nullCount / data.length * 100 : 0;
            const fill = 100 - pct;
            return `<div class="quality-item">
              <div class="quality-item-header">
                <span class="quality-col-name" onclick="UI.openColumnDetail('${col.name}')" title="Inspect ${col.name}">${col.name}</span>
                <span class="badge ${col.type==='numeric'?'badge-num':'badge-cat'}">${col.type==='numeric'?'NUM':'CAT'}${col.isWeight?' W':''}</span>
              </div>
              <div class="quality-bar-track"><div class="quality-bar-fill" style="width:${fill}%;background:${Fmt.qualityColor(pct)}"></div></div>
              <div class="quality-footer">
                <span class="quality-pct">${col.nullCount > 0 ? Fmt.pct(pct)+' null' : 'complete'}</span>
                <span class="quality-pct">${col.uniqueCount} uniq</span>
              </div>
            </div>`;
          }).join('')}
        </div>

        <div class="section-head" style="margin-top:4px">
          <span class="section-title">Sample data <span style="font-weight:400;text-transform:none;font-size:11px;color:var(--text-3)">(${sample.length} of ${data.length} rows${this._sortCol?` sorted by ${this._sortCol}`:''})</span></span>
          <div style="display:flex;gap:6px">
            ${this._sortCol ? `<button class="btn btn-ghost btn-sm" onclick="Pages.overview._sortCol=null;Pages.overview._renderTable()">Clear sort</button>` : ''}
            <button class="btn btn-ghost btn-sm" onclick="Pages.overview.resample()">${I.resample} Resample</button>
          </div>
        </div>
        <div class="table-wrap" id="ov-table-wrap"></div>
      `;
      this._renderTable();
    },
    resample() {
      this._sortCol = null;
      this._sortDir = 1;
      this.render();
    },
    deleteColumn(col) {
      if (!confirm(`Remove column "${col}"?`)) return;
      State.data = State.data.map(r => { const o={...r}; delete o[col]; return o; });
      State.columns = State.columns.filter(c => c.name !== col);
      if (State.weightCol === col) { State.weightCol = null; State.isCubed = false; }
      this.render();
      UI.toast(`Removed "${col}"`);
    },
  },

  // ── Column Detail ─────────────────────────────────────────────────────────
  columnDetail: {
    render() {
      const col  = State.columnDetail;
      const el   = document.getElementById('page-column-detail');
      if (!col || !State.data) { UI.navigate('overview'); return; }
      const meta = State.columns.find(c => c.name === col);
      if (!meta) { UI.navigate('overview'); return; }
      const stats   = DataEngine.columnStats(State.data, col);
      const from    = State.prevPage === 'explore' ? 'explore' : 'overview';
      const fromLbl = from === 'explore' ? 'Explore' : 'Overview';
      const numCols = State.columns.filter(c => c.type==='numeric' && !c.isWeight && c.name !== col);

      el.innerHTML = `
        <button class="back-btn" onclick="UI.navigate('${from}')">${I.back} Back to ${fromLbl}</button>
        <div class="col-detail-header">
          <span class="col-detail-name">${col}</span>
          <span class="badge ${meta.type==='numeric'?'badge-num':'badge-cat'}">${meta.type}</span>
          ${meta.isWeight ? '<span class="badge badge-cube">Weight</span>' : ''}
        </div>

        ${stats.type === 'numeric' ? `
          <div class="stats-grid">
            ${[['Mean',Fmt.number(stats.mean)],['Median',Fmt.number(stats.median)],['Std dev',Fmt.number(stats.std)],
               ['Min',Fmt.number(stats.min)],['Max',Fmt.number(stats.max)],['Q25',Fmt.number(stats.q25)],
               ['Q75',Fmt.number(stats.q75)],['Null %',`<span style="color:${Fmt.qualityColor(stats.nullPct)}">${Fmt.pct(stats.nullPct)}</span>`],
               ['Unique',stats.uniqueCount.toLocaleString()]].map(([l,v])=>`
              <div class="stat-item"><div class="stat-label">${l}</div><div class="stat-value">${v}</div></div>`).join('')}
          </div>
          <div class="chart-wrap"><div class="card-title">Distribution (weighted)</div><div id="cd-dist" style="height:220px"></div></div>
          ${numCols.length ? `<div class="chart-wrap"><div class="card-title">Correlation with other numeric columns</div><div id="cd-corr"></div></div>` : ''}
        ` : `
          <div class="stats-grid">
            ${[['Unique',stats.uniqueCount.toLocaleString()],['Null %',`<span style="color:${Fmt.qualityColor(stats.nullPct)}">${Fmt.pct(stats.nullPct)}</span>`],
               ['Top value',`<span style="font-size:13px">${stats.topValue}</span>`],['Top %',Fmt.pct(stats.topPct)]].map(([l,v])=>`
              <div class="stat-item"><div class="stat-label">${l}</div><div class="stat-value">${v}</div></div>`).join('')}
          </div>
          <div class="chart-wrap"><div class="card-title">Value counts — top 20 (weighted)</div><div id="cd-dist"></div></div>
        `}
      `;
      requestAnimationFrame(() => {
        if (stats.type === 'numeric') {
          Charts.histogram('cd-dist', State.data, col);
          Charts._register(`Distribution: ${col}`, 'cd-dist');
          if (numCols.length) {
            const pairs = numCols
              .map(c => [c.name, DataEngine.pearsonR(State.data, col, c.name)])
              .sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
            Charts.corrBar('cd-corr', pairs.map(p=>p[0]), pairs.map(p=>p[1]));
            Charts._register(`Correlation: ${col}`, 'cd-corr');
          }
        } else {
          const top20 = stats.valueCounts.slice(0,20);
          Charts.barH('cd-dist', top20.map(([v])=>v), top20.map(([,c])=>c), null, null);
          Charts._register(`Value counts: ${col}`, 'cd-dist');
        }
      });
    },
  },

  // ── Explore ───────────────────────────────────────────────────────────────
  explore: {
    _scatterMode: null,

    render() {

        ${filteredCols.length

              return `<div class="dist-item">

                  <button class="dist-col-link" onclick="UI.openColumnDetail('${Fmt.escHtml(col.name)}','explore')">${Fmt.escHtml(col.name)}</button>

            </select>
            ${sm==='sample'?`<span style="font-size:11px;color:var(--text-3)">${Math.min(State.settings.sampleSize,State.data.length).toLocaleString()} rows sampled</span>`:''}
          </div>
          <div id="chart-scatter" style="height:320px"></div>
          <div id="scatter-stats" style="font-size:11px;color:var(--text-2);margin-top:6px;min-height:18px"></div>
        </div>` : ''}

        ${numCols.length >= 2 ? `
        <div class="section-head">
          <span class="section-title">Pairplot</span>
          <span style="font-size:11px;color:var(--text-3)">${Math.min(State.settings.sampleSize,State.data.length).toLocaleString()} rows sampled</span>
        </div>
        <div class="card" style="margin-bottom:24px">
          <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:10px;flex-wrap:wrap">
            <div>
              <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:6px">Columns</div>
              <div class="pp-col-checks">${numCols.map(c=>`<label class="pp-col-check"><input type="checkbox" ${ppCols.includes(c.name)?'checked':''} onchange="Pages.explore.togglePPCol('${Fmt.escHtml(c.name)}',this.checked)"> ${Fmt.escHtml(c.name)}</label>`).join('')}</div>
            </div>
            <div>
              <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:6px">Color by</div>
              <select class="form-select" id="ppColor" style="width:150px" onchange="Pages.explore.renderPairplot()">
                <option value="">— none —</option>
                ${catCols.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}
              </select>
            </div>
          </div>
          <div id="chart-pairplot"></div>
        </div>` : ''}

        ${numCols.length && catCols.length ? `
        <div class="section-head">
          <span class="section-title">Breakdown</span>
          <div class="toggle-group">
            <button class="toggle-btn ${this._brkType==='box'?'active':''}" onclick="Pages.explore.setBrkType('box')">Box</button>
            <button class="toggle-btn ${this._brkType==='violin'?'active':''}" onclick="Pages.explore.setBrkType('violin')">Violin</button>
            <button class="toggle-btn ${this._brkType==='histogram'?'active':''}" onclick="Pages.explore.setBrkType('histogram')">Histogram</button>
          </div>
        </div>
        <div class="card" style="margin-bottom:24px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--text-2)">Numeric</span>
            <select class="form-select" id="brkNum" style="width:150px" onchange="Pages.explore.renderBreakdown()">
              ${numCols.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:var(--text-2)">Group by</span>
            <select class="form-select" id="brkCat" style="width:150px" onchange="Pages.explore.renderBreakdown()">
              ${catCols.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}
            </select>
          </div>
          <div id="chart-breakdown" style="min-height:300px"></div>
        </div>` : ''}

        ${catCols.length >= 2 ? `
        <div class="section-head">
          <span class="section-title">Cross-tab</span>
          <span style="font-size:11px;color:var(--text-3)">Categorical × Categorical</span>
        </div>
        <div class="card" style="margin-bottom:24px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--text-2)">Primary</span>
            <select class="form-select" id="ctPrim" style="width:150px" onchange="Pages.explore.renderCrossTab()">
              ${catCols.map(c=>`<option value="${Fmt.escHtml(c.name)}">${Fmt.escHtml(c.name)}</option>`).join('')}
            </select>
            <span style="font-size:12px;color:var(--text-2)">Group by</span>
            <select class="form-select" id="ctGrp" style="width:150px" onchange="Pages.explore.renderCrossTab()">
              ${catCols.map((c,i)=>`<option value="${Fmt.escHtml(c.name)}"${i===1?' selected':''}>${Fmt.escHtml(c.name)}</option>`).join('')}
            </select>
          </div>
          <div id="chart-crosstab" style="height:300px"></div>
        </div>` : ''}

        ${nullColsList.length ? `
        <div class="section-head">
          <span class="section-title">Missing values</span>
          <span style="font-size:11px;color:var(--text-3)">${nullColsList.length} column${nullColsList.length!==1?'s':''} with nulls &nbsp;·&nbsp; <span style="color:var(--success)">green</span> = present &nbsp;·&nbsp; <span style="color:var(--danger)">red</span> = missing</span>
        </div>
        <div class="card" style="margin-bottom:24px">
          <div id="chart-missing" style="height:${Math.min(320, nullColsList.length*22+80)}px"></div>
        </div>` : ''}
      `;

      requestAnimationFrame(() => {
        for (const col of filteredCols) {
          const safeId = 'mini-' + col.name.replace(/[^a-zA-Z0-9]/g,'_');
          if (col.type === 'numeric') Charts.miniHist(safeId, State.data, col.name);
          else { const s = DataEngine.columnStats(State.data, col.name); Charts.miniBar(safeId, s.valueCounts.slice(0,10).map(([v])=>v), s.valueCounts.slice(0,10).map(([,c])=>c)); }
        }
        if (numCols.length > 1) {
          const names = numCols.map(c=>c.name);
          const mat = DataEngine.correlationMatrix(names);
          Charts.heatmap('chart-heatmap', mat, names);
          Charts._register('Correlation matrix', 'chart-heatmap');
          this._renderCorrPairs(mat, names);
          this.renderScatter();
        }
        if (numCols.length >= 2) this.renderPairplot();
        if (numCols.length && catCols.length) this.renderBreakdown();
        if (catCols.length >= 2) this.renderCrossTab();
        if (nullColsList.length) this.renderMissingHeatmap(nullColsList);
      });
    },

    // ── Dist filter / sort ─────────────────────────────────────────────────
    _filteredCols(visibleCols) {
      let cols = [...(visibleCols || State.columns.filter(c=>!c.isWeight))];
      const { search, type } = this._distFilter;
      if (type !== 'all') cols = cols.filter(c => c.type === type);
      if (search) { const s = search.toLowerCase(); cols = cols.filter(c => c.name.toLowerCase().includes(s)); }
      if (this._distSort === 'nullpct') return cols.sort((a,b) => b.nullCount - a.nullCount);
      if (this._distSort === 'alpha') return cols.sort((a,b) => a.name.localeCompare(b.name));
      if (this._distSort === 'variance') return cols.sort((a,b) => {
        const va = a.type==='numeric' ? (DataEngine.columnStats(State.data,a.name).std||0) : (DataEngine.columnStats(State.data,a.name).uniqueCount||0);
        const vb = b.type==='numeric' ? (DataEngine.columnStats(State.data,b.name).std||0) : (DataEngine.columnStats(State.data,b.name).uniqueCount||0);
        return vb - va;
      });
      return cols;
    },
    setDistSearch(v) { this._distFilter.search = v; this.render(); },
    setDistType(v) { this._distFilter.type = v; this.render(); },
    setDistSort(v) { this._distSort = v; this.render(); },

    // ── Auto-insights ──────────────────────────────────────────────────────
    _renderInsights(numCols, catCols, visibleCols) {
      const insights = [];
      const nc = visibleCols.filter(c=>c.nullCount>0).sort((a,b)=>b.nullCount-a.nullCount);
      if (nc.length) {
        const top = nc[0], pct = (top.nullCount/State.data.length*100).toFixed(1);
        insights.push(`${nc.length} column${nc.length!==1?'s':''} have missing values — worst: <strong>${Fmt.escHtml(top.name)}</strong> (${pct}%, ${top.nullCount} rows)`);
      }
      if (numCols.length > 1) {
        const names = numCols.map(c=>c.name);
        const mat = DataEngine.correlationMatrix(names);
        let best = null, bestAbs = 0;
        for (let i=0; i<names.length; i++) for (let j=i+1; j<names.length; j++) { const r=mat[i][j]; if (Math.abs(r)>bestAbs) { bestAbs=Math.abs(r); best={a:names[i],b:names[j],r}; } }
        if (best && bestAbs > 0.15) insights.push(`Strongest correlation: <strong>${Fmt.escHtml(best.a)} × ${Fmt.escHtml(best.b)}</strong> (r = ${best.r.toFixed(3)})`);
      }
      let worstSkew = null, worstSkewAbs = 1.5;
      for (const col of numCols) {
        const vals = State.data.map(r=>r[col.name]).filter(v=>v!=null&&isFinite(v));
        if (vals.length < 4) continue;
        const n=vals.length, mean=vals.reduce((a,b)=>a+b,0)/n;
        const m2=vals.reduce((s,v)=>s+(v-mean)**2,0)/n, m3=vals.reduce((s,v)=>s+(v-mean)**3,0)/n;
        const std=Math.sqrt(m2), skew=std>0?m3/std**3:0;
        if (Math.abs(skew)>worstSkewAbs) { worstSkewAbs=Math.abs(skew); worstSkew={name:col.name,skew}; }
      }
      if (worstSkew) insights.push(`<strong>${Fmt.escHtml(worstSkew.name)}</strong> is heavily skewed (${worstSkew.skew>0?'+':''}${worstSkew.skew.toFixed(2)}) — consider a log transform`);
      for (const col of catCols) {
        if ((col.uniqueCount||0) > 20) { insights.push(`<strong>${Fmt.escHtml(col.name)}</strong> has ${col.uniqueCount} unique values — may behave like an identifier`); break; }
      }
      if (!insights.length) return '';
      return `<div class="exp-insights">
        <div class="exp-insights-title">Insights</div>
        <ul class="exp-insights-list">${insights.map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>`;
    },

    // ── Corr top pairs ─────────────────────────────────────────────────────
    _renderCorrPairs(mat, names) {
      const el = document.getElementById('corr-pairs');
      if (!el) return;
      const pairs = [];
      for (let i=0; i<names.length; i++) for (let j=i+1; j<names.length; j++) pairs.push({a:names[i],b:names[j],r:mat[i][j]});
      pairs.sort((a,b)=>Math.abs(b.r)-Math.abs(a.r));
      const rows = pairs.slice(0,10).map(p => {
        const color = p.r>0 ? 'var(--success)' : 'var(--danger)';
        return `<tr>
          <td style="font-size:11px;color:var(--text-2);padding:3px 0;max-width:175px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${Fmt.escHtml(p.a+' × '+p.b)}">${Fmt.escHtml(p.a)} × ${Fmt.escHtml(p.b)}</td>
          <td style="font-size:11px;font-weight:600;color:${color};text-align:right;padding:3px 0 3px 12px;white-space:nowrap">${p.r>=0?'+':''}${p.r.toFixed(3)}</td>
        </tr>`;
      }).join('');
      el.innerHTML = `<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:8px">Top pairs by |r|</div>
        <table style="border-collapse:collapse;width:100%"><tbody>${rows}</tbody></table>`;
    },

    // ── Scatter + trendline ────────────────────────────────────────────────
    setMode(m) { this._scatterMode=m; this.render(); },
    toggleTrend() { this._scatterTrend=!this._scatterTrend; this.renderScatter(); },
    renderScatter() {
      const xEl=document.getElementById('scX'), yEl=document.getElementById('scY'), cEl=document.getElementById('scColor');
      if (!xEl||!yEl) return;
      const rows = DataEngine.sampleRows(State.settings.sampleSize);
      Charts.scatter('chart-scatter', rows, xEl.value, yEl.value, cEl?.value||null, this._scatterMode||'sample');
      Charts._register(`${xEl.value} vs ${yEl.value}`, 'chart-scatter');
      const statsEl = document.getElementById('scatter-stats');
      if (this._scatterTrend) {
        const xs=[], ys=[];
        for (const r of rows) { const x=Number(r[xEl.value]), y=Number(r[yEl.value]); if (isFinite(x)&&isFinite(y)) { xs.push(x); ys.push(y); } }
        if (xs.length > 1) {
          const n=xs.length, mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
          const ssxy=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0), ssxx=xs.reduce((s,x)=>s+(x-mx)**2,0);
          const slope=ssxx?ssxy/ssxx:0, intercept=my-slope*mx;
          const yHat=xs.map(x=>slope*x+intercept);
          const ssTot=ys.reduce((s,y)=>s+(y-my)**2,0), ssRes=ys.reduce((s,y,i)=>s+(y-yHat[i])**2,0);
          const r2=ssTot?1-ssRes/ssTot:0;
          const minX=Math.min(...xs), maxX=Math.max(...xs);
          const chartEl=document.getElementById('chart-scatter');
          if (chartEl) Plotly.addTraces(chartEl, [{
            type:'scatter', mode:'lines',
            x:[minX,maxX], y:[slope*minX+intercept,slope*maxX+intercept],
            line:{color:'var(--warn)',width:2,dash:'dot'},
            showlegend:false, hoverinfo:'skip',
          }]);
          if (statsEl) statsEl.innerHTML = `OLS: y = ${slope>=0?'+':''}${slope.toFixed(4)}x ${intercept>=0?'+':''}${intercept.toFixed(4)} &nbsp;·&nbsp; R² = ${r2.toFixed(4)} &nbsp;·&nbsp; n = ${n.toLocaleString()}`;
        }
      } else { if (statsEl) statsEl.innerHTML = ''; }
    },

    // ── Pairplot + column selector ─────────────────────────────────────────
    togglePPCol(col, checked) {
      const allNum = State.columns.filter(c=>c.type==='numeric'&&!c.isWeight).map(c=>c.name);
      if (this._ppCols===null) this._ppCols=[...allNum];
      if (checked && !this._ppCols.includes(col)) this._ppCols.push(col);
      else if (!checked) this._ppCols=this._ppCols.filter(c=>c!==col);
      this.renderPairplot();
    },
    renderPairplot() {
      const allNum=State.columns.filter(c=>c.type==='numeric'&&!c.isWeight).map(c=>c.name);
      const ppCols=(this._ppCols===null?allNum:this._ppCols).filter(c=>allNum.includes(c));
      const el=document.getElementById('chart-pairplot');
      if (ppCols.length<2) { if(el) el.innerHTML='<div class="placeholder-msg">Select at least 2 columns.</div>'; return; }
      const groupEl=document.getElementById('ppColor');
      const rows=DataEngine.sampleRows(State.settings.sampleSize);
      Charts.pairplot('chart-pairplot', rows, ppCols, groupEl?.value||null);
      Charts._register(`Pairplot${groupEl?.value?' by '+groupEl.value:''}`, 'chart-pairplot');
    },

    // ── Breakdown ──────────────────────────────────────────────────────────
    setBrkType(t) { this._brkType=t; this.render(); },
    renderBreakdown() {
      const numEl=document.getElementById('brkNum'), catEl=document.getElementById('brkCat');
      if (!numEl||!catEl) return;
      const rows=DataEngine.sampleRows(State.settings.sampleSize), t=this._brkType;
      if (t==='histogram') Charts.groupHist('chart-breakdown', rows, numEl.value, catEl.value);
      else Charts.boxViolin('chart-breakdown', rows, numEl.value, catEl.value, t);
      Charts._register(`${numEl.value} by ${catEl.value} (${t})`, 'chart-breakdown');
    },

    // ── Cross-tab ──────────────────────────────────────────────────────────
    renderCrossTab() {
      const primEl=document.getElementById('ctPrim'), grpEl=document.getElementById('ctGrp'), el=document.getElementById('chart-crosstab');
      if (!primEl||!grpEl||!el) return;
      const prim=primEl.value, grp=grpEl.value;
      if (!prim||!grp) return;
      const countMap={};
      const grpVals=new Set();
      for (const row of State.data) {
        const pv=String(row[prim]??'(null)'), gv=String(row[grp]??'(null)');
        grpVals.add(gv);
        if (!countMap[pv]) countMap[pv]={};
        countMap[pv][gv]=(countMap[pv][gv]||0)+1;
      }
      const primVals=Object.entries(countMap).sort((a,b)=>Object.values(b[1]).reduce((s,v)=>s+v,0)-Object.values(a[1]).reduce((s,v)=>s+v,0)).slice(0,15).map(([v])=>v);
      const gVals=[...grpVals].sort().slice(0,12);
      const pal=Charts._catPalette(gVals.length);
      const traces=gVals.map((gv,i)=>({
        type:'bar', name:String(gv),
        x:primVals, y:primVals.map(pv=>countMap[pv]?.[gv]||0),
        marker:{color:pal[i]},
      }));
      Plotly.react(el, traces, {
        barmode:'stack', paper_bgcolor:'transparent', plot_bgcolor:'transparent',
        margin:{t:10,r:10,b:80,l:50},
        xaxis:{tickangle:-30,tickfont:{size:10},color:'var(--text-2)',gridcolor:'var(--border)',title:{text:prim,font:{size:11}}},
        yaxis:{color:'var(--text-2)',gridcolor:'var(--border)',tickfont:{size:10},title:{text:'Count',font:{size:11}}},
        legend:{font:{size:11},bgcolor:'transparent',title:{text:grp,font:{size:11}}},
        font:{family:'inherit',color:'var(--text-2)'},
      }, {responsive:true,displayModeBar:false});
    },

    // ── Missing values heatmap ─────────────────────────────────────────────
    renderMissingHeatmap(nullColsList) {
      const el=document.getElementById('chart-missing');
      if (!el) return;
      const cols=nullColsList||State.columns.filter(c=>!c.isWeight&&c.nullCount>0);
      if (!cols.length) return;
      const step=Math.max(1,Math.floor(State.data.length/150));
      const sampled=[];
      for (let i=0;i<State.data.length;i+=step) sampled.push(State.data[i]);
      const names=cols.map(c=>c.name);
      const z=sampled.map(row=>names.map(col=>(row[col]==null||row[col]==='') ? 1 : 0));
      Plotly.react(el, [{
        type:'heatmap', z, x:names,
        colorscale:[[0,'#3ecf8e'],[1,'#ff5f5f']],
        showscale:false, zmin:0, zmax:1,
        hovertemplate:'%{x}: %{z}<extra></extra>',
      }], {
        paper_bgcolor:'transparent', plot_bgcolor:'transparent',
        margin:{t:10,r:10,b:70,l:30},
        xaxis:{tickangle:-35,tickfont:{size:10},color:'var(--text-2)'},
        yaxis:{visible:false},
        font:{family:'inherit'},
      }, {responsive:true,displayModeBar:false});
    },
  },

  // ── Transform ─────────────────────────────────────────────────────────────
  transform: {
    _aggIdx: 0,

    render() {
      const el = document.getElementById('page-transform');
      if (!State.rawData) {
        el.innerHTML = `<div class="empty-state"><div class="empty-title">No dataset loaded</div><div class="empty-sub">Load a CSV from the Overview page first.</div></div>`;
        return;
      }
      const steps = State.transforms;
      const n = steps.length;
      el.innerHTML = `
        ${n > 0 ? `<div class="tfm-banner">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 3.5h10M3.5 6.5h6M5.5 9.5h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          ${n} step${n > 1 ? 's' : ''} active — Overview and Explore reflect derived data
          <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="Pages.transform.downloadCSV()">Download CSV</button>
          <button class="btn btn-ghost btn-sm" onclick="Pages.transform.resetAll()">Reset all</button>
        </div>` : ''}
        <div class="tfm-layout">
          <div class="tfm-palette">
            <div class="tfm-palette-title">Add step</div>
            ${[['filter','Filter rows'],['rollup','Rollup'],['pivot','Pivot'],['unpivot','Unpivot'],
               ['calc','Calculated column'],['rename','Rename column'],['drop','Drop column']]
              .map(([t, l]) => `<button class="tfm-palette-btn" onclick="Pages.transform.openModal('${t}',null)">${l}</button>`).join('')}
            <div class="tfm-palette-title" style="margin-top:12px">Model prep</div>
            ${[['null_handling','Null handling'],['model_split','Model split']]
              .map(([t, l]) => `<button class="tfm-palette-btn" onclick="Pages.transform.openModal('${t}',null)">${l}</button>`).join('')}
          </div>
          <div class="tfm-right">
            ${n === 0
              ? `<div class="tfm-empty">Click a step type on the left to build your pipeline</div>`
              : steps.map((step, i) => {
                  const cnt = State._stepCounts?.[i];
                  const countHtml = cnt ? `<span class="step-count${cnt.after < cnt.before ? ' step-count-drop' : ''}">${cnt.before.toLocaleString()} → ${cnt.after.toLocaleString()}</span>` : '';
                  const disabled = step.enabled === false;
                  return `
                <div class="step-card${disabled ? ' step-disabled' : ''}">
                  <div class="step-card-head">
                    <span class="step-num">${i + 1}</span>
                    <span class="step-type">${step.type}</span>
                    <span class="step-summary">${this._summary(step)}</span>
                    ${countHtml}
                    <div class="step-actions">
                      <button class="btn-icon" onclick="Pages.transform.moveStep(${i},-1)" title="Move up"${i===0?' disabled':''}>↑</button>
                      <button class="btn-icon" onclick="Pages.transform.moveStep(${i},1)" title="Move down"${i===n-1?' disabled':''}>↓</button>
                      <button class="btn btn-ghost btn-sm" onclick="Pages.transform.toggleStep(${i})">${disabled ? 'Enable' : 'Disable'}</button>
                      <button class="btn btn-ghost btn-sm" onclick="Pages.transform.openModal('${step.type}',${i})">Edit</button>
                      <button class="btn-icon" onclick="Pages.transform.removeStep(${i})" title="Remove">${I.x}</button>
                    </div>
                  </div>
                </div>`;
                }).join('')}
            ${n > 0 ? `
              <div>
                <div class="section-head" style="margin-bottom:8px">
                  <span class="section-title">Preview <span style="font-weight:400;text-transform:none;color:var(--text-3)">(${Math.min(10, State.data.length)} of ${State.data.length.toLocaleString()} rows)</span></span>
                </div>
                <div class="table-wrap">
                  <table class="data-table">
                    <thead><tr>${State.columns.map(c => `<th>${c.name}</th>`).join('')}</tr></thead>
                    <tbody>${State.data.slice(0, 10).map(row =>
                      `<tr>${State.columns.map(c => `<td>${Fmt.cell(row[c.name], c.name)}</td>`).join('')}</tr>`
                    ).join('')}</tbody>
                  </table>
                </div>
              </div>` : ''}
          </div>
        </div>`;
    },

    _summary(step) {
      const p = step.params;
      switch(step.type) {
        case 'filter':  return `${p.col} ${p.op} "${p.value}"`;
        case 'rollup':  return `group by [${(p.groupBy||[]).join(', ')}] · ${(p.aggs||[]).map(a=>`${a.fn}(${a.col})`).join(', ')}`;
        case 'pivot':   return `${p.pivotCol} → cols, ${p.valueCol} values (${p.aggFn})`;
        case 'unpivot': return `melt → ${p.varName} / ${p.valName}`;
        case 'calc':    return `${p.newCol} = ${p.expression}`;
        case 'rename':        return `${p.oldName} → ${p.newName}`;
        case 'drop':          return p.col;
        case 'null_handling': return (p.actions||[]).map(a=>`${a.col}:${a.strategy}`).join(', ') || 'no actions';
        case 'model_split':   return `${p.strategy||'random'} · ${p.train??70}/${p.validation??15}/${100-(p.train??70)-(p.validation??15)}% → ${p.outputCol||'_split'}`;
        case 'apply_model':   return `→ ${p.scoreCol||'_score'}, ${p.probCol||'_prob'}`;
        default: return '';
      }
    },

    _opts(selected, cols) {
      return (cols || State.columns).map(c =>
        `<option value="${c.name}" ${c.name === selected ? 'selected' : ''}>${c.name}</option>`
      ).join('');
    },

    openModal(type, editIdx) {
      const p = (editIdx !== null && editIdx !== undefined) ? State.transforms[editIdx].params : {};
      const cols = State.columns;
      const numCols = cols.filter(c => c.type === 'numeric' && !c.isWeight);
      const catCols = cols.filter(c => c.type === 'categorical');
      const g = id => document.getElementById(id);
      let title, body, onConfirm;

      if (type === 'filter') {
        title = 'Filter rows';
        body = `
          <div class="modal-section"><div class="modal-label">Column</div>
            <select class="form-select" id="tf-col" style="width:100%">${this._opts(p.col)}</select></div>
          <div class="modal-section"><div class="modal-label">Operator</div>
            <select class="form-select" id="tf-op" style="width:100%">
              ${['=','!=','<','>','>=','<=','contains'].map(op=>
                `<option value="${op}" ${p.op===op?'selected':''}>${op}</option>`).join('')}
            </select></div>
          <div class="modal-section"><div class="modal-label">Value</div>
            <input class="form-input" id="tf-val" style="width:100%" value="${p.value||''}" placeholder="enter value"/></div>`;
        onConfirm = () => {
          const col = g('tf-col')?.value, op = g('tf-op')?.value, value = g('tf-val')?.value;
          if (!col || !op || value === undefined || value === '') { UI.toast('Fill in all fields'); return; }
          this._commit(type, { col, op, value }, editIdx);
        };

      } else if (type === 'rollup') {
        this._aggIdx = 0;
        const existGB = p.groupBy || [];
        const existAggs = p.aggs || (numCols.length ? [{ col: numCols[0].name, fn: 'sum' }] : []);
        title = 'Rollup';
        body = `
          <div class="modal-section"><div class="modal-label">Group by</div>
            <div id="gb-checks" style="max-height:160px;overflow-y:auto">
              ${cols.map(c => `<div class="check-row">
                <input type="checkbox" id="gb-${c.name.replace(/\W/g,'_')}" value="${c.name}" ${existGB.includes(c.name)?'checked':''}>
                <label for="gb-${c.name.replace(/\W/g,'_')}">${c.name}</label></div>`).join('')}
            </div></div>
          <div class="modal-section"><div class="modal-label">Aggregations</div>
            <div id="agg-rows"></div>
            <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="Pages.transform._addAggRow()">+ Add aggregation</button>
          </div>`;
        onConfirm = () => {
          const groupBy = Array.from(document.querySelectorAll('#gb-checks input:checked')).map(cb => cb.value);
          if (!groupBy.length) { UI.toast('Select at least one group-by column'); return; }
          const aggRows = document.querySelectorAll('.agg-row');
          const aggs = Array.from(aggRows).map(row => {
            const idx = row.dataset.idx;
            return { col: g(`agg-col-${idx}`)?.value, fn: g(`agg-fn-${idx}`)?.value };
          }).filter(a => a.col && a.fn);
          if (!aggs.length) { UI.toast('Add at least one aggregation'); return; }
          this._commit(type, { groupBy, aggs }, editIdx);
        };
        setTimeout(() => existAggs.forEach(a => this._addAggRow(a.col, a.fn)), 0);

      } else if (type === 'pivot') {
        title = 'Pivot';
        body = `
          <div class="modal-section"><div class="modal-label">Index columns (kept as rows)</div>
            <div style="max-height:140px;overflow-y:auto">
              ${cols.map(c => `<div class="check-row">
                <input type="checkbox" id="idx-${c.name.replace(/\W/g,'_')}" value="${c.name}" ${(p.indexCols||[]).includes(c.name)?'checked':''}>
                <label for="idx-${c.name.replace(/\W/g,'_')}">${c.name}</label></div>`).join('')}
            </div></div>
          <div class="modal-section"><div class="modal-label">Pivot column (values become headers)</div>
            <select class="form-select" id="tf-pivcol" style="width:100%">${this._opts(p.pivotCol)}</select></div>
          <div class="modal-section"><div class="modal-label">Value column</div>
            <select class="form-select" id="tf-valcol" style="width:100%">${this._opts(p.valueCol, numCols)}</select></div>
          <div class="modal-section"><div class="modal-label">Aggregation</div>
            <select class="form-select" id="tf-aggfn" style="width:100%">
              ${['sum','mean','count','min','max','first'].map(f=>
                `<option value="${f}" ${p.aggFn===f?'selected':''}>${f}</option>`).join('')}
            </select></div>`;
        onConfirm = () => {
          const indexCols = Array.from(document.querySelectorAll('.modal input[type=checkbox]:checked')).map(cb => cb.value);
          const pivotCol = g('tf-pivcol')?.value, valueCol = g('tf-valcol')?.value, aggFn = g('tf-aggfn')?.value;
          if (!pivotCol || !valueCol) { UI.toast('Select pivot and value columns'); return; }
          this._commit(type, { indexCols, pivotCol, valueCol, aggFn }, editIdx);
        };

      } else if (type === 'unpivot') {
        title = 'Unpivot (Melt)';
        body = `
          <div class="modal-section"><div class="modal-label">ID columns (kept as-is)</div>
            <div style="max-height:160px;overflow-y:auto">
              ${cols.map(c => `<div class="check-row">
                <input type="checkbox" id="id-${c.name.replace(/\W/g,'_')}" value="${c.name}" ${(p.idCols||[]).includes(c.name)?'checked':''}>
                <label for="id-${c.name.replace(/\W/g,'_')}">${c.name}</label></div>`).join('')}
            </div></div>
          <div class="modal-section"><div class="modal-label">Variable column name</div>
            <input class="form-input" id="tf-varname" style="width:100%" value="${p.varName||'variable'}"/></div>
          <div class="modal-section"><div class="modal-label">Value column name</div>
            <input class="form-input" id="tf-valname" style="width:100%" value="${p.valName||'value'}"/></div>`;
        onConfirm = () => {
          const idCols = Array.from(document.querySelectorAll('.modal input[type=checkbox]:checked')).map(cb => cb.value);
          const varName = g('tf-varname')?.value?.trim() || 'variable';
          const valName = g('tf-valname')?.value?.trim() || 'value';
          this._commit(type, { idCols, varName, valName }, editIdx);
        };

      } else if (type === 'calc') {
        title = 'Calculated column';
        body = `
          <div class="modal-section"><div class="modal-label">New column name</div>
            <input class="form-input" id="tf-newcol" style="width:100%" value="${p.newCol||''}" placeholder="my_column"/></div>
          <div class="modal-section"><div class="modal-label">Expression (column names are variables)</div>
            <input class="form-input" id="tf-expr" style="width:100%;font-family:var(--mono)" value="${(p.expression||'').replace(/"/g,'&quot;')}" placeholder="col_a / col_b * 100"/>
            <div class="col-hints">
              ${cols.map(c=>`<span class="col-hint" onclick="(()=>{const el=document.getElementById('tf-expr');el.value=(el.value+' ${c.name}').trim()})()">${c.name}</span>`).join('')}
            </div></div>`;
        onConfirm = () => {
          const newCol = g('tf-newcol')?.value?.trim();
          const expression = g('tf-expr')?.value?.trim();
          if (!newCol) { UI.toast('Enter a column name'); return; }
          if (!expression) { UI.toast('Enter an expression'); return; }
          this._commit(type, { newCol, expression }, editIdx);
        };

      } else if (type === 'rename') {
        title = 'Rename column';
        body = `
          <div class="modal-section"><div class="modal-label">Column to rename</div>
            <select class="form-select" id="tf-oldname" style="width:100%">${this._opts(p.oldName)}</select></div>
          <div class="modal-section"><div class="modal-label">New name</div>
            <input class="form-input" id="tf-newname" style="width:100%" value="${p.newName||''}" placeholder="new_name"/></div>`;
        onConfirm = () => {
          const oldName = g('tf-oldname')?.value, newName = g('tf-newname')?.value?.trim();
          if (!oldName || !newName) { UI.toast('Fill in both fields'); return; }
          if (oldName === newName) { UI.toast('Names are the same'); return; }
          this._commit(type, { oldName, newName }, editIdx);
        };

      } else if (type === 'drop') {
        title = 'Drop column';
        body = `
          <div class="modal-section"><div class="modal-label">Column to remove</div>
            <select class="form-select" id="tf-dropcol" style="width:100%">${this._opts(p.col)}</select></div>`;
        onConfirm = () => {
          const col = g('tf-dropcol')?.value;
          if (!col) return;
          this._commit(type, { col }, editIdx);
        };

      } else if (type === 'null_handling') {
        title = 'Null handling';
        const nullCols = State.columns.filter(c => c.nullCount > 0 && !c.isWeight);
        const existActions = p.actions || [];
        if (!nullCols.length) {
          body = `<p style="font-size:12px;color:var(--text-2)">No columns with missing values in the current dataset.</p>`;
          onConfirm = () => { UI.toast('No nulls to handle'); };
        } else {
          body = `
            <p style="font-size:12px;color:var(--text-2);margin-bottom:12px">Configure how to handle missing values. Unconfigured columns are left unchanged.</p>
            <table class="nh-table">
              <thead><tr><th>Column</th><th>Nulls</th><th>Null %</th><th>Strategy</th><th>Value</th></tr></thead>
              <tbody>
                ${nullCols.map((col, i) => {
                  const ex = existActions.find(a => a.col === col.name) || {};
                  const isNum = col.type === 'numeric';
                  const stratOpts = [
                    ['', '— skip —'],
                    ...(isNum ? [['mean','Mean'],['median','Median']] : []),
                    ['mode','Mode'],['constant','Constant'],['drop','Drop rows'],
                    ['indicator','Add indicator'],['ffill','Forward fill'],['bfill','Backward fill'],
                  ].map(([v, l]) => `<option value="${v}" ${ex.strategy===v?'selected':''}>${l}</option>`).join('');
                  const nullPct = State.data?.length ? ((col.nullCount / State.data.length) * 100).toFixed(1) : '?';
                  return `<tr>
                    <td style="font-family:var(--mono);font-size:11px;white-space:nowrap">${Fmt.escHtml(col.name)}</td>
                    <td style="color:var(--danger);text-align:right">${col.nullCount.toLocaleString()}</td>
                    <td style="color:var(--danger);text-align:right">${nullPct}%</td>
                    <td><select id="nh-strat-${i}" onchange="Pages.transform._nhToggleVal(${i})">${stratOpts}</select></td>
                    <td><input id="nh-val-${i}" type="text" placeholder="value" value="${Fmt.escHtml(ex.value||'')}" style="display:${ex.strategy==='constant'?'block':'none'}"></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>`;
          onConfirm = () => {
            const actions = nullCols.map((col, i) => {
              const strategy = g(`nh-strat-${i}`)?.value;
              if (!strategy) return null;
              const value = g(`nh-val-${i}`)?.value ?? '';
              return { col: col.name, strategy, value };
            }).filter(Boolean);
            if (!actions.length) { UI.toast('Select at least one strategy'); return; }
            this._commit('null_handling', { actions }, editIdx);
          };
        }

      } else if (type === 'model_split') {
        title = 'Model split';
        const allCols = State.columns.filter(c => !c.isWeight);
        const exStrat = p.strategy || 'random';
        const exTrain = p.train ?? 70, exVal = p.validation ?? 15;
        body = `
          <div class="modal-section"><div class="modal-label">Strategy</div>
            <select class="form-select" id="ms-strat" style="width:100%" onchange="Pages.transform._msUpdateSplit()">
              ${[['random','Random'],['stratified','Stratified by target'],['time','Time-based']]
                .map(([v,l])=>`<option value="${v}" ${exStrat===v?'selected':''}>${l}</option>`).join('')}
            </select></div>
          <div class="modal-section">
            <div class="modal-label">Split ratios (must sum to 100%)</div>

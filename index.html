            <div class="ms-ratio-row"><label>Train %</label><input class="form-input" id="ms-train" type="number" min="1" max="98" value="${exTrain}" oninput="Pages.transform._msUpdateSplit()"></div>
            <div class="ms-ratio-row" style="margin-top:6px"><label>Validation %</label><input class="form-input" id="ms-val" type="number" min="0" max="97" value="${exVal}" oninput="Pages.transform._msUpdateSplit()"></div>
            <div class="ms-ratio-preview" id="ms-preview">Test: ${100-exTrain-exVal}%</div>
          </div>
          <div class="modal-section"><div class="modal-label">Seed (for reproducibility)</div>
            <input class="form-input" id="ms-seed" type="number" style="width:100%" value="${p.seed??42}"></div>
          <div class="modal-section"><div class="modal-label">Output column name</div>
            <input class="form-input" id="ms-out" style="width:100%" value="${p.outputCol||'_split'}"></div>
          <div id="ms-stratcol-wrap" class="modal-section" style="display:${exStrat==='stratified'?'block':'none'}">
            <div class="modal-label">Stratify by column</div>
            <select class="form-select" id="ms-stratcol" style="width:100%">
              ${allCols.map(c=>`<option value="${c.name}" ${p.stratifyCol===c.name?'selected':''}>${c.name}</option>`).join('')}
            </select></div>
          <div id="ms-timecol-wrap" class="modal-section" style="display:${exStrat==='time'?'block':'none'}">
            <div class="modal-label">Time / index column</div>
            <select class="form-select" id="ms-timecol" style="width:100%">
              ${allCols.map(c=>`<option value="${c.name}" ${p.timeCol===c.name?'selected':''}>${c.name}</option>`).join('')}
            </select></div>`;
        onConfirm = () => {
          const strategy = g('ms-strat')?.value || 'random';
          const train = parseInt(g('ms-train')?.value) || 70;
          const validation = parseInt(g('ms-val')?.value) || 0;
          const test = 100 - train - validation;
          if (test < 1) { UI.toast('Test split must be at least 1%'); return; }
          const seed = parseInt(g('ms-seed')?.value) || 42;
          const outputCol = g('ms-out')?.value?.trim() || '_split';
          const stratifyCol = strategy === 'stratified' ? g('ms-stratcol')?.value : null;
          const timeCol = strategy === 'time' ? g('ms-timecol')?.value : null;
          this._commit('model_split', { strategy, train, validation, test, seed, outputCol, stratifyCol, timeCol }, editIdx);
        };
      }

      Modal.show(title, body, onConfirm);
    },

    _commit(type, params, editIdx) {
      if (editIdx !== null && editIdx !== undefined) {
        const existing = State.transforms[editIdx];
        State.transforms[editIdx] = { ...existing, type, params };
      } else {
        State.transforms.push({ id: Date.now().toString(36), type, params, enabled: true });
      }
      DataEngine.recompute();
      Modal.hide();
      this.render();
      UI.toast((editIdx !== null && editIdx !== undefined) ? 'Step updated' : 'Step added');
    },

    _addAggRow(col, fn) {
      const i = this._aggIdx++;
      const numCols = State.columns.filter(c => c.type === 'numeric' && !c.isWeight);
      const row = document.createElement('div');
      row.className = 'agg-row'; row.dataset.idx = i;
      row.innerHTML = `
        <select class="form-select" id="agg-col-${i}" style="flex:1">
          ${numCols.map(c=>`<option value="${c.name}" ${c.name===col?'selected':''}>${c.name}</option>`).join('')}
        </select>
        <select class="form-select" id="agg-fn-${i}" style="width:85px">
          ${['sum','mean','count','min','max'].map(f=>`<option value="${f}" ${f===fn?'selected':''}>${f}</option>`).join('')}
        </select>
        <button class="btn-icon" onclick="this.closest('.agg-row').remove()" title="Remove">${I.x}</button>`;
      const container = document.getElementById('agg-rows');
      if (container) container.appendChild(row);
    },

    removeStep(i) {
      State.transforms.splice(i, 1);
      DataEngine.recompute();
      this.render();
      UI.toast('Step removed');
    },

    toggleStep(i) {
      const step = State.transforms[i];
      step.enabled = step.enabled === false;
      DataEngine.recompute();
      this.render();
    },

    moveStep(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= State.transforms.length) return;
      [State.transforms[i], State.transforms[j]] = [State.transforms[j], State.transforms[i]];
      DataEngine.recompute();
      this.render();
    },

    downloadCSV() {
      DataEngine.exportCSV();
      UI.toast('CSV downloaded');
    },

    _nhToggleVal(i) {
      const strat = document.getElementById(`nh-strat-${i}`)?.value;
      const inp = document.getElementById(`nh-val-${i}`);
      if (inp) inp.style.display = strat === 'constant' ? 'block' : 'none';
    },

    _msUpdateSplit() {
      const train = parseInt(document.getElementById('ms-train')?.value) || 0;
      const val   = parseInt(document.getElementById('ms-val')?.value)   || 0;
      const test  = 100 - train - val;
      const prev  = document.getElementById('ms-preview');
      if (prev) prev.textContent = `Test: ${test}%` + (test < 1 ? ' — must be at least 1%' : '');
      const strat = document.getElementById('ms-strat')?.value;
      const sw = document.getElementById('ms-stratcol-wrap');
      const tw = document.getElementById('ms-timecol-wrap');
      if (sw) sw.style.display = strat === 'stratified' ? 'block' : 'none';
      if (tw) tw.style.display = strat === 'time'       ? 'block' : 'none';
    },

    resetAll() {
      if (!confirm('Remove all transform steps?')) return;
      State.transforms = [];
      DataEngine.recompute();
      this.render();
      UI.toast('All transforms cleared');
    },
  },

  // ── Models ────────────────────────────────────────────────────────────────
  models: {
    _activeId: null,
    _running: false,
    _compareMode: false,

    render() {
      const el = document.getElementById('page-models');
      if (!State.rawData) {
        el.innerHTML = `<div class="empty-state"><div class="empty-title">No dataset loaded</div><div class="empty-sub">Load a CSV from the Overview page first.</div></div>`;
        return;
      }
      // Sync active tab
      if (!this._activeId || !State.models.find(m => m.id === this._activeId))
        this._activeId = State.models[0]?.id || null;
      const active = State.models.find(m => m.id === this._activeId);

      el.innerHTML = `
        ${this._renderPrerequisites()}
        <div class="mdl-tabs-bar">
          ${State.models.map(m => `
            <button class="mdl-tab${m.id===this._activeId?' active':''}" onclick="Pages.models.setActive('${m.id}')">
              ${Fmt.escHtml(m.name)}
              <span class="mdl-tab-close" onclick="event.stopPropagation();Pages.models.removeModel('${m.id}')">${I.x}</span>
            </button>`).join('')}
          <button class="mdl-tab-add" onclick="Pages.models.addModel('scorecard')">+ Scorecard</button>
          ${State.models.length >= 2 ? `<button class="btn btn-ghost btn-sm mdl-compare-btn${this._compareMode?' active':''}" onclick="Pages.models.compare()">${this._compareMode ? 'Back to workbench' : 'Compare models'}</button>` : ''}
          ${active && !this._compareMode ? `<button class="btn btn-ghost btn-sm mdl-compare-btn${active._searchMode?' active':''}" onclick="Pages.models.toggleSearch('${active.id}')">${active._searchMode ? '← Workbench' : 'Parameter search'}</button>` : ''}
        </div>
        ${this._compareMode
          ? this._renderCompare()
          : active
            ? (active._searchMode ? this._renderSearch(active) : this._renderWorkbench(active))
            : `<div class="empty-state" style="margin-top:32px"><div class="empty-title">No models yet</div><div class="empty-sub">Click "+ Scorecard" to create your first model.</div></div>`}`;

      if (!this._compareMode && active) {
        if (active._searchMode && active._searchResults) requestAnimationFrame(() => this.renderSearchCharts(active));
        else if (active.results && !active._searchMode) requestAnimationFrame(() => this._renderCharts(active));
      }
    },

    _renderPrerequisites() {
      const nhSteps = State.transforms.filter(s => s.type === 'null_handling' && s.enabled !== false);
      const handledCols = nhSteps.flatMap(s => (s.params.actions || []).map(a => a.col));
      const nullCols = State.columns.filter(c => c.nullCount > 0 && !c.isWeight);
      const splitCol = State.columns.find(c => c.name === '_split') ||
        State.transforms.find(s => s.type === 'model_split' && s.enabled !== false);

      const tb = (stepType, label) =>
        `<button class="btn btn-ghost btn-sm" style="margin-left:auto;flex-shrink:0"
          onclick="UI.navigate('transform');setTimeout(()=>Pages.transform.openModal('${stepType}',null),120)">${label} →</button>`;

      const nullItem = nullCols.length === 0
        ? `<div class="mdl-prereq-item ok"><span class="mdl-prereq-icon">✓</span><span>No missing values</span></div>`
        : handledCols.length
          ? `<div class="mdl-prereq-item ok"><span class="mdl-prereq-icon">✓</span><span>Null handling applied — ${handledCols.map(Fmt.escHtml).join(', ')}</span></div>`
          : `<div class="mdl-prereq-item warn"><span class="mdl-prereq-icon">!</span>
              <span>${nullCols.length} column${nullCols.length>1?'s':''} with nulls — not handled (${nullCols.map(c=>Fmt.escHtml(c.name)).join(', ')})</span>
              ${tb('null_handling','Set up null handling')}</div>`;

      const splitItem = splitCol
        ? `<div class="mdl-prereq-item ok"><span class="mdl-prereq-icon">✓</span><span>Split column present — train/validation/test metrics available</span></div>`
        : `<div class="mdl-prereq-item warn"><span class="mdl-prereq-icon">!</span>
            <span>No split column — full-data metrics only</span>${tb('model_split','Set up split')}</div>`;

      return `<div class="mdl-prereq"><div class="mdl-prereq-title">Data preparation</div>${nullItem}${splitItem}</div>`;
    },

    _renderWorkbench(model) {
      return `<div class="mdl-workbench">
        <div class="mdl-config">${this._renderSetup(model)}${this._renderVariables(model)}${this._renderParams(model)}
          <div class="mdl-run-area">
            <button class="btn btn-primary" onclick="Pages.models.runModel('${model.id}')"${this._running?' disabled':''}>
              ${model.results ? 'Re-run scorecard' : 'Run scorecard'}
            </button>
            ${model.results ? `<button class="btn btn-ghost btn-sm" onclick="Pages.models.applyToDataset('${model.id}')">Apply to dataset</button>` : ''}
            ${model._error ? `<div class="mdl-error">${Fmt.escHtml(model._error)}</div>` : ''}
          </div>
        </div>
        <div class="mdl-outputs">
          ${model.results ? this._renderOutputs(model) : `<div class="empty-state"><div class="empty-title">Ready to run</div><div class="empty-sub">Select a target and predictors, then click Run scorecard.</div></div>`}
        </div>
      </div>`;
    },

    _renderSetup(model) {
      const cols = State.columns.filter(c => !c.isWeight);
      const p = model.params;
      const targetOpts = cols.map(c =>
        `<option value="${Fmt.escHtml(c.name)}"${c.name===p.target?' selected':''}>${Fmt.escHtml(c.name)}</option>`).join('');
      const predList = cols.filter(c => c.name !== p.target).map(c => {
        const chk = (p.predictors||[]).includes(c.name) ? ' checked' : '';
        return `<label class="mdl-pred-item">
          <input type="checkbox"${chk} onchange="Pages.models.togglePredictor('${model.id}','${Fmt.escHtml(c.name)}',this.checked)">
          <span style="font-size:9px;padding:1px 4px;border-radius:2px;background:var(--border);color:var(--text-3);flex-shrink:0">${c.type==='numeric'?'N':'C'}</span>
          ${Fmt.escHtml(c.name)}${c.nullCount>0?` <span style="color:var(--warn);font-size:9px">(${c.nullCount} null)</span>`:''}
        </label>`;
      }).join('');
      return `<div class="mdl-section">
        <div class="mdl-section-title">Setup</div>
        <div class="mdl-field">
          <label>Target <span class="mdl-tip" title="Binary column (0/1). Event = 1. Only rows with 0 or 1 are used.">?</span></label>
          <select onchange="Pages.models.updateParam('${model.id}','target',this.value)">
            <option value="">— select —</option>${targetOpts}
          </select>
        </div>
        <div class="mdl-field" style="align-items:flex-start">
          <label style="padding-top:6px">Predictors</label>
          <div style="flex:1;min-width:0">
            <div class="mdl-pred-list">${predList}</div>
            <div style="display:flex;gap:4px;margin-top:4px">
              <button class="btn btn-ghost btn-xs" style="font-size:10px;padding:2px 6px" onclick="Pages.models.selectAllPreds('${model.id}',true)">All</button>
              <button class="btn btn-ghost btn-xs" style="font-size:10px;padding:2px 6px" onclick="Pages.models.selectAllPreds('${model.id}',false)">None</button>
            </div>
          </div>
        </div>
      </div>`;
    },

    _renderParams(model) {
      const p = model.params;
      const id = model.id;
      const sel = (key, opts, tip) => {
        const selHtml = `<select onchange="Pages.models.updateParam('${id}','${key}',this.value)">
          ${opts.map(([v,l])=>`<option value="${v}"${String(p[key])===String(v)?' selected':''}>${l}</option>`).join('')}
        </select>`;
        return selHtml;
      };
      const num = (key, attrs, tip) =>
        `<input type="number" value="${p[key]}" ${attrs} onchange="Pages.models.updateParam('${id}','${key}',Number(this.value))">`;
      const field = (label, tip, input) =>
        `<div class="mdl-field"><label>${label} <span class="mdl-tip" title="${tip}">?</span></label>${input}</div>`;

      return `<div class="mdl-section">
        <div class="mdl-section-title">Parameters</div>
        ${field('Max bins','Max bins per predictor after DP optimization. Fewer = simpler scorecard, less overfit. Typical: 3–6.',num('maxBins','min="2" max="20" step="1"'))}
        ${field('Pre-bins','Initial quantile bins before DP (K). Higher = finer granularity. 15–25 is usually sufficient.',num('preBinsK','min="5" max="50" step="1"'))}
        ${field('Monotonicity','WoE direction constraint. Auto tries ascending and descending, picks highest IV. Applies to numeric predictors only.',sel('monotonicity',[['auto','Auto'],['ascending','Ascending'],['descending','Descending'],['unconstrained','None']]))}
        ${field('Cat. ordering','How categories are sorted before binning. Event rate (ascending) is recommended for monotone WoE.',sel('catOrdering',[['event_rate','Event rate'],['frequency','Frequency'],['alphabetical','Alphabetical']]))}
        ${field('IV threshold','Predictors below this IV are excluded. < 0.02 useless · 0.02–0.1 weak · 0.1–0.3 moderate · > 0.3 strong.',num('ivThreshold','min="0" max="1" step="0.01"'))}
        ${field('L2 lambda','Regularization strength for logistic regression on WoE-compressed data. Higher = smaller coefficients.',num('lambda','min="0.0001" max="10" step="0.001"'))}
        ${field('Iterations','Max gradient descent iterations for LR fitting. 300–500 typically converges.',num('maxIter','min="50" max="2000" step="50"'))}
        ${field('PDO','Points to Double the Odds. A 20-pt drop in score = 2× event odds. Industry standard: 20–40.',num('PDO','min="5" max="80" step="5"'))}
        ${field('Base score','Score at base odds. 600–700 is typical in credit scoring.',num('baseScore','min="100" max="1000" step="10"'))}
        ${field('Base odds','Reference odds (events/non-events) at base score. E.g. 1/19 ≈ 5% event rate.',num('baseOdds','min="0.001" max="10" step="0.001"'))}
      </div>`;
    },

    _renderOutputs(model) {
      const r = model.results;
      if (!r) return '';
      return `${this._renderPerformance(r)}${this._renderScorecardTable(r, model)}${this._renderIVSummary(r)}${this._renderBinningDetail(r)}`;
    },

    _renderPerformance(r) {
      const fmt4 = v => v==null ? '—' : v.toFixed(4);
      const fmtPct = v => v==null ? '—' : (v*100).toFixed(2)+'%';
      const rows = Object.entries(r.metrics).map(([split, m]) =>
        `<tr><td>${split}</td><td>${fmt4(m.gini)}</td><td>${fmt4(m.auc)}</td><td>${fmtPct(m.ks)}</td></tr>`).join('');
      return `<div class="mdl-out-section">
        <div class="mdl-out-title">Performance</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
          <table class="mdl-metrics-table">
            <thead><tr><th>Split</th><th>Gini</th><th>AUC</th><th>KS</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div id="mdl-roc-${r.id}" style="flex:1;min-width:220px;height:200px"></div>
        </div>
        <div id="mdl-hist-${r.id}" style="width:100%;height:150px;margin-top:8px"></div>
      </div>`;
    },

    _renderScorecardTable(r, model) {
      const hm = model?._scHeatmap;
      const id = model?.id;

      // Compute event rates for all bins → normalise for heatmap
      const allBins = r.predictors.flatMap(col =>
        (r.points_tables[col]||[]).filter(b => !b.isNull || b.events > 0));
      const rates = allBins.map(b => { const tot = b.events + b.nonevents; return tot ? b.events / tot : 0; });
      const minR = Math.min(...rates), maxR = Math.max(...rates);
      const rRange = maxR - minR || 1;

      const rateStyle = (b) => {
        if (!hm) return '';
        const tot = b.events + b.nonevents;
        const rate = tot ? b.events / tot : 0;
        const t = (rate - minR) / rRange;           // 0=blue(low risk), 1=red(high risk)
        const h = Math.round(240 - t * 240);
        return ` style="background:hsla(${h},65%,50%,.18);color:hsl(${h},55%,38%);font-weight:600"`;
      };

      const tableRows = r.predictors.flatMap(col => {
        const bins = (r.points_tables[col] || []).filter(b => !b.isNull || b.events > 0);
        return bins.map((b, i) => {
          const tot = b.events + b.nonevents;
          const evtPct = tot ? (b.events / tot * 100).toFixed(1) + '%' : '—';
          return `<tr${b.isNull?' class="sc-null-row"':''}>
            ${i===0 ? `<td rowspan="${bins.length}" class="sc-var-cell">${Fmt.escHtml(col)}<br><span style="font-size:9px;color:var(--text-3)">IV ${(r.iv_summary[col]||0).toFixed(3)}</span></td>` : ''}
            <td>${Fmt.escHtml(b.label)}</td>
            <td class="num-val">${b.events.toFixed(1)}</td>
            <td class="num-val">${b.nonevents.toFixed(1)}</td>
            <td class="num-val"${rateStyle(b)}>${evtPct}</td>
            <td class="num-val ${b.woe>0?'sc-pos':b.woe<0?'sc-neg':''}">${b.woe.toFixed(4)}</td>
            <td class="num-val">${(b.iv||0).toFixed(4)}</td>
            <td class="num-val sc-pts">${b.points>=0?'+':''}${b.points}</td>
          </tr>`;
        });
      }).join('');

      return `<div class="mdl-out-section">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div class="mdl-out-title" style="margin-bottom:0">Scorecard table</div>
          ${id ? `<button class="btn btn-ghost btn-xs${hm?' active':''}" style="margin-left:auto;font-size:10px;padding:2px 8px" onclick="Pages.models.toggleScHeatmap('${id}')">Event rate heatmap</button>` : ''}
        </div>
        <div style="overflow-x:auto">
          <table class="sc-table">
            <thead><tr><th>Variable</th><th>Bin</th><th>Events</th><th>Non-events</th><th>Event%</th><th>WoE</th><th>IV</th><th>Points</th></tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
        <div class="sc-base-row">Base points: <strong>${r.points_tables._meta?.base_pts ?? '—'}</strong> &nbsp;·&nbsp; Score range (approx): variable</div>
      </div>`;
    },

    toggleScHeatmap(id) {
      const m = State.models.find(m=>m.id===id);
      if (m) { m._scHeatmap = !m._scHeatmap; this.render(); }
    },

    _renderIVSummary(r) {
      const allPreds = r.allPredictors || r.predictors;
      return `<div class="mdl-out-section">
        <div class="mdl-out-title">Variable importance (Information Value)</div>
        <div id="mdl-iv-${r.id}" style="width:100%;height:${Math.max(120, allPreds.length*26+60)}px"></div>
      </div>`;
    },

    _renderBinningDetail(r) {
      const sections = r.predictors.map(col => {
        const bins = r.woe_tables[col] || [];
        const rows = bins.map(b => `<tr>
          <td>${Fmt.escHtml(b.label)}</td>
          <td class="num-val">${b.events.toFixed(1)}</td>
          <td class="num-val">${b.nonevents.toFixed(1)}</td>
          <td class="num-val">${b.weight.toFixed(1)}</td>
          <td class="num-val">${b.weight>0?(b.events/b.weight*100).toFixed(1)+'%':'—'}</td>
          <td class="num-val ${b.woe>0?'sc-pos':b.woe<0?'sc-neg':''}">${b.woe.toFixed(4)}</td>
          <td class="num-val">${(b.iv||0).toFixed(4)}</td>
        </tr>`).join('');
        return `<details class="mdl-bin-detail">
          <summary>${Fmt.escHtml(col)}<span class="mdl-bin-iv">IV: ${(r.iv_summary[col]||0).toFixed(3)} · ${bins.filter(b=>!b.isNull).length} bins${bins.some(b=>b.isNull)?' + null':''}</span></summary>
          <table class="sc-table" style="margin:6px 0 10px"><thead><tr><th>Bin</th><th>Events</th><th>Non-events</th><th>Total</th><th>Event%</th><th>WoE</th><th>IV</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </details>`;
      }).join('');
      return `<div class="mdl-out-section">
        <div class="mdl-out-title">Binning detail</div>${sections}
      </div>`;
    },

    _renderCharts(model) {
      const r = model.results;
      if (!r) return;
      const css = v => Charts._css(v);
      const accent = css('--accent'), text2 = css('--text-2'), border = css('--border');
      const cfg = { displayModeBar: false, responsive: true };
      const baseLayout = {
        paper_bgcolor:'transparent', plot_bgcolor:'transparent',
        font:{ color:text2, size:10, family:'-apple-system,sans-serif' },
        xaxis:{ gridcolor:border, zerolinecolor:border },
        yaxis:{ gridcolor:border, zerolinecolor:border },
      };

      // ── ROC curve ──
      const rocEl = document.getElementById(`mdl-roc-${r.id}`);
      if (rocEl) {
        const tModel = { predictors:r.predictors, woe_tables:r.woe_tables, coef:r.coef, intercept:r.intercept };
        const target = r.params.target || r.target;
        const scored = State.data
          .filter(row => { const t=Number(row[target]); return t===0||t===1; })
          .map(row => ({ t:Number(row[target]), p:ModelsEngine.predictProba(row, tModel) }))
          .sort((a,b) => b.p - a.p);
        const totE = scored.reduce((s,x)=>s+x.t,0), totNE=scored.length-totE;
        let cE=0,cNE=0; const tprs=[0],fprs=[0];
        for(const s of scored){ cE+=s.t; cNE+=1-s.t; tprs.push(cE/totE); fprs.push(cNE/totNE); }
        const auc = (r.metrics.full||r.metrics.train||{}).auc;
        Plotly.newPlot(rocEl,[
          {x:[0,1],y:[0,1],mode:'lines',line:{color:border,dash:'dash',width:1},showlegend:false,hoverinfo:'skip'},
          {x:fprs,y:tprs,mode:'lines',line:{color:accent,width:2},name:`AUC ${auc?.toFixed(3)||'—'}`,fill:'tozeroy',fillcolor:accent+'22'},
        ],{...baseLayout,xaxis:{...baseLayout.xaxis,title:'FPR',range:[0,1]},yaxis:{...baseLayout.yaxis,title:'TPR',range:[0,1]},
          legend:{x:0.4,y:0.08,font:{size:10}},margin:{l:40,r:8,t:8,b:40}},cfg);
      }

      // ── Score histogram ──
      const histEl = document.getElementById(`mdl-hist-${r.id}`);
      if (histEl) {
        const target = r.params.target || r.target;
        const events=[], nonevents=[];
        for(const row of State.data){
          const t=Number(row[target]); if(t!==0&&t!==1) continue;
          const s = ModelsEngine.scoreRow(row, {predictors:r.predictors, points_tables:r.points_tables});
          if(t===1) events.push(s.totalPoints); else nonevents.push(s.totalPoints);
        }
        Plotly.newPlot(histEl,[
          {x:events,type:'histogram',name:'Event (1)',marker:{color:accent+'cc'},opacity:.7},
          {x:nonevents,type:'histogram',name:'Non-event (0)',marker:{color:border},opacity:.7},
        ],{...baseLayout,barmode:'overlay',legend:{x:.7,y:.95,font:{size:10}},margin:{l:36,r:8,t:4,b:36}},cfg);
      }

      // ── IV bar chart ──
      const ivEl = document.getElementById(`mdl-iv-${r.id}`);
      if (ivEl) {
        const allPreds = (r.allPredictors||r.predictors).slice();
        const sorted = allPreds.map(col=>({ col, iv:r.iv_summary[col]||0, used:r.predictors.includes(col) }))
          .sort((a,b)=>a.iv-b.iv);
        Plotly.newPlot(ivEl,[{
          x:sorted.map(s=>s.iv), y:sorted.map(s=>s.col), type:'bar', orientation:'h',
          marker:{ color:sorted.map(s=>s.used?accent:border) },
          text:sorted.map(s=>s.iv.toFixed(3)), textposition:'outside',
        }],{
          ...baseLayout,
          xaxis:{...baseLayout.xaxis,title:'Information Value'},
          margin:{l:90,r:60,t:4,b:36},
          shapes:[{type:'line',x0:0.02,x1:0.02,y0:-0.5,y1:sorted.length-0.5,line:{color:'orange',dash:'dot',width:1}}],
        },cfg);
      }
    },

    // ── Model management ───────────────────────────────────────────────────
    addModel(type) {
      const n = State.models.filter(m=>m.type===type).length + 1;
      const id = '_mdl_' + Math.random().toString(36).slice(2,8);
      State.models.push({
        type, id,
        name: type==='scorecard' ? `Scorecard ${n}` : `Model ${n}`,
        params:{
          target:'', predictors:[],
          maxBins:5, preBinsK:20, minBinSize:0.05,
          monotonicity:'auto', catOrdering:'event_rate',
          ivThreshold:0.02, lambda:0.01, maxIter:500,
          PDO:20, baseScore:600, baseOdds:1/19,
          varConfig:{},
        },
        results:null, _error:null, _scHeatmap:false,
        _searchMode:false, _searchRunning:false, _searchProgress:null, _searchResults:null,
        _searchGrid:{
          maxBins:     { enabled:false, values:'3,4,5,6' },
          preBinsK:    { enabled:false, values:'15,20,25' },
          ivThreshold: { enabled:false, values:'0.01,0.02,0.05' },
          lambda:      { enabled:false, values:'0.001,0.01,0.1' },
          PDO:         { enabled:false, values:'15,20,25,30' },
          monotonicity:{ enabled:false, values:'auto,ascending,descending' },
        },
      });
      this._activeId = id;
      this.render();
    },

    removeModel(id) {
      State.models = State.models.filter(m=>m.id!==id);
      if (this._activeId===id) this._activeId = State.models[0]?.id||null;
      this.render();
    },

    setActive(id) { this._activeId=id; this.render(); },

    updateParam(id, key, val) {
      const m = State.models.find(m=>m.id===id);
      if (m) m.params[key] = val;
    },

    togglePredictor(id, col, checked) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      if (checked && !m.params.predictors.includes(col)) m.params.predictors.push(col);
      else m.params.predictors = m.params.predictors.filter(c=>c!==col);
    },

    selectAllPreds(id, all) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      m.params.predictors = all ? State.columns.filter(c=>!c.isWeight&&c.name!==m.params.target).map(c=>c.name) : [];
      this.render();
    },

    runModel(id) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      if (!m.params.target) { UI.toast('Select a target column first'); return; }
      if (!m.params.predictors.length) { UI.toast('Select at least one predictor'); return; }
      this._running = true; m._error = null;
      this.render();
      setTimeout(() => {
        try {
          m.results = ModelsEngine.runScorecard({ ...m.params, data:State.data, columns:State.columns, weightCol:State.weightCol });
          m._error = null;
        } catch(e) {
          m._error = e.message; m.results = null;
          console.error('Scorecard error:', e);
        }
        this._running = false;
        this.render();
      }, 10);
    },

    // ── Parameter search ─────────────────────────────────────────────────
    toggleSearch(id) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      m._searchMode = !m._searchMode;
      this.render();
    },

    updateSearchGrid(id, key, field, val) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      if (!m._searchGrid[key]) m._searchGrid[key] = { enabled:false, values:'' };
      m._searchGrid[key][field] = val;
      if (field === 'enabled') this.render();
    },

    searchSortBy(id, metric) {
      const m = State.models.find(m=>m.id===id);
      if (!m?._searchResults) return;
      m._searchResults.sortBy = metric;
      this.render();
    },

    _cartesian(grid) {
      const keys = Object.keys(grid);
      if (!keys.length) return [];
      let result = [{}];
      for (const key of keys) {
        result = result.flatMap(combo => grid[key].map(v => ({ ...combo, [key]: v })));
      }
      return result;
    },

    _parseGridValues(str) {
      return (str||'').split(',').map(s=>s.trim()).filter(Boolean).map(v => {
        const n = Number(v);
        return isNaN(n) ? v : n;
      });
    },

    runSearch(id) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      if (!m.params.target) { UI.toast('Select a target column in the model setup first'); return; }
      if (!m.params.predictors.length) { UI.toast('Select at least one predictor in the model setup first'); return; }

      const grid = {};
      for (const [key, cfg] of Object.entries(m._searchGrid)) {
        if (!cfg.enabled) continue;
        const vals = this._parseGridValues(cfg.values);
        if (vals.length) grid[key] = vals;
      }
      if (!Object.keys(grid).length) { UI.toast('Enable at least one parameter to sweep'); return; }

      const combos = this._cartesian(grid);
      if (combos.length > 500 && !confirm(`This will run ${combos.length} models. Continue?`)) return;

      m._searchResults = { combos:[], sweepKeys:Object.keys(grid), sortBy:'gini', done:false };
      m._searchProgress = { done:0, total:combos.length };
      m._searchRunning = true;
      this.render();

      const CHUNK = 5;
      let i = 0;
      const tick = () => {
        if (!m._searchRunning) { m._searchProgress = null; this.render(); return; }
        for (let j=0; j<CHUNK && i<combos.length; j++, i++) {
          const overrides = combos[i];
          try {
            const r = ModelsEngine.runScorecard({ ...m.params, ...overrides, data:State.data, columns:State.columns, weightCol:State.weightCol });
            const metricsFlat = {};
            for (const [split, met] of Object.entries(r.metrics)) {
              metricsFlat[`gini_${split}`] = met.gini;
              metricsFlat[`auc_${split}`]  = met.auc;
              metricsFlat[`ks_${split}`]   = met.ks;
            }
            m._searchResults.combos.push({ params:overrides, metrics:r.metrics, metricsFlat, predictors:r.predictors.length });
          } catch(e) { /* skip failed combos */ }
          m._searchProgress.done = i + 1;
        }
        if (i < combos.length) { this.render(); setTimeout(tick, 0); }
        else { m._searchRunning = false; m._searchResults.done = true; m._searchProgress = null; this.render(); }
      };
      setTimeout(tick, 0);
    },

    stopSearch(id) {
      const m = State.models.find(m=>m.id===id);
      if (m) { m._searchRunning = false; }
    },

    applySearchParams(id, idx) {
      const m = State.models.find(m=>m.id===id);
      if (!m?._searchResults?.combos[idx]) return;
      Object.assign(m.params, m._searchResults.combos[idx].params);
      m._searchMode = false;
      UI.toast('Params applied — click Run scorecard to train the model');
      this.render();
    },

    _renderSearch(model) {
      return `<div class="srch-layout">
        <div class="srch-cfg">${this._renderSearchConfig(model)}</div>
        <div class="srch-results">${this._renderSearchResults(model)}</div>
      </div>`;
    },

    _renderSearchConfig(model) {
      const id = model.id;
      const g = model._searchGrid;
      const PARAMS = [
        { key:'maxBins',      label:'Max bins',      placeholder:'e.g. 3,4,5,6' },
        { key:'preBinsK',     label:'Pre-bins',      placeholder:'e.g. 15,20,25' },
        { key:'ivThreshold',  label:'IV threshold',  placeholder:'e.g. 0.01,0.02,0.05' },
        { key:'lambda',       label:'L2 lambda',     placeholder:'e.g. 0.001,0.01,0.1' },
        { key:'PDO',          label:'PDO',           placeholder:'e.g. 15,20,25,30' },
        { key:'monotonicity', label:'Monotonicity',  placeholder:'e.g. auto,ascending' },
      ];
      const rows = PARAMS.map(({ key, label, placeholder }) => {
        const cfg = g[key] || { enabled:false, values:'' };
        return `<div class="srch-grid-row">
          <label><input type="checkbox"${cfg.enabled?' checked':''} onchange="Pages.models.updateSearchGrid('${id}','${key}','enabled',this.checked)"> ${label}</label>
          <input type="text" class="srch-grid-vals"${cfg.enabled?'':' disabled'} value="${Fmt.escHtml(cfg.values||'')}" placeholder="${placeholder}" oninput="Pages.models.updateSearchGrid('${id}','${key}','values',this.value)"${cfg.enabled?'':' disabled'}>
        </div>`;
      }).join('');

      const activeParams = PARAMS.filter(({key}) => g[key]?.enabled);
      const counts = activeParams.map(({key}) => this._parseGridValues(g[key]?.values||'').length || 0);
      const totalCombos = counts.length ? counts.reduce((a,b)=>a*b,1) : 0;

      return `
        <div class="srch-cfg-section">
          <div class="srch-cfg-title">Parameter grid <span class="mdl-tip" title="Check a parameter to include it in the sweep. Enter comma-separated values to try. All combinations are evaluated.">?</span></div>
          ${rows}
        </div>
        <div style="padding:12px 14px;border-bottom:1px solid var(--border)">
          <div style="font-size:11px;color:var(--text-3);margin-bottom:8px">${totalCombos ? `${totalCombos} combination${totalCombos!==1?'s':''}` : 'No params selected'}</div>
          ${model._searchRunning
            ? `<button class="btn btn-sm" style="background:var(--danger)18;border:1px solid var(--danger)44;color:var(--danger)" onclick="Pages.models.stopSearch('${id}')">Stop</button>`
            : `<button class="btn btn-primary"${!totalCombos?' disabled':''} onclick="Pages.models.runSearch('${id}')">Run search</button>`}
        </div>
        <div style="padding:10px 14px">
          <div style="font-size:10px;color:var(--text-3);line-height:1.6">All other parameters use the current model settings. Only the checked parameters vary per combination.</div>
        </div>`;
    },

    _renderSearchResults(model) {
      const prog = model._searchProgress;
      const res  = model._searchResults;

      if (!res && !prog) {
        return `<div class="empty-state"><div class="empty-title">No search run yet</div><div class="empty-sub">Configure parameters on the left, then click Run search.</div></div>`;
      }

      let html = '';

      if (prog) {
        const pct = prog.total ? Math.round(prog.done / prog.total * 100) : 0;
        html += `<div class="srch-progress-wrap">
          <div style="font-size:12px;font-weight:600;color:var(--text)">Running… ${prog.done} / ${prog.total}</div>
          <div class="srch-progress-bar"><div class="srch-progress-fill" style="width:${pct}%"></div></div>
          <div class="srch-progress-text">${pct}% complete — ${prog.total - prog.done} remaining</div>
        </div>`;
      }

      if (!res?.combos.length) return html;

      const splits = [...new Set(res.combos.flatMap(c => Object.keys(c.metrics)))];
      const primarySplit = splits.includes('train') ? 'train' : splits[0];
      const sortBy = res.sortBy || 'gini';
      const sortKey = `${sortBy}_${primarySplit}`;
      const sorted = [...res.combos].map((c,i)=>({...c,_origIdx:i}))
        .sort((a,b) => (b.metricsFlat[sortKey]??-1) - (a.metricsFlat[sortKey]??-1));

      const sweepKeys = res.sweepKeys || [];
      const fmt4   = v => v==null ? '—' : v.toFixed(4);
      const fmtPct = v => v==null ? '—' : (v*100).toFixed(2)+'%';
      const fmtVal = v => typeof v==='number' ? (Number.isInteger(v)?String(v):v.toFixed(4)) : String(v??'—');

      const sortOpts = [['gini','Gini'],['auc','AUC'],['ks','KS']].map(([k,l])=>
        `<option value="${k}"${sortBy===k?' selected':''}>${l}</option>`).join('');

      const metricCols = splits.flatMap(s => [
        { key:`gini_${s}`, label:`Gini (${s})` },
        { key:`auc_${s}`,  label:`AUC (${s})` },
        { key:`ks_${s}`,   label:`KS (${s})` },
      ]);

      const thead = `<tr>
        ${sweepKeys.map(k=>`<th>${Fmt.escHtml(k)}</th>`).join('')}
        ${metricCols.map(c=>`<th>${Fmt.escHtml(c.label)}</th>`).join('')}
        <th>Vars</th><th></th>
      </tr>`;

      const tbody = sorted.map((combo, rank) => {
        const isBest = rank === 0;
        const paramCells = sweepKeys.map(k=>`<td>${Fmt.escHtml(fmtVal(combo.params[k]))}</td>`).join('');
        const metricCells = metricCols.map(c => {
          const v = combo.metricsFlat[c.key];
          return `<td class="num-val">${c.key.startsWith('ks_') ? fmtPct(v) : fmt4(v)}</td>`;
        }).join('');
        return `<tr${isBest?' class="srch-row-best"':''}>
          ${paramCells}${metricCells}
          <td class="num-val">${combo.predictors}</td>
          <td><button class="srch-apply-btn" onclick="Pages.models.applySearchParams('${model.id}',${combo._origIdx})" title="Apply these params to the model">Apply</button></td>
        </tr>`;
      }).join('');

      html += `<div class="srch-table-wrap">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
          <div class="mdl-out-title" style="margin-bottom:0">${res.combos.length} combination${res.combos.length!==1?'s':''}</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2);margin-left:auto">
            Sort by <select style="font-size:11px;padding:2px 6px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)" onchange="Pages.models.searchSortBy('${model.id}',this.value)">${sortOpts}</select>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="srch-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
        </div>
      </div>`;

      if (sweepKeys.length === 2 && res.done) {
        html += `<div id="srch-heatmap-${model.id}" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
          <div class="mdl-out-title">Heatmap — ${sortBy.toUpperCase()} (${primarySplit}) · ${sweepKeys[0]} × ${sweepKeys[1]}</div>
          <div id="srch-hm-plot-${model.id}" style="height:280px"></div>
        </div>`;
      }

      return html;
    },

    renderSearchCharts(model) {
      const res = model._searchResults;
      if (!res?.done) return;
      const sweepKeys = res.sweepKeys || [];
      if (sweepKeys.length !== 2) return;

      const el = document.getElementById(`srch-hm-plot-${model.id}`);
      if (!el) return;

      const splits = [...new Set(res.combos.flatMap(c => Object.keys(c.metrics)))];
      const primarySplit = splits.includes('train') ? 'train' : splits[0];
      const sortBy = res.sortBy || 'gini';
      const metricKey = `${sortBy}_${primarySplit}`;

      const k0 = sweepKeys[0], k1 = sweepKeys[1];
      const vals0 = [...new Set(res.combos.map(c=>c.params[k0]))];
      const vals1 = [...new Set(res.combos.map(c=>c.params[k1]))];

      const z = vals1.map(v1 => vals0.map(v0 => {
        const combo = res.combos.find(c => String(c.params[k0])===String(v0) && String(c.params[k1])===String(v1));
        return combo?.metricsFlat[metricKey] ?? null;
      }));

      Plotly.react(el, [{
        type:'heatmap', z, x:vals0.map(String), y:vals1.map(String),
        colorscale:'Blues',
        text: z.map(row => row.map(v => v==null?'':v.toFixed(4))),
        texttemplate:'%{text}',
        hovertemplate:`${k0}=%{x}<br>${k1}=%{y}<br>${sortBy.toUpperCase()}=%{z:.4f}<extra></extra>`,
      }], {
        paper_bgcolor:'transparent', plot_bgcolor:'transparent',
        margin:{t:10,r:20,b:40,l:60},
        xaxis:{ title:k0, color:'var(--text-2)', gridcolor:'var(--border)', tickfont:{size:10} },
        yaxis:{ title:k1, color:'var(--text-2)', gridcolor:'var(--border)', tickfont:{size:10} },
        font:{ family:'inherit', color:'var(--text-2)' },
      }, { responsive:true, displayModeBar:false });
    },

    // ── Per-variable config ───────────────────────────────────────────────
    _renderVariables(model) {
      const preds = model.params.predictors || [];
      if (!preds.length) return '';
      const vc = model.params.varConfig || {};
      const id = model.id;
      const rows = preds.map(col => {
        const colMeta = State.columns.find(c=>c.name===col);
        const isCat = colMeta?.type === 'categorical';
        const typeTag = `<span style="font-size:9px;padding:1px 4px;border-radius:2px;background:var(--border);color:var(--text-3);flex-shrink:0">${isCat?'C':'N'}</span>`;
        const override = isCat
          ? `<select onchange="Pages.models.updateVarConfig('${id}','${Fmt.escHtml(col)}','catOrdering',this.value)" title="Category ordering for ${col}">
              <option value="">Use global</option>
              ${[['event_rate','Event rate'],['frequency','Frequency'],['alphabetical','Alphabetical']].map(([v,l])=>`<option value="${v}"${vc[col]?.catOrdering===v?' selected':''}>${l}</option>`).join('')}
             </select>`
          : `<select onchange="Pages.models.updateVarConfig('${id}','${Fmt.escHtml(col)}','monotonicity',this.value)" title="Monotonicity for ${col}">
              <option value="">Use global</option>
              ${[['auto','Auto'],['ascending','Ascending'],['descending','Descending'],['unconstrained','None']].map(([v,l])=>`<option value="${v}"${vc[col]?.monotonicity===v?' selected':''}>${l}</option>`).join('')}
             </select>`;
        return `<div class="mdl-var-row">${typeTag}<span class="mdl-var-name" title="${Fmt.escHtml(col)}">${Fmt.escHtml(col)}</span>${override}</div>`;
      }).join('');
      return `<div class="mdl-section">
        <div class="mdl-section-title">Variables <span class="mdl-tip" title="Per-variable overrides for monotonicity (numeric) and category ordering (categorical). 'Use global' applies the Parameters setting.">?</span></div>
        ${rows}
      </div>`;
    },

    updateVarConfig(id, col, key, val) {
      const m = State.models.find(m=>m.id===id);
      if (!m) return;
      if (!m.params.varConfig) m.params.varConfig = {};
      if (!m.params.varConfig[col]) m.params.varConfig[col] = {};
      if (val === '') delete m.params.varConfig[col][key];
      else m.params.varConfig[col][key] = val;
    },

    // ── Apply to dataset (rich modal) ────────────────────────────────────
    applyToDataset(id) {
      const m = State.models.find(m=>m.id===id);
      if (!m?.results) return;
      const r = m.results;
      const t = r.target;
      Modal.show('Apply model to dataset',
        `<p style="font-size:12px;color:var(--text-2);margin:0 0 12px">Choose which columns to add to the transformed dataset. Existing columns from a previous apply of this model will be replaced.</p>
        <div class="apply-opt"><label><input type="checkbox" id="ao-score" checked> Score (points)</label><input type="text" id="ao-score-name" value="${t}_score"></div>
        <div class="apply-opt"><label><input type="checkbox" id="ao-prob" checked> Probability</label><input type="text" id="ao-prob-name" value="${t}_prob"></div>
        <div class="apply-opt"><label><input type="checkbox" id="ao-woe" onchange="document.getElementById('ao-woe-pfx').disabled=!this.checked"> WoE columns</label><input type="text" id="ao-woe-pfx" value="${t}_woe_" disabled></div>
        <div class="apply-opt"><label><input type="checkbox" id="ao-bin" onchange="document.getElementById('ao-bin-pfx').disabled=!this.checked"> Bin labels</label><input type="text" id="ao-bin-pfx" value="${t}_bin_" disabled></div>`,
        () => this._confirmApply(id)
      );
    },

    _confirmApply(id) {
      const m = State.models.find(m=>m.id===id);
      if (!m?.results) return;
      const r = m.results;
      const g = i => document.getElementById(i);
      const writeScore = g('ao-score')?.checked, scoreCol = g('ao-score-name')?.value?.trim() || `${r.target}_score`;
      const writeProb  = g('ao-prob')?.checked,  probCol  = g('ao-prob-name')?.value?.trim()  || `${r.target}_prob`;
      const writeWoe   = g('ao-woe')?.checked,   woePrefix= g('ao-woe-pfx')?.value?.trim()   || `${r.target}_woe_`;
      const writeBin   = g('ao-bin')?.checked,   binPrefix= g('ao-bin-pfx')?.value?.trim()   || `${r.target}_bin_`;
      if (!writeScore && !writeProb && !writeWoe && !writeBin) { UI.toast('Select at least one output'); return; }
      const step = {
        type:'apply_model', enabled:true,
        params:{ modelId:r.id, modelType:'scorecard',
          writeScore, scoreCol, writeProb, probCol, writeWoe, woePrefix, writeBin, binPrefix,
          model:{ type:r.type, id:r.id, target:r.target, predictors:r.predictors,
            woe_tables:r.woe_tables, coef:r.coef, intercept:r.intercept, points_tables:r.points_tables } },
      };
      const existing = State.transforms.findIndex(s=>s.type==='apply_model'&&s.params.modelId===r.id);
      if (existing>=0) State.transforms[existing]=step;
      else State.transforms.push(step);
      DataEngine.recompute();
      const added = [writeScore&&scoreCol, writeProb&&probCol, writeWoe&&`${woePrefix}*`, writeBin&&`${binPrefix}*`].filter(Boolean).join(', ');
      UI.toast(`Applied — added: ${added}`);
      UI.navigate('transform');
    },

    // ── Model compare ────────────────────────────────────────────────────
    compare() {
      if (State.models.length < 2) { UI.toast('Need at least 2 models to compare'); return; }
      this._compareMode = !this._compareMode;
      this._compareA = null; this._compareB = null;
      this.render();
    },

    _renderCompare() {
      const all = State.models;
      const ran = all.filter(m=>m.results);
      if (ran.length < 2) return `<div class="mdl-compare"><div class="empty-state"><div class="empty-title">Run at least 2 models first</div><div class="empty-sub">Go back to the workbench and run each model before comparing.</div></div></div>`;

      const a = this._compareA || ran[0].id;
      const b = this._compareB || ran[1].id;
      const mA = all.find(m=>m.id===a), mB = all.find(m=>m.id===b);
      if (!mA || !mB) return '';

      const opts = ran.map(m=>`<option value="${m.id}">${Fmt.escHtml(m.name)}</option>`).join('');
      const selA = `<select onchange="Pages.models._compareA=this.value;Pages.models.render()">${ran.map(m=>`<option value="${m.id}"${m.id===a?' selected':''}>${Fmt.escHtml(m.name)}</option>`).join('')}</select>`;
      const selB = `<select onchange="Pages.models._compareB=this.value;Pages.models.render()">${ran.map(m=>`<option value="${m.id}"${m.id===b?' selected':''}>${Fmt.escHtml(m.name)}</option>`).join('')}</select>`;

      const sameType = mA.type === mB.type;

      return `<div class="mdl-compare">
        <div class="mdl-compare-sel">${selA}<span style="color:var(--text-3)">vs</span>${selB}</div>
        ${sameType ? this._renderParamDiff(mA, mB) : `<div class="cmp-section"><div class="cmp-section-title">Note</div><span style="font-size:12px;color:var(--text-2)">Different model types — showing metrics only.</span></div>`}
        ${this._renderMetricsDiff(mA, mB)}
        ${sameType ? this._renderIVDiff(mA, mB) : ''}
      </div>`;
    },

    _renderParamDiff(mA, mB) {
      const params = [
        ['maxBins','Max bins'], ['preBinsK','Pre-bins'], ['monotonicity','Monotonicity'],
        ['catOrdering','Cat. ordering'], ['ivThreshold','IV threshold'],
        ['lambda','L2 lambda'], ['maxIter','Iterations'],
        ['PDO','PDO'], ['baseScore','Base score'], ['baseOdds','Base odds'],
      ];
      const fmtParam = (k, v) => {
        if (v == null) return '—';
        if (k === 'baseOdds') { const f = 1/v; return Number.isInteger(Math.round(f)) ? `1/${Math.round(f)}` : v.toFixed(4); }
        if (typeof v === 'number' && !Number.isInteger(v)) return v.toFixed(4);
        return String(v);
      };
      const rows = params.map(([k, label]) => {
        const vA = mA.params[k], vB = mB.params[k];
        const diff = String(vA) !== String(vB);
        return `<tr>
          <td>${label}</td>
          <td${diff?' class="cmp-diff"':''}>${Fmt.escHtml(fmtParam(k,vA))}</td>
          <td${diff?' class="cmp-diff"':''}>${Fmt.escHtml(fmtParam(k,vB))}</td>
        </tr>`;
      }).join('');
      const hasDiff = params.some(([k])=>String(mA.params[k])!==String(mB.params[k]));
      return `<div class="cmp-section">
        <div class="cmp-section-title">Parameters ${hasDiff?'<span style="color:var(--accent);font-size:10px;font-weight:400">· highlighted values differ</span>':''}</div>
        <table class="cmp-table">
          <thead><tr><th>Parameter</th><th>${Fmt.escHtml(mA.name)}</th><th>${Fmt.escHtml(mB.name)}</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    },

    _renderMetricsDiff(mA, mB) {
      const splits = [...new Set([...Object.keys(mA.results?.metrics||{}), ...Object.keys(mB.results?.metrics||{})])];
      const fmt4 = v => v==null?'—':v.toFixed(4);
      const fmtPct = v => v==null?'—':(v*100).toFixed(2)+'%';
      const rows = splits.flatMap(split => [
        ['Gini', split, v=>fmt4(v?.gini)],
        ['AUC',  split, v=>fmt4(v?.auc)],
        ['KS',   split, v=>fmtPct(v?.ks)],
      ].map(([metric, s, fn]) => {
        const vA = fn(mA.results?.metrics?.[s]), vB = fn(mB.results?.metrics?.[s]);
        return `<tr><td>${metric} (${s})</td><td>${vA}</td><td>${vB}</td></tr>`;
      })).join('');
      return `<div class="cmp-section">
        <div class="cmp-section-title">Performance metrics</div>
        <table class="cmp-table">
          <thead><tr><th>Metric</th><th>${Fmt.escHtml(mA.name)}</th><th>${Fmt.escHtml(mB.name)}</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    },

    _renderIVDiff(mA, mB) {
      const allCols = [...new Set([...(mA.results?.allPredictors||[]), ...(mB.results?.allPredictors||[])])];
      if (!allCols.length) return '';
      const rows = allCols.map(col => {
        const ivA = mA.results?.iv_summary?.[col], ivB = mB.results?.iv_summary?.[col];
        const inA = mA.results?.predictors?.includes(col), inB = mB.results?.predictors?.includes(col);
        return `<tr>
          <td>${Fmt.escHtml(col)}</td>
          <td>${ivA!=null?ivA.toFixed(4):'—'} ${inA?'':'<span style="font-size:9px;color:var(--text-3)">(excl.)</span>'}</td>
          <td>${ivB!=null?ivB.toFixed(4):'—'} ${inB?'':'<span style="font-size:9px;color:var(--text-3)">(excl.)</span>'}</td>
        </tr>`;
      }).join('');
      return `<div class="cmp-section">
        <div class="cmp-section-title">Information Value by variable</div>
        <table class="cmp-table">
          <thead><tr><th>Variable</th><th>${Fmt.escHtml(mA.name)}</th><th>${Fmt.escHtml(mB.name)}</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    },
  },

  // ── Dashboard ─────────────────────────────────────────────────────────────
  dashboard: {
    _view: 'list',
    _id: null,

    render() {
      if (this._view === 'editor' && this._id && State.dashboards[this._id]) this._renderEditor();
      else this._renderList();
    },

    // ── List ────────────────────────────────────────────────────────────────
    _renderList() {
      const ids = Object.keys(State.dashboards);
      document.getElementById('page-dashboard').innerHTML = `
        <div class="section-header" style="margin-bottom:16px">
          <span>Dashboards</span>
          <button class="btn btn-primary btn-sm" onclick="Pages.dashboard._new()">+ New dashboard</button>
        </div>
        ${!ids.length
          ? `<div class="placeholder-msg">No dashboards yet — create one to get started.</div>`
          : `<div class="dash-list">${ids.map(id => {
              const d = State.dashboards[id];
              return `<div class="dash-list-item">
                <div>
                  <div class="dash-list-name">${Fmt.escHtml(d.name)}</div>
                  <div class="dash-list-meta">${d.blocks.length} block${d.blocks.length!==1?'s':''} &mdash; ${new Date(d.modified).toLocaleDateString()}</div>
                </div>
                <div class="dash-list-actions">
                  <button class="btn btn-sm btn-ghost" onclick="Pages.dashboard._open('${id}')">Open</button>
                  <button class="btn btn-sm btn-ghost" onclick="Pages.dashboard._export('${id}')">Export</button>
                  <button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="Pages.dashboard._delete('${id}')">Delete</button>
                </div>
              </div>`;
            }).join('')}</div>`}`;
    },

    _new() {
      const id = `dash_${Date.now()}`;
      State.dashboards[id] = { id, name:`Dashboard ${Object.keys(State.dashboards).length+1}`, created:Date.now(), modified:Date.now(), blocks:[] };
      Storage.save();
      this._open(id);
    },

    _delete(id) {
      if (!confirm(`Delete "${State.dashboards[id]?.name}"?`)) return;
      delete State.dashboards[id];
      Storage.save();
      this.render();
    },

    _open(id) { this._view='editor'; this._id=id; this.render(); },
    _back()    { this._view='list';  this._id=null; this.render(); },

    // ── Editor ──────────────────────────────────────────────────────────────
    _renderEditor() {
      const d = State.dashboards[this._id];
      document.getElementById('page-dashboard').innerHTML = `
        <div class="dash-editor-header">
          <button class="btn btn-ghost btn-sm" onclick="Pages.dashboard._back()">Back</button>
          <input class="dash-name-input" id="dash-name-inp" value="${Fmt.escHtml(d.name)}"
                 oninput="Pages.dashboard._rename(this.value)" placeholder="Dashboard name">
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-ghost btn-sm" onclick="Pages.dashboard._addBlock()">+ Add block</button>
            <button class="btn btn-primary btn-sm" onclick="Pages.dashboard._export('${this._id}')">Export HTML</button>
          </div>
        </div>
        <div class="dash-grid" id="dash-grid">
          ${d.blocks.map(b => this._blockHtml(b)).join('')}
          ${!d.blocks.length ? `<div class="placeholder-msg" style="width:100%">No blocks yet — click "+ Add block" to start.</div>` : ''}
        </div>`;
      requestAnimationFrame(() => {
        d.blocks.forEach(b => { if (b.type==='plot') this._renderPlotBlock(b); });
        this._initDnD();
      });
    },

    _blockHtml(b) {
      const wOpts = ['full','half','third'].map(w =>
        `<option value="${w}"${b.width===w?' selected':''}>${w}</option>`).join('');
      const header = `<div class="dash-block-header">
        <span class="dash-drag-handle" title="Drag to reorder">&#x2630;</span>
        <span class="dash-block-title">${Fmt.escHtml(b.title||b.type)}</span>
        <div class="dash-block-actions">
          <select style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"
                  onchange="Pages.dashboard._setWidth('${b.id}',this.value)">${wOpts}</select>
          <button class="btn btn-ghost" style="font-size:10px;padding:2px 7px" onclick="Pages.dashboard._editBlock('${b.id}')">Edit</button>
          <button class="btn btn-ghost" style="font-size:10px;padding:2px 7px;color:var(--danger)" onclick="Pages.dashboard._removeBlock('${b.id}')">X</button>
        </div>
      </div>`;
      let body = '';
      if (b.type==='plot') {
        body = `<div id="db-plot-${b.id}" style="min-height:200px"></div>`;
      } else if (b.type==='kpi') {
        const val = this._calcKpi(b);
        body = `<div class="dash-kpi">
          <div class="dash-kpi-label">${Fmt.escHtml(b.label||b.col||'KPI')}</div>
          <div class="dash-kpi-value">${val}</div>
          <div class="dash-kpi-sub">${Fmt.escHtml(b.col||'')} &mdash; ${b.fn||'count'}</div>
        </div>`;
      } else if (b.type==='table') {
        body = this._tableHtml(b);
      } else if (b.type==='text') {
        body = `<div class="dash-text">${this._md(b.content||'')}</div>`;
      }
      return `<div class="dash-block" data-width="${b.width||'full'}" data-id="${b.id}" draggable="true">${header}${body}</div>`;
    },

    _renderPlotBlock(b) {
      const entry = Charts._registry.find(c => c.id===b.chartId);
      const el = document.getElementById(`db-plot-${b.id}`);
      if (!el) return;
      if (!entry) {
        el.innerHTML = `<div style="padding:24px;color:var(--text-3);font-size:12px">Chart not in registry — visit Explore or Column Detail to regenerate it.</div>`;
        return;
      }
      Plotly.newPlot(el, JSON.parse(JSON.stringify(entry.traces)), JSON.parse(JSON.stringify(entry.layout||{})), { displayModeBar:false, responsive:true });
    },

    _calcKpi(b) {
      if (!State.data || !b.col) return '—';
      const fn = b.fn||'mean';
      if (fn==='count') return Fmt.num(State.totalRows);
      const rows = State.data;
      const col  = b.col;
      const vals = rows.map(r=>r[col]).filter(v=>v!=null && typeof v==='number');
      if (!vals.length) return '—';
      if (fn==='mean') { const m = DataEngine.weightedMean(rows, col); return m!=null ? Fmt.num(m) : '—'; }
      if (fn==='sum')  {
        const tw = DataEngine.totalWeight(rows);
        const wm = DataEngine.weightedMean(rows, col);
        return (tw!=null && wm!=null) ? Fmt.num(tw*wm) : '—';
      }
      if (fn==='min') return Fmt.num(Math.min(...vals));
      if (fn==='max') return Fmt.num(Math.max(...vals));
      return '—';
    },

    _tableHtml(b) {
      if (!State.data) return '<div style="color:var(--text-3);font-size:12px">No data loaded</div>';
      const cols = (b.cols&&b.cols.length) ? b.cols : State.columns.slice(0,5).map(c=>c.name);
      const rows = State.data.slice(0, b.limit||10);
      return `<div style="overflow-x:auto"><table class="data-table" style="font-size:11px">
        <thead><tr>${cols.map(c=>`<th>${Fmt.escHtml(c)}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${Fmt.escHtml(String(r[c]??''))}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
    },

    _md(src) {
      return src
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/^### (.+)$/gm,'<h3>$1</h3>')
        .replace(/^## (.+)$/gm,'<h2>$1</h2>')
        .replace(/^# (.+)$/gm,'<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/^- (.+)$/gm,'<li>$1</li>')
        .replace(/\n\n/g,'<br><br>');
    },

    _rename(name) {
      if (!this._id) return;
      State.dashboards[this._id].name = name;
      State.dashboards[this._id].modified = Date.now();
      Storage.save();
    },

    // ── Add block modal ──────────────────────────────────────────────────────
    _addBlock() {
      if (!State.data) { UI.toast('Load data first'); return; }
      const reg = Charts._registry;
      const plotOpts = reg.length
        ? reg.map(c=>`<option value="${c.id}">${Fmt.escHtml(c.title)}</option>`).join('')
        : '<option value="">No charts available — visit Explore first</option>';
      const numCols = State.columns.filter(c=>c.type==='numeric');
      const numOpts = numCols.map(c=>`<option value="${c.name}">${Fmt.escHtml(c.name)}</option>`).join('');
      const colChecks = State.columns.map(c=>
        `<label style="display:inline-flex;align-items:center;gap:4px;font-size:12px">
          <input type="checkbox" value="${c.name}" checked> ${Fmt.escHtml(c.name)}</label>`).join('');

      Modal.show('Add block', `
        <label class="modal-label">Block type</label>
        <select id="mBType" class="modal-select" onchange="Pages.dashboard._toggleTypeFields()">
          <option value="plot">Plot (from chart registry)</option>
          <option value="kpi">KPI card</option>
          <option value="table">Data table</option>
          <option value="text">Text / Markdown</option>
        </select>
        <div id="mFPlot">
          <label class="modal-label">Chart</label>
          <select id="mChartId" class="modal-select">${plotOpts}</select>
        </div>
        <div id="mFKpi" style="display:none">
          <label class="modal-label">Column</label>
          <select id="mKpiCol" class="modal-select">${numOpts}</select>
          <label class="modal-label">Function</label>
          <select id="mKpiFn" class="modal-select">
            <option value="mean">Mean</option><option value="sum">Sum</option>
            <option value="min">Min</option><option value="max">Max</option>
            <option value="count">Count (rows)</option>
          </select>
          <label class="modal-label">Label</label>
          <input id="mKpiLabel" class="modal-input" placeholder="e.g. Average fare">
        </div>
        <div id="mFTable" style="display:none">
          <label class="modal-label">Columns to show</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${colChecks}</div>
          <label class="modal-label" style="margin-top:10px">Max rows</label>
          <input id="mTableLimit" class="modal-input" type="number" value="10" min="1" max="200">
        </div>
        <div id="mFText" style="display:none">
          <label class="modal-label">Content (Markdown supported)</label>
          <textarea id="mTextContent" class="modal-input" rows="5" style="resize:vertical" placeholder="## Heading&#10;Your text here..."></textarea>
        </div>
        <label class="modal-label" style="margin-top:10px">Title (optional)</label>
        <input id="mBTitle" class="modal-input" placeholder="Leave blank to use chart/column name">
        <label class="modal-label">Width</label>
        <select id="mBWidth" class="modal-select">
          <option value="full">Full width</option>
          <option value="half">Half width</option>
          <option value="third">Third width</option>
        </select>
      `, () => {
        const type  = document.getElementById('mBType').value;
        const width = document.getElementById('mBWidth').value;
        let title   = document.getElementById('mBTitle').value.trim();
        const id = `blk_${Date.now()}`;
        const block = { id, type, width };

        if (type==='plot') {
          block.chartId = document.getElementById('mChartId')?.value||null;
          block.title   = title || Charts._registry.find(c=>c.id===block.chartId)?.title || 'Plot';
        } else if (type==='kpi') {
          block.col   = document.getElementById('mKpiCol')?.value;
          block.fn    = document.getElementById('mKpiFn')?.value;
          block.label = document.getElementById('mKpiLabel')?.value.trim() || block.col;
          block.title = title || block.label;
        } else if (type==='table') {
          block.cols  = [...document.querySelectorAll('#mFTable input[type=checkbox]:checked')].map(cb=>cb.value);
          block.limit = parseInt(document.getElementById('mTableLimit')?.value||'10');
          block.title = title || 'Data table';
        } else if (type==='text') {
          block.content = document.getElementById('mTextContent')?.value||'';
          block.title   = title || 'Text';
        }

        const d = State.dashboards[this._id];
        d.blocks.push(block);
        d.modified = Date.now();
        Storage.save();
        this._renderEditor();
      });
    },

    _toggleTypeFields() {
      const type = document.getElementById('mBType').value;
      ['mFPlot','mFKpi','mFTable','mFText'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const map = { plot:'mFPlot', kpi:'mFKpi', table:'mFTable', text:'mFText' };
      const t = document.getElementById(map[type]);
      if (t) t.style.display = '';
    },

    _editBlock(blockId) {
      const d = State.dashboards[this._id];
      const b = d.blocks.find(x=>x.id===blockId);
      if (!b) return;
      Modal.show(`Edit block`, `
        <label class="modal-label">Title</label>
        <input id="meTitle" class="modal-input" value="${Fmt.escHtml(b.title||'')}">
        <label class="modal-label">Width</label>
        <select id="meWidth" class="modal-select">
          ${['full','half','third'].map(w=>`<option value="${w}"${b.width===w?' selected':''}>${w}</option>`).join('')}
        </select>
        ${b.type==='kpi'? `
          <label class="modal-label">Label</label>
          <input id="meKpiLabel" class="modal-input" value="${Fmt.escHtml(b.label||'')}">
        `:b.type==='text'? `
          <label class="modal-label">Content</label>
          <textarea id="meText" class="modal-input" rows="6" style="resize:vertical">${Fmt.escHtml(b.content||'')}</textarea>
        `:b.type==='table'? `
          <label class="modal-label">Max rows</label>
          <input id="meLimit" class="modal-input" type="number" value="${b.limit||10}" min="1" max="200">
        `:''}
      `, () => {
        b.title = document.getElementById('meTitle').value.trim() || b.title;
        b.width = document.getElementById('meWidth').value;
        if (b.type==='kpi')   b.label   = document.getElementById('meKpiLabel')?.value.trim() || b.label;
        if (b.type==='text')  b.content = document.getElementById('meText')?.value || '';
        if (b.type==='table') b.limit   = parseInt(document.getElementById('meLimit')?.value||'10');
        d.modified = Date.now();
        Storage.save();
        this._renderEditor();
      });
    },

    _removeBlock(blockId) {
      const d = State.dashboards[this._id];
      d.blocks = d.blocks.filter(b=>b.id!==blockId);
      d.modified = Date.now();
      Storage.save();
      this._renderEditor();
    },

    _setWidth(blockId, width) {
      const d = State.dashboards[this._id];
      const b = d.blocks.find(x=>x.id===blockId);
      if (!b) return;
      b.width = width; d.modified = Date.now(); Storage.save(); this._renderEditor();
    },

    // ── Drag and drop ────────────────────────────────────────────────────────
    _initDnD() {
      const grid = document.getElementById('dash-grid');
      if (!grid) return;
      let dragId = null;
      grid.querySelectorAll('.dash-block').forEach(card => {
        card.addEventListener('dragstart', e => {
          dragId = card.dataset.id;
          setTimeout(() => card.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => {
          dragId = null;
          grid.querySelectorAll('.dash-block').forEach(c => c.classList.remove('dragging','drag-over'));
        });
        card.addEventListener('dragover', e => {
          e.preventDefault();
          if (dragId && card.dataset.id !== dragId) card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', e => {
          if (!card.contains(e.relatedTarget)) card.classList.remove('drag-over');
        });
        card.addEventListener('drop', e => {
          e.preventDefault();
          card.classList.remove('drag-over');
          if (!dragId || card.dataset.id === dragId) return;
          const d = State.dashboards[this._id];
          const fi = d.blocks.findIndex(b=>b.id===dragId);
          const ti = d.blocks.findIndex(b=>b.id===card.dataset.id);
          if (fi<0 || ti<0) return;
          const [moved] = d.blocks.splice(fi, 1);
          d.blocks.splice(ti, 0, moved);
          d.modified = Date.now();
          Storage.save();
          this._renderEditor();
        });
      });
    },

    // ── Export ───────────────────────────────────────────────────────────────
    async _export(id) {
      const d = State.dashboards[id];
      if (!d) return;
      UI.toast('Fetching Plotly for offline bundle...');
      let plotlyJs = '';
      try {
        const r = await fetch('https://cdn.plot.ly/plotly-2.35.2.min.js');
        if (!r.ok) throw new Error(r.status);
        plotlyJs = await r.text();
      } catch(e) {
        UI.toast('Could not fetch Plotly — check your connection and try again.'); return;
      }

      const resolved = d.blocks.map(b => {
        if (b.type!=='plot') return b;
        const entry = Charts._registry.find(c=>c.id===b.chartId);
        return entry ? { ...b, _traces:entry.traces, _layout:entry.layout } : b;
      });

      const wMap = { full:'100%', half:'calc(50% - 8px)', third:'calc(33.33% - 11px)' };
      const blocksHtml = resolved.map(b => {
        const ws = wMap[b.width||'full'];
        let body = '';
        if (b.type==='plot' && b._traces) {
          body = `<div id="exp-${b.id}" style="min-height:260px"></div>`;
        } else if (b.type==='plot') {
          body = `<p style="color:#888;font-size:12px">Chart data not available — regenerate and re-export.</p>`;
        } else if (b.type==='kpi') {
          const val = this._calcKpi(b);
          body = `<div style="padding:4px 0"><div style="font-size:11px;color:#8b8fa8;margin-bottom:4px">${Fmt.escHtml(b.label||b.col||'')}</div><div style="font-size:30px;font-weight:700;color:#4f7cff;font-variant-numeric:tabular-nums">${val}</div><div style="font-size:11px;color:#666;margin-top:5px">${Fmt.escHtml(b.col||'')} &mdash; ${b.fn||'count'}</div></div>`;
        } else if (b.type==='table') {
          body = this._tableHtml(b);
        } else if (b.type==='text') {
          body = `<div style="font-size:13px;line-height:1.7">${this._md(b.content||'')}</div>`;
        }
        return `<div style="background:#1a1d27;border:1px solid #2e3148;border-radius:3px;padding:14px;flex:0 0 ${ws};min-width:0;box-sizing:border-box"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#8b8fa8;margin-bottom:10px">${Fmt.escHtml(b.title||b.type)}</div>${body}</div>`;
      }).join('\n');

      const plotInits = resolved.filter(b=>b.type==='plot'&&b._traces).map(b =>
        `Plotly.newPlot(document.getElementById('exp-${b.id}'),${JSON.stringify(b._traces)},${JSON.stringify(b._layout||{})},{displayModeBar:false,responsive:true});`
      ).join('\n');

      const html = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">\n<title>${Fmt.escHtml(d.name)} — Data Lab</title>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{background:#0f1117;color:#e0e0f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;padding:32px}\nh1{font-size:20px;font-weight:700;margin-bottom:6px}\n.meta{font-size:12px;color:#8b8fa8;margin-bottom:28px}\n.grid{display:flex;flex-wrap:wrap;gap:16px;align-items:start}\ntable{border-collapse:collapse;width:100%;font-size:11px}\nth,td{border:1px solid #2e3148;padding:5px 8px;text-align:left}\nth{background:#2e3148;font-weight:600}\n@media(max-width:700px){.grid>*{flex:0 0 100%!important}}\n</style>\n</head>\n<body>\n<h1>${Fmt.escHtml(d.name)}</h1>\n<div class="meta">Exported from Data Lab &mdash; ${new Date().toLocaleDateString()}</div>\n<div class="grid">\n${blocksHtml}\n</div>\n<script>\n${plotlyJs}\n<\/script>\n<script>\n${plotInits}\n<\/script>\n</body>\n</html>`;

      const blob = new Blob([html], { type:'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${d.name.replace(/[^a-z0-9]/gi,'_')}.html`;
      a.click();
      URL.revokeObjectURL(a.href);
      UI.toast(`Exported ${d.name}.html`);
    },
  },

  // ── Settings ──────────────────────────────────────────────────────────────
  settings: {
    THEMES: [
      { id:'dark',      name:'Dark',      sub:'Charcoal',  bg:'#0f1117', bars:['#4f7cff','#2e3148','#1a1d27'] },
      { id:'light',     name:'Light',     sub:'Neutral',   bg:'#f4f4f6', bars:['#2563eb','#d8d8e0','#ffffff'] },
      { id:'nord',      name:'Nord',      sub:'Blue-gray', bg:'#2e3440', bars:['#88c0d0','#4c566a','#3b4252'] },
      { id:'solarized', name:'Solarized', sub:'Warm',      bg:'#002b36', bars:['#2aa198','#1a5f70','#073642'] },
    ],
    render() {
      const s  = State.settings;
      const el = document.getElementById('page-settings');
      el.innerHTML = `
        <div class="section-head" style="margin-bottom:12px"><span class="section-title">Theme</span></div>
        <div class="theme-grid" style="margin-bottom:28px">
          ${this.THEMES.map(t => `
            <div class="theme-card ${s.theme===t.id?'selected':''}" onclick="Themes.apply('${t.id}');Pages.settings.render()">
              <div class="theme-preview" style="background:${t.bg}">${t.bars.map(c=>`<div class="theme-bar" style="background:${c}"></div>`).join('')}</div>
              <div class="theme-name">${t.name}</div>
              <div class="theme-sub">${t.sub}</div>
            </div>`).join('')}
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Dataset</span></div>
        <div class="card" style="margin-bottom:20px">
          <div class="form-row">
            <label class="form-label">Weight column name</label>
            <input class="form-input" id="s-weightCol" value="${s.weightColumnName}" placeholder="Number_of_rows" onblur="Pages.settings.save()"/>
            <span class="form-hint">Auto-detected on load — re-load CSV after changing</span>
          </div>
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Table display</span></div>
        <div class="card" style="margin-bottom:20px">
          <div class="form-row">
            <label class="form-label">Sample rows shown</label>
            <input class="form-input" id="s-tableRows" type="number" min="5" max="200" value="${s.tableRows}" style="width:80px" onblur="Pages.settings.save()"/>
          </div>
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Chart defaults</span></div>
        <div class="card" style="margin-bottom:20px">
          <div class="form-row">
            <label class="form-label">Scatter sample size</label>
            <input class="form-input" id="s-sampleSize" type="number" min="100" max="50000" step="500" value="${s.sampleSize}" style="width:100px" onblur="Pages.settings.save()"/>
            <span class="form-hint">rows used for scatter plots</span>
          </div>
          <div class="form-row">
            <label class="form-label">Default scatter mode</label>
            <div class="toggle-group">
              <button class="toggle-btn ${s.pairplotMode==='sample'?'active':''}" onclick="State.settings.pairplotMode='sample';Storage.save();Pages.settings.render()">Sample</button>
              <button class="toggle-btn ${s.pairplotMode==='density'?'active':''}" onclick="State.settings.pairplotMode='density';Storage.save();Pages.settings.render()">Density</button>
            </div>
          </div>
        </div>

        <div class="section-head" style="margin-bottom:4px"><span class="section-title">Export</span></div>
        <div class="card">
          <div class="form-row">
            <label class="form-label">Filename prefix</label>
            <input class="form-input" id="s-exportPrefix" value="${s.exportPrefix}" onblur="Pages.settings.save()"/>
          </div>
          <div class="form-row">
            <label class="form-label">CSV delimiter</label>
            <select class="form-select" id="s-exportDelim" style="width:160px" onchange="Pages.settings.save()">
              <option value="," ${s.exportDelimiter===','?'selected':''}>Comma (,)</option>
              <option value=";" ${s.exportDelimiter===';'?'selected':''}>Semicolon (;)</option>
              <option value="	" ${s.exportDelimiter==='\t'?'selected':''}>Tab</option>
            </select>
          </div>
        </div>
      `;
    },
    save() {
      const g = id => document.getElementById(id);
      if (g('s-weightCol'))     State.settings.weightColumnName = g('s-weightCol').value.trim() || 'Number_of_rows';
      if (g('s-tableRows'))     State.settings.tableRows        = Math.max(5,Math.min(200,+g('s-tableRows').value||10));
      if (g('s-sampleSize'))    State.settings.sampleSize       = Math.max(100,Math.min(50000,+g('s-sampleSize').value||5000));
      if (g('s-exportPrefix'))  State.settings.exportPrefix     = g('s-exportPrefix').value.trim() || 'datalab';
      if (g('s-exportDelim'))   State.settings.exportDelimiter  = g('s-exportDelim').value;
      Storage.save();
      UI.toast('Settings saved');
    },
  },
};

// ════════════════════════════════════════════════════════════════════════════
// THEMES
// ════════════════════════════════════════════════════════════════════════════
const Themes = {
  apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    State.settings.theme = theme;
    Storage.save();
    const p = State.currentPage;
    if (p === 'explore')       setTimeout(() => Pages.explore.render(), 50);
    if (p === 'column-detail') setTimeout(() => Pages.columnDetail.render(), 50);
    if (p === 'transform')     setTimeout(() => Pages.transform.render(), 50);
    if (p === 'dashboard')     setTimeout(() => Pages.dashboard.render(), 50);
  },
};

// ════════════════════════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════════════════════════
const UI = {
  init() {
    Storage.load();
    Themes.apply(State.settings.theme);
    this._setupNav();
    this._setupSidebarToggle();
    this._setupDragDrop();
    this._setupFileInput();
    this.loadTitanic();
  },

  navigate(page, prevOverride) {
    State.prevPage    = prevOverride ?? State.currentPage;
    State.currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pid = page === 'column-detail' ? 'page-column-detail' : `page-${page}`;
    document.getElementById(pid)?.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    const map = {
      'overview':       () => Pages.overview.render(),
      'explore':        () => Pages.explore.render(),
      'column-detail':  () => Pages.columnDetail.render(),
      'transform':      () => Pages.transform.render(),
      'models':         () => Pages.models.render(),
      'dashboard':      () => Pages.dashboard.render(),
      'settings':       () => Pages.settings.render(),
    };
    map[page]?.();
  },

  openColumnDetail(col, from) {
    State.columnDetail = col;
    this.navigate('column-detail', from || State.currentPage);
  },

  loadCSV(text, name) {
    State.transforms = [];
    State._stepCounts = [];
    Charts._registry = [];
    Pages.overview._sortCol = null;
    Pages.overview._sortDir = 1;
    const ok = DataEngine.parseCSV(text, name);
    if (!ok) { this.toast('Could not parse CSV.'); return; }
    this.navigate('overview');
    this.toast(`Loaded ${name} — ${State.data.length.toLocaleString()} rows`);
  },

  loadTitanic() {
    if (State.transforms.length && !confirm(`Loading a new dataset will clear ${State.transforms.length} active transform step${State.transforms.length>1?'s':''}. Continue?`)) return;
    fetch('./titanic.csv')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => { this.loadCSV(text, 'titanic'); this.navigate('overview'); })
      .catch(() => { this.toast('Could not load titanic.csv'); this.navigate('overview'); });
  },

  triggerFileOpen() { document.getElementById('fileInput').click(); },

  _setupFileInput() {
    document.getElementById('fileInput').addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      e.target.value = '';
      if (State.transforms.length && !confirm(`Loading a new dataset will clear ${State.transforms.length} active transform step${State.transforms.length>1?'s':''}. Continue?`)) return;
      const r = new FileReader();
      r.onload = ev => this.loadCSV(ev.target.result, f.name.replace(/\.csv$/i,''));
      r.readAsText(f);
    });
  },

  _setupNav() {
    document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
      btn.addEventListener('click', () => this.navigate(btn.dataset.page));
    });
  },

  _setupSidebarToggle() {
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      document.getElementById('app').classList.toggle('collapsed');
    });
  },

  _setupDragDrop() {
    const ov = document.getElementById('dropOverlay');
    let depth = 0;
    document.addEventListener('dragenter', e => { e.preventDefault(); depth++; ov.classList.add('active'); });
    document.addEventListener('dragleave', () => { depth--; if (depth <= 0) { depth=0; ov.classList.remove('active'); } });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault(); depth=0; ov.classList.remove('active');
      const f = e.dataTransfer.files[0];
      if (!f || !f.name.match(/\.csv$/i)) { this.toast('Drop a .csv file.'); return; }
      if (State.transforms.length && !confirm(`Loading a new dataset will clear ${State.transforms.length} active transform step${State.transforms.length>1?'s':''}. Continue?`)) return;
      const r = new FileReader();
      r.onload = ev => this.loadCSV(ev.target.result, f.name.replace(/\.csv$/i,''));
      r.readAsText(f);
    });
  },

  toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(this._tt);
    this._tt = setTimeout(() => el.classList.remove('show'), 2800);
  },
};

document.addEventListener('DOMContentLoaded', () => UI.init());
</script>
</body>
</html>

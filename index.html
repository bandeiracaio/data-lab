<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Terminal</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg: #0d0f11;
  --bg2: #111316;
  --bg3: #161920;
  --border: #1e2229;
  --text: #c9d1d9;
  --dim: #586069;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --amber: #e3b341;
  --purple: #bc8cff;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  overflow: hidden;
}

.mono { font-family: var(--mono); }
.green { color: var(--green); }
.red { color: var(--red); }
.dim { color: var(--dim); }
.blue { color: var(--blue); }
.amber { color: var(--amber); }
.hidden { display: none !important; }

/* HEADER */
#header {
  height: 44px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 20px;
  flex-shrink: 0;
  user-select: none;
}

#mode-badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 7px;
  border-radius: 3px;
}
#mode-badge.live { background: #3d1a1a; color: var(--red); border: 1px solid #5a2020; }
#mode-badge.paper { background: #1a2a3d; color: var(--blue); border: 1px solid #1e3a5a; }
#mode-badge.unknown { background: #21262d; color: var(--dim); border: 1px solid var(--border); }

#ws-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
}
#ws-dot.connected { background: var(--green); }
#ws-dot.error { background: var(--red); }

.header-metric {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.header-metric-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.header-metric-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
}

#header-sep { flex: 1; }

#clock {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--dim);
}

#shortcuts-hint {
  font-size: 11px;
  color: var(--dim);
  padding: 3px 7px;
  background: var(--bg3);
  border-radius: 3px;
  border: 1px solid var(--border);
}

/* BODY */
#body {
  display: flex;
  height: calc(100vh - 44px - 130px);
}

/* WATCHLIST */
#watchlist-col {
  width: 180px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--dim);
  text-transform: uppercase;
  flex-shrink: 0;
}

.panel-header button {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 3px;
  width: 20px; height: 20px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.panel-header button:hover { color: var(--text); border-color: #444; }

#watchlist-items { overflow-y: auto; flex: 1; }

.wl-row {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.wl-row:hover, .wl-row.active { background: var(--bg3); }
.wl-row.active { border-left: 2px solid var(--blue); padding-left: 8px; }

.wl-symbol {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
}
.wl-price { font-family: var(--mono); font-size: 13px; font-weight: 600; }
.wl-row-top { display: flex; justify-content: space-between; align-items: baseline; }
.wl-meta { display: flex; justify-content: space-between; margin-top: 2px; }
.wl-change { font-family: var(--mono); font-size: 11px; }
.wl-spread { font-family: var(--mono); font-size: 10px; color: var(--dim); }

/* CHART */
#chart-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
}

#chart-toolbar {
  height: 36px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow: hidden;
}

#chart-symbol-info { display: flex; align-items: baseline; gap: 8px; min-width: 160px; }
#chart-symbol { font-family: var(--mono); font-size: 14px; font-weight: 700; }
#chart-last { font-family: var(--mono); font-size: 14px; font-weight: 600; }
#chart-change { font-family: var(--mono); font-size: 12px; }

#chart-ohlc {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  display: flex;
  gap: 8px;
  flex: 1;
}

#chart-tf-btns, #chart-ind-btns { display: flex; gap: 3px; }

.tf-btn, .ind-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 3px;
  padding: 2px 7px;
  font-size: 11px;
  cursor: pointer;
  font-family: var(--mono);
  white-space: nowrap;
}
.tf-btn:hover, .ind-btn:hover { color: var(--text); border-color: #444; }
.tf-btn.active { color: var(--blue); border-color: var(--blue); background: #0d1f3c; }
.ind-btn.active { color: var(--amber); border-color: #5a4a00; background: #2a2000; }

#chart-container { flex: 1; position: relative; overflow: hidden; }

/* RIGHT COLUMN */
#right-col {
  width: 340px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#positions-panel {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

#orders-panel {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

#positions-table, #orders-table { overflow-y: auto; flex: 1; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--dim);
  text-transform: uppercase;
  padding: 5px 8px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky; top: 0;
  background: var(--bg2);
}
.data-table th:first-child { text-align: left; }
.data-table td {
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 11px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.data-table td:first-child { text-align: left; font-weight: 600; }
.data-table tr:hover { background: var(--bg3); }

.tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 2px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.tag-buy, .tag-long { background: #0d2e0d; color: var(--green); }
.tag-sell, .tag-short { background: #2e0d0d; color: var(--red); }
.tag-open { background: #1a2a3d; color: var(--blue); }
.tag-filled { background: #1a2a1a; color: var(--green); }

.cancel-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 2px;
  padding: 1px 5px;
  font-size: 10px;
  cursor: pointer;
  font-family: var(--mono);
}
.cancel-btn:hover { color: var(--red); border-color: var(--red); }

/* ORDER ENTRY */
#order-entry-panel {
  flex-shrink: 0;
  background: var(--bg2);
}

#order-form {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.form-row { display: flex; align-items: center; gap: 6px; }
.form-label {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  width: 44px;
  flex-shrink: 0;
}

.side-toggle { display: flex; gap: 3px; flex: 1; }
.side-btn {
  flex: 1;
  padding: 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: none;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
}
.side-btn.buy { color: var(--green); border-color: #1a3a1a; }
.side-btn.buy.active { background: #0d2e0d; border-color: var(--green); }
.side-btn.sell { color: var(--red); border-color: #3a1a1a; }
.side-btn.sell.active { background: #2e0d0d; border-color: var(--red); }

.type-select, .form-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 5px 7px;
  outline: none;
  min-width: 0;
}
.type-select:focus, .form-input:focus { border-color: var(--blue); }

#order-preview {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  min-height: 16px;
}

#submit-order-btn {
  width: 100%;
  padding: 7px;
  border-radius: 3px;
  border: none;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
}
#submit-order-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#submit-order-btn.buy { background: var(--green); color: #000; }
#submit-order-btn.sell { background: var(--red); color: #fff; }

/* LOG */
#log-panel {
  height: 130px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

#log-entries { overflow-y: auto; flex: 1; padding: 2px 0; }

.log-entry {
  display: flex;
  gap: 10px;
  padding: 2px 12px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.7;
}
.log-entry:hover { background: var(--bg3); }
.log-time { color: var(--dim); flex-shrink: 0; }
.log-level { width: 48px; flex-shrink: 0; font-weight: 600; }
.log-level.INFO { color: var(--blue); }
.log-level.FILL { color: var(--green); }
.log-level.ERROR { color: var(--red); }
.log-level.WARN { color: var(--amber); }
.log-level.SIGNAL { color: var(--purple); }
.log-msg { color: var(--text); }

.empty-state {
  padding: 20px 12px;
  text-align: center;
  color: var(--dim);
  font-size: 12px;
}

/* RSI PANE */
#rsi-container {
  height: 80px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* STRATEGIES PANEL */
#strategies-panel {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.strategy-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
}
.strategy-row:last-child { border-bottom: none; }

.strategy-name {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  width: 80px;
  flex-shrink: 0;
}

.strategy-toggle-btn {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  cursor: pointer;
  letter-spacing: 0.04em;
  background: none;
  color: var(--dim);
  flex-shrink: 0;
}
.strategy-toggle-btn.on {
  background: #0d2e0d;
  color: var(--green);
  border-color: var(--green);
}
.strategy-toggle-btn:hover { border-color: #555; color: var(--text); }

.strategy-last-signal {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* RISK BADGE */
#risk-score {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 3px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--dim);
}
#risk-score.low { color: var(--green); border-color: #1a3a1a; }
#risk-score.mid { color: var(--amber); border-color: #3a3000; }
#risk-score.high { color: var(--red); border-color: #3a1a1a; }

/* CONNECTION OVERLAY */
#conn-overlay {
  position: fixed; inset: 0;
  background: rgba(13,15,17,0.94);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 10px;
}
#conn-overlay.hidden { display: none; }
#conn-msg { font-family: var(--mono); font-size: 13px; color: var(--text); }
#conn-sub { font-size: 11px; color: var(--dim); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2e36; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3e46; }
</style>
</head>
<body>

<div id="conn-overlay">
  <div style="width:10px;height:10px;border-radius:50%;background:var(--dim);"></div>
  <div id="conn-msg">Connecting to backend...</div>
  <div id="conn-sub">cd backend &amp;&amp; uvicorn main:app --port 8000</div>
</div>

<div id="header">
  <span id="mode-badge" class="unknown">--</span>
  <div id="ws-dot"></div>
  <div class="header-metric">
    <span class="header-metric-label">Equity</span>
    <span class="header-metric-value" id="h-equity">--</span>
  </div>
  <div class="header-metric">
    <span class="header-metric-label">Day P&amp;L</span>
    <span class="header-metric-value" id="h-daily-pnl">--</span>
  </div>
  <div class="header-metric">
    <span class="header-metric-label">Cash</span>
    <span class="header-metric-value" id="h-cash">--</span>
  </div>
  <div class="header-metric">
    <span class="header-metric-label">Buying Power</span>
    <span class="header-metric-value" id="h-bp">--</span>
  </div>
  <div id="header-sep"></div>
  <span id="risk-score">LIQ --</span>
  <span id="shortcuts-hint">B buy &nbsp; S sell</span>
  <span id="clock">--:--:--</span>
</div>

<div id="body">

  <div id="watchlist-col">
    <div class="panel-header">
      Watchlist
      <button id="wl-add-btn" title="Add symbol">+</button>
    </div>
    <div id="watchlist-items"></div>
  </div>

  <div id="chart-col">
    <div id="chart-toolbar">
      <div id="chart-symbol-info">
        <span id="chart-symbol">--</span>
        <span id="chart-last">--</span>
        <span id="chart-change"></span>
      </div>
      <div id="chart-ohlc">
        <span id="ohlc-o"></span>
        <span id="ohlc-h"></span>
        <span id="ohlc-l"></span>
        <span id="ohlc-c"></span>
        <span id="ohlc-v"></span>
      </div>
      <div id="chart-tf-btns">
        <button class="tf-btn active" data-tf="1Min">1m</button>
        <button class="tf-btn" data-tf="5Min">5m</button>
        <button class="tf-btn" data-tf="15Min">15m</button>
        <button class="tf-btn" data-tf="1Hour">1h</button>
        <button class="tf-btn" data-tf="1Day">1D</button>
      </div>
      <div id="chart-ind-btns">
        <button class="ind-btn active" data-ind="sma20">SMA20</button>
        <button class="ind-btn active" data-ind="sma50">SMA50</button>
        <button class="ind-btn" data-ind="bb">BB</button>
        <button class="ind-btn" data-ind="vwap">VWAP</button>
        <button class="ind-btn" data-ind="rsi">RSI</button>
      </div>
    </div>
    <div id="chart-container"></div>
    <div id="rsi-container" class="hidden"></div>
  </div>

  <div id="right-col">

    <div id="positions-panel">
      <div class="panel-header">Positions</div>
      <div id="positions-table"></div>
    </div>

    <div id="orders-panel">
      <div class="panel-header">Open Orders</div>
      <div id="orders-table"></div>
    </div>

    <div id="strategies-panel">
      <div class="panel-header">
        Strategies
        <span id="auto-badge" style="font-size:10px;text-transform:none;letter-spacing:0;color:var(--dim);">manual</span>
      </div>
      <div id="strategy-list"></div>
    </div>

    <div id="order-entry-panel">
      <div class="panel-header">
        Order Entry
        <span style="font-size:10px;text-transform:none;letter-spacing:0;color:var(--dim);">B / S to focus</span>
      </div>
      <form id="order-form" autocomplete="off">
        <div class="form-row">
          <span class="form-label">Side</span>
          <div class="side-toggle">
            <button type="button" class="side-btn buy active" id="side-buy">BUY</button>
            <button type="button" class="side-btn sell" id="side-sell">SELL</button>
          </div>
        </div>
        <div class="form-row">
          <span class="form-label">Symbol</span>
          <input type="text" class="form-input" id="order-symbol" placeholder="AAPL" style="text-transform:uppercase;">
        </div>
        <div class="form-row">
          <span class="form-label">Qty</span>
          <input type="number" class="form-input" id="order-qty" placeholder="100" min="1" step="1">
        </div>
        <div class="form-row">
          <span class="form-label">Type</span>
          <select class="type-select" id="order-type">
            <option value="market">Market</option>
            <option value="limit">Limit</option>
            <option value="stop">Stop</option>
            <option value="stop_limit">Stop Limit</option>
          </select>
        </div>
        <div class="form-row hidden" id="row-limit">
          <span class="form-label">Limit $</span>
          <input type="number" class="form-input" id="order-limit" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-row hidden" id="row-stop">
          <span class="form-label">Stop $</span>
          <input type="number" class="form-input" id="order-stop" placeholder="0.00" step="0.01" min="0">
        </div>
        <div id="order-preview">--</div>
        <button type="submit" id="submit-order-btn" class="buy">PLACE BUY ORDER</button>
      </form>
    </div>

  </div>
</div>

<div id="log-panel">
  <div class="panel-header">Log</div>
  <div id="log-entries"></div>
</div>

<script>
'use strict';

// ============================================================
// STATE
// ============================================================
const State = {
  mode: 'paper',
  account: {},
  positions: [],
  orders: [],
  watchlist: [],
  snapshots: {},
  quotes: {},
  strategies: [],
  activeSymbol: null,
  activeTf: '5Min',
  activeInds: new Set(['sma20', 'sma50']),
  connected: false,
};

// ============================================================
// FORMATTERS
// ============================================================
const F = {
  price(v, decimals = 2) {
    if (v == null || isNaN(v)) return '--';
    return Number(v).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  },
  dollar(v) {
    if (v == null || isNaN(v)) return '--';
    const n = Number(v);
    const abs = Math.abs(n);
    const s = abs >= 1e6 ? (abs / 1e6).toFixed(2) + 'M'
             : abs >= 1e3 ? (abs / 1e3).toFixed(1) + 'K'
             : abs.toFixed(2);
    return (n < 0 ? '-$' : '$') + s;
  },
  pnl(v) {
    if (v == null || isNaN(v)) return '--';
    const n = Number(v);
    return (n >= 0 ? '+' : '') + this.dollar(n);
  },
  pct(v) {
    if (v == null || isNaN(v)) return '--';
    const n = Number(v);
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  },
  vol(v) {
    if (v == null || isNaN(v)) return '--';
    const n = Number(v);
    return n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? (n / 1e3).toFixed(0) + 'K' : n.toFixed(0);
  },
  time() {
    const d = new Date();
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  },
};

// ============================================================
// INDICATORS
// ============================================================
const Indicators = {
  sma(bars, period) {
    const out = [];
    const closes = bars.map(b => b.close);
    for (let i = period - 1; i < bars.length; i++) {
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) sum += closes[j];
      out.push({ time: bars[i].time, value: sum / period });
    }
    return out;
  },

  rsi(bars, period = 14) {
    if (bars.length < period + 1) return [];
    const closes = bars.map(b => b.close);
    const deltas = closes.slice(1).map((c, i) => c - closes[i]);
    const gains = deltas.map(d => Math.max(d, 0));
    const losses = deltas.map(d => Math.max(-d, 0));
    let avgGain = gains.slice(0, period).reduce((a, b) => a + b, 0) / period;
    let avgLoss = losses.slice(0, period).reduce((a, b) => a + b, 0) / period;
    const val = (ag, al) => al === 0 ? 100 : 100 - 100 / (1 + ag / al);
    const out = [];
    for (let i = period; i < bars.length; i++) {
      if (i > period) {
        avgGain = (avgGain * (period - 1) + gains[i - 1]) / period;
        avgLoss = (avgLoss * (period - 1) + losses[i - 1]) / period;
      }
      out.push({ time: bars[i].time, value: val(avgGain, avgLoss) });
    }
    return out;
  },

  bollinger(bars, period = 20, nStd = 2) {
    if (bars.length < period) return { upper: [], lower: [] };
    const closes = bars.map(b => b.close);
    const upper = [], lower = [];
    for (let i = period - 1; i < bars.length; i++) {
      const window = closes.slice(i - period + 1, i + 1);
      const mean = window.reduce((a, b) => a + b, 0) / period;
      const std = Math.sqrt(window.reduce((s, v) => s + (v - mean) ** 2, 0) / period);
      upper.push({ time: bars[i].time, value: mean + nStd * std });
      lower.push({ time: bars[i].time, value: mean - nStd * std });
    }
    return { upper, lower };
  },

  vwap(bars) {
    const out = [];
    let cumPV = 0, cumVol = 0;
    for (const b of bars) {
      const typical = (b.high + b.low + b.close) / 3;
      cumPV += typical * b.volume;
      cumVol += b.volume;
      out.push({ time: b.time, value: cumVol > 0 ? cumPV / cumVol : typical });
    }
    return out;
  },
};

const Chart = (() => {
  let _chart = null;
  let _rsiChart = null;
  let _candle = null;
  let _vol = null;
  let _sma20 = null;
  let _sma50 = null;
  let _bbUpper = null;
  let _bbLower = null;
  let _vwap = null;
  let _rsiLine = null;
  let _bars = [];

  function init() {
    const el = document.getElementById('chart-container');

    _chart = LightweightCharts.createChart(el, {
      width: el.clientWidth,
      height: el.clientHeight,
      layout: {
        background: { color: '#0d0f11' },
        textColor: '#6e7681',
      },
      grid: {
        vertLines: { color: '#161a20' },
        horzLines: { color: '#161a20' },
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: { color: '#3a3e46', labelBackgroundColor: '#21262d' },
        horzLine: { color: '#3a3e46', labelBackgroundColor: '#21262d' },
      },
      rightPriceScale: {
        borderColor: '#1e2229',
        scaleMargins: { top: 0.08, bottom: 0.22 },
      },
      timeScale: {
        borderColor: '#1e2229',
        timeVisible: true,
        secondsVisible: false,
      },
    });

    _candle = _chart.addCandlestickSeries({
      upColor: '#3fb950',
      downColor: '#f85149',
      borderVisible: false,
      wickUpColor: '#3fb950',
      wickDownColor: '#f85149',
    });

    _vol = _chart.addHistogramSeries({
      priceFormat: { type: 'volume' },
      priceScaleId: 'vol',
    });
    _chart.priceScale('vol').applyOptions({
      scaleMargins: { top: 0.82, bottom: 0 },
    });

    _sma20 = _chart.addLineSeries({ color: '#e3b341', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    _sma50 = _chart.addLineSeries({ color: '#bc8cff', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
    _bbUpper = _chart.addLineSeries({ color: '#58a6ff55', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, lineStyle: LightweightCharts.LineStyle.Dotted });
    _bbLower = _chart.addLineSeries({ color: '#58a6ff55', lineWidth: 1, priceLineVisible: false, lastValueVisible: false, lineStyle: LightweightCharts.LineStyle.Dotted });
    _vwap = _chart.addLineSeries({
      color: '#58a6ff', lineWidth: 1, priceLineVisible: false, lastValueVisible: false,
      lineStyle: LightweightCharts.LineStyle.Dashed,
    });

    // RSI sub-chart (separate Lightweight Charts instance, synced time axis)
    const rsiEl = document.getElementById('rsi-container');
    _rsiChart = LightweightCharts.createChart(rsiEl, {
      width: rsiEl.clientWidth,
      height: 80,
      layout: { background: { color: '#0d0f11' }, textColor: '#6e7681' },
      grid: { vertLines: { color: '#161a20' }, horzLines: { color: '#161a20' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color: '#3a3e46', labelBackgroundColor: '#21262d' }, horzLine: { visible: false, labelVisible: false } },
      rightPriceScale: { borderColor: '#1e2229', scaleMargins: { top: 0.1, bottom: 0.1 } },
      timeScale: { borderColor: '#1e2229', visible: false },
      handleScroll: false,
      handleScale: false,
    });
    _rsiLine = _rsiChart.addLineSeries({ color: '#58a6ff', lineWidth: 1, priceLineVisible: false, lastValueVisible: true });
    _rsiLine.createPriceLine({ price: 70, color: '#f8514960', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true });
    _rsiLine.createPriceLine({ price: 50, color: '#6e768130', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: false });
    _rsiLine.createPriceLine({ price: 30, color: '#3fb95060', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true });

    // Sync RSI chart time axis with main chart
    _chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (range && _rsiChart) _rsiChart.timeScale().setVisibleLogicalRange(range);
    });

    _chart.subscribeCrosshairMove(p => {
      if (!p || !p.seriesData) return;
      const d = p.seriesData.get(_candle);
      if (d) _ohlc(d);
    });

    new ResizeObserver(() => {
      _chart.applyOptions({ width: el.clientWidth, height: el.clientHeight });
      const rsiEl2 = document.getElementById('rsi-container');
      if (_rsiChart) _rsiChart.applyOptions({ width: rsiEl2.clientWidth });
    }).observe(el);
  }

  async function load(symbol, tf) {
    _bars = [];
    _candle.setData([]);
    _vol.setData([]);
    _sma20.setData([]);
    _sma50.setData([]);
    _vwap.setData([]);
    _ohlc(null);

    Log.info('Loading ' + symbol + ' ' + tf + '...');
    try {
      const res = await API.bars(symbol, tf);
      _bars = res.bars || [];
      _render();
      Log.info(symbol + ' ' + tf + ': ' + _bars.length + ' bars');
    } catch (e) {
      Log.error('Chart load failed: ' + e.message);
    }
  }

  function update(msg) {
    if (msg.symbol !== State.activeSymbol) return;
    const b = { time: msg.time, open: msg.open, high: msg.high, low: msg.low, close: msg.close, volume: msg.volume };
    const last = _bars[_bars.length - 1];
    if (last && last.time === b.time) _bars[_bars.length - 1] = b;
    else _bars.push(b);
    _candle.update(b);
    _vol.update({ time: b.time, value: b.volume, color: b.close >= b.open ? '#1a3a1a' : '#3a1a1a' });
    _renderInds();
    _ohlc(b);
  }

  function _render() {
    _candle.setData(_bars.map(b => ({ time: b.time, open: b.open, high: b.high, low: b.low, close: b.close })));
    _vol.setData(_bars.map(b => ({ time: b.time, value: b.volume, color: b.close >= b.open ? '#1a3a1a' : '#3a1a1a' })));
    _renderInds();
    if (_bars.length) _ohlc(_bars[_bars.length - 1]);
  }

  function _renderInds() {
    _sma20.setData(State.activeInds.has('sma20') && _bars.length >= 20 ? Indicators.sma(_bars, 20) : []);
    _sma50.setData(State.activeInds.has('sma50') && _bars.length >= 50 ? Indicators.sma(_bars, 50) : []);
    _vwap.setData(State.activeInds.has('vwap') ? Indicators.vwap(_bars) : []);
    if (State.activeInds.has('bb') && _bars.length >= 20) {
      const { upper, lower } = Indicators.bollinger(_bars, 20, 2);
      _bbUpper.setData(upper);
      _bbLower.setData(lower);
    } else {
      _bbUpper.setData([]);
      _bbLower.setData([]);
    }
    if (State.activeInds.has('rsi') && _bars.length >= 15) {
      _rsiLine.setData(Indicators.rsi(_bars, 14));
    } else {
      _rsiLine.setData([]);
    }
  }

  function _ohlc(b) {
    document.getElementById('ohlc-o').textContent = b ? 'O ' + F.price(b.open) : '';
    document.getElementById('ohlc-h').textContent = b ? 'H ' + F.price(b.high) : '';
    document.getElementById('ohlc-l').textContent = b ? 'L ' + F.price(b.low) : '';
    document.getElementById('ohlc-c').textContent = b ? 'C ' + F.price(b.close) : '';
    document.getElementById('ohlc-v').textContent = b && b.volume != null ? 'V ' + F.vol(b.volume) : '';
  }

  function toggleInd(ind) {
    if (State.activeInds.has(ind)) State.activeInds.delete(ind);
    else State.activeInds.add(ind);
    // Show/hide RSI sub-chart
    const rsiEl = document.getElementById('rsi-container');
    rsiEl.classList.toggle('hidden', !State.activeInds.has('rsi'));
    if (State.activeInds.has('rsi') && _rsiChart) {
      _rsiChart.applyOptions({ width: rsiEl.clientWidth });
    }
    _renderInds();
  }

  return { init, load, update, toggleInd };
})();

const WS = (() => {
  let _ws = null;
  let _timer = null;
  let _delay = 1000;

  function connect() {
    if (_ws && _ws.readyState === WebSocket.OPEN) return;
    clearTimeout(_timer);
    _ws = new WebSocket('ws://localhost:8000/ws');

    _ws.onopen = () => {
      State.connected = true;
      _delay = 1000;
      _dot('connected');
      document.getElementById('conn-overlay').classList.add('hidden');
      Log.info('Connected');
    };

    _ws.onclose = () => {
      State.connected = false;
      _dot('');
      Log.warn('Disconnected — reconnecting in ' + (_delay / 1000).toFixed(0) + 's');
      _timer = setTimeout(connect, _delay);
      _delay = Math.min(_delay * 2, 30000);
    };

    _ws.onerror = () => _dot('error');

    _ws.onmessage = ev => {
      try { _dispatch(JSON.parse(ev.data)); } catch (_) {}
    };
  }

  function _dispatch(msg) {
    switch (msg.type) {
      case 'quote':
        State.quotes[msg.symbol] = { ...(State.quotes[msg.symbol] || {}), bid: msg.bid, ask: msg.ask };
        Watchlist.updateQuote(msg.symbol, msg.bid, msg.ask);
        break;

      case 'trade':
        if (!State.quotes[msg.symbol]) State.quotes[msg.symbol] = {};
        State.quotes[msg.symbol].last = msg.price;
        Watchlist.updateLast(msg.symbol, msg.price);
        if (msg.symbol === State.activeSymbol) {
          document.getElementById('chart-last').textContent = F.price(msg.price);
          Positions.updateLast(msg.symbol, msg.price);
        }
        break;

      case 'bar':
        if (!State.quotes[msg.symbol]) State.quotes[msg.symbol] = {};
        State.quotes[msg.symbol].last = msg.close;
        Watchlist.updateLast(msg.symbol, msg.close);
        if (msg.symbol === State.activeSymbol) {
          Chart.update(msg);
          document.getElementById('chart-last').textContent = F.price(msg.close);
        }
        break;

      case 'signal': {
        const skipped = msg.action && msg.action.startsWith('SKIPPED');
        const dir = msg.direction === 'exit' ? 'EXIT' : 'ENTRY';
        const conf = Math.round((msg.confidence || 0) * 100);
        const act = msg.action || '';
        Log.signal(`${msg.symbol} ${msg.strategy.toUpperCase()} ${dir} conf=${conf}% — ${act}`);
        Strategies.updateLastSignal(msg.strategy, msg);
        break;
      }

      case 'account':
        State.account = { ...State.account, ...msg.account };
        if (msg.risk_score != null) _updateRiskScore(msg.risk_score);
        Header.render();
        break;

      case 'order_update': {
        const o = msg.order;
        const ev = msg.event;
        if (ev === 'fill') {
          Log.fill('FILLED ' + o.side.toUpperCase() + ' ' + o.filled_qty + ' ' + o.symbol + ' @ $' + F.price(o.filled_avg));
          App.refreshState();
        } else if (ev === 'partial_fill') {
          Log.fill('PARTIAL ' + o.filled_qty + '/' + o.qty + ' ' + o.symbol + ' @ $' + F.price(o.filled_avg));
          App.refreshState();
        } else if (ev === 'canceled') {
          Log.info('CANCELED ' + o.symbol);
          App.refreshState();
        } else if (ev === 'new') {
          Log.info('ACCEPTED ' + o.side.toUpperCase() + ' ' + o.qty + ' ' + o.symbol);
          App.refreshState();
        }
        break;
      }

      case 'error':
        Log.error('[' + (msg.source || 'backend') + '] ' + msg.message);
        break;
    }
  }

  function _dot(cls) {
    const el = document.getElementById('ws-dot');
    el.className = cls;
  }

  return { connect };
})();

// API
// ============================================================
const API = {
  BASE: 'http://localhost:8000',

  async _fetch(method, path, body) {
    const opts = { method, headers: {} };
    if (body != null) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(this.BASE + path, opts);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  },

  state()              { return this._fetch('GET', '/state'); },
  bars(sym, tf, n=200) { return this._fetch('GET', `/bars/${sym}?timeframe=${tf}&limit=${n}`); },
  placeOrder(b)        { return this._fetch('POST', '/order', b); },
  cancelOrder(id)      { return this._fetch('DELETE', `/order/${id}`); },
  addSymbol(sym)       { return this._fetch('POST', `/watchlist/${sym}`, {}); },
  removeSymbol(sym)    { return this._fetch('DELETE', `/watchlist/${sym}`); },
};

const Watchlist = {
  render() {
    const c = document.getElementById('watchlist-items');
    c.innerHTML = '';
    for (const sym of State.watchlist) {
      const snap = State.snapshots[sym] || {};
      const q = State.quotes[sym] || {};
      const last = q.last ?? snap.last;
      const prev = snap.prev_close;
      const chgPct = (last && prev) ? (last - prev) / prev * 100 : null;
      const bid = q.bid ?? snap.bid;
      const ask = q.ask ?? snap.ask;
      const pnlCls = chgPct == null ? 'dim' : chgPct >= 0 ? 'green' : 'red';

      const row = document.createElement('div');
      row.className = 'wl-row' + (sym === State.activeSymbol ? ' active' : '');
      row.id = 'wl-row-' + sym;
      row.innerHTML =
        '<div class="wl-row-top">' +
          '<span class="wl-symbol">' + sym + '</span>' +
          '<span class="wl-price ' + pnlCls + '" id="wl-last-' + sym + '">' + (last ? F.price(last) : '--') + '</span>' +
        '</div>' +
        '<div class="wl-meta">' +
          '<span class="wl-change ' + pnlCls + '" id="wl-chg-' + sym + '">' + (chgPct != null ? F.pct(chgPct) : '--') + '</span>' +
          '<span class="wl-spread" id="wl-spread-' + sym + '">' + (bid && ask ? F.price(bid) + '/' + F.price(ask) : '--') + '</span>' +
        '</div>';
      row.addEventListener('click', () => App.selectSymbol(sym));
      c.appendChild(row);
    }
  },

  updateLast(sym, price) {
    const el = document.getElementById('wl-last-' + sym);
    if (!el) return;
    el.textContent = F.price(price);
    const snap = State.snapshots[sym] || {};
    const prev = snap.prev_close;
    if (prev) {
      const pct = (price - prev) / prev * 100;
      const cls = pct >= 0 ? 'green' : 'red';
      el.className = 'wl-price ' + cls;
      const chg = document.getElementById('wl-chg-' + sym);
      if (chg) { chg.textContent = F.pct(pct); chg.className = 'wl-change ' + cls; }
    }
  },

  updateQuote(sym, bid, ask) {
    const el = document.getElementById('wl-spread-' + sym);
    if (el && bid && ask) el.textContent = F.price(bid) + '/' + F.price(ask);
  },

  setActive(sym) {
    document.querySelectorAll('.wl-row').forEach(r => r.classList.remove('active'));
    const row = document.getElementById('wl-row-' + sym);
    if (row) row.classList.add('active');
  },
};

const Positions = {
  render() {
    const c = document.getElementById('positions-table');
    if (!State.positions.length) {
      c.innerHTML = '<div class="empty-state">No open positions</div>';
      return;
    }
    let h = '<table class="data-table"><thead><tr><th>Symbol</th><th>Qty</th><th>Entry</th><th>Last</th><th>P&amp;L</th></tr></thead><tbody>';
    for (const p of State.positions) {
      const pCls = p.unrealized_pnl >= 0 ? 'green' : 'red';
      h += '<tr>' +
        '<td><span class="tag tag-' + p.side + '">' + p.symbol + '</span></td>' +
        '<td>' + F.price(Math.abs(p.qty), 0) + '</td>' +
        '<td>$' + F.price(p.avg_entry) + '</td>' +
        '<td id="pos-last-' + p.symbol + '">$' + F.price(p.current_price) + '</td>' +
        '<td class="' + pCls + '" id="pos-pnl-' + p.symbol + '">' + F.pnl(p.unrealized_pnl) + '<br>' +
          '<span style="font-size:10px;opacity:0.7;">' + F.pct(p.unrealized_pnl_pct) + '</span></td>' +
        '</tr>';
    }
    h += '</tbody></table>';
    c.innerHTML = h;
  },

  updateLast(sym, price) {
    const pos = State.positions.find(p => p.symbol === sym);
    if (!pos) return;
    pos.current_price = price;
    const qty = Math.abs(pos.qty);
    const mult = pos.side === 'long' ? 1 : -1;
    pos.unrealized_pnl = qty * (price - pos.avg_entry) * mult;
    pos.unrealized_pnl_pct = pos.unrealized_pnl / (qty * pos.avg_entry) * 100;

    const lEl = document.getElementById('pos-last-' + sym);
    const pEl = document.getElementById('pos-pnl-' + sym);
    if (lEl) lEl.textContent = '$' + F.price(price);
    if (pEl) {
      pEl.className = pos.unrealized_pnl >= 0 ? 'green' : 'red';
      pEl.innerHTML = F.pnl(pos.unrealized_pnl) + '<br><span style="font-size:10px;opacity:0.7;">' + F.pct(pos.unrealized_pnl_pct) + '</span>';
    }
  },
};

const OrderEntry = (() => {
  let _side = 'buy';

  function init() {
    document.getElementById('side-buy').addEventListener('click', () => _setSide('buy'));
    document.getElementById('side-sell').addEventListener('click', () => _setSide('sell'));
    document.getElementById('order-type').addEventListener('change', _updatePriceFields);
    ['order-symbol', 'order-qty', 'order-limit'].forEach(id => {
      document.getElementById(id).addEventListener('input', _updatePreview);
    });
    document.getElementById('order-form').addEventListener('submit', async e => {
      e.preventDefault();
      await _submit();
    });
  }

  function _setSide(side) {
    _side = side;
    document.getElementById('side-buy').classList.toggle('active', side === 'buy');
    document.getElementById('side-sell').classList.toggle('active', side === 'sell');
    const btn = document.getElementById('submit-order-btn');
    btn.className = side;
    btn.textContent = 'PLACE ' + side.toUpperCase() + ' ORDER';
    _updatePreview();
  }

  function focus(side) {
    _setSide(side);
    document.getElementById('order-symbol').value = State.activeSymbol || '';
    document.getElementById('order-symbol').focus();
    _updatePreview();
  }

  function _updatePriceFields() {
    const t = document.getElementById('order-type').value;
    document.getElementById('row-limit').classList.toggle('hidden', t !== 'limit' && t !== 'stop_limit');
    document.getElementById('row-stop').classList.toggle('hidden', t !== 'stop' && t !== 'stop_limit');
    _updatePreview();
  }

  function _updatePreview() {
    const sym = (document.getElementById('order-symbol').value || '').toUpperCase();
    const qty = parseFloat(document.getElementById('order-qty').value) || 0;
    const type = document.getElementById('order-type').value;
    const limit = parseFloat(document.getElementById('order-limit').value) || 0;
    const q = State.quotes[sym] || State.snapshots[sym] || {};
    const last = q.last || 0;
    const ref = (type === 'market') ? last : limit;
    const est = ref * qty;
    const bp = State.account.buying_power || 0;

    const el = document.getElementById('order-preview');
    if (qty > 0 && ref > 0) {
      const pct = bp > 0 ? (est / bp * 100).toFixed(1) + '% BP' : '';
      el.innerHTML = 'Est <span class="blue">$' + F.price(est) + '</span>&nbsp;&nbsp;' + pct;
    } else {
      el.textContent = '--';
    }
  }

  async function _submit() {
    const sym = (document.getElementById('order-symbol').value || '').toUpperCase();
    const qty = parseFloat(document.getElementById('order-qty').value);
    const type = document.getElementById('order-type').value;
    const limit = parseFloat(document.getElementById('order-limit').value) || null;
    const stop = parseFloat(document.getElementById('order-stop').value) || null;

    if (!sym || !qty || qty <= 0) return;

    if (State.mode === 'live') {
      if (!confirm('LIVE ORDER: ' + _side.toUpperCase() + ' ' + qty + ' ' + sym + '\nThis uses REAL money. Confirm?')) return;
    }

    const btn = document.getElementById('submit-order-btn');
    btn.disabled = true;
    btn.textContent = 'SUBMITTING...';

    try {
      const res = await API.placeOrder({ symbol: sym, side: _side, qty, type, limit_price: limit, stop_price: stop });
      if (res.ok) {
        Log.info('ORDER ' + _side.toUpperCase() + ' ' + qty + ' ' + sym + ' ' + type);
        document.getElementById('order-qty').value = '';
        App.refreshState();
      } else {
        Log.error('Order rejected: ' + res.error);
      }
    } catch (e) {
      Log.error('Order error: ' + e.message);
    } finally {
      btn.disabled = false;
      _setSide(_side);
    }
  }

  return { init, focus };
})();

// ============================================================
// LOG
// ============================================================
const Log = {
  _add(level, msg) {
    const c = document.getElementById('log-entries');
    const row = document.createElement('div');
    row.className = 'log-entry';
    row.innerHTML = '<span class="log-time">' + F.time() + '</span><span class="log-level ' + level + '">' + level + '</span><span class="log-msg">' + msg + '</span>';
    c.insertBefore(row, c.firstChild);
    while (c.children.length > 300) c.removeChild(c.lastChild);
  },
  info(m)   { this._add('INFO', m); },
  fill(m)   { this._add('FILL', m); },
  error(m)  { this._add('ERROR', m); },
  warn(m)   { this._add('WARN', m); },
  signal(m) { this._add('SIGNAL', m); },
};

// ============================================================
// RISK SCORE
// ============================================================
function _updateRiskScore(score) {
  const el = document.getElementById('risk-score');
  if (!el) return;
  el.textContent = 'LIQ ' + score.toFixed(1);
  el.className = score < 3 ? 'low' : score < 6 ? 'mid' : 'high';
}

// ============================================================
// STRATEGIES
// ============================================================
const Strategies = {
  _data: [],

  render(strategies) {
    this._data = strategies || [];
    const c = document.getElementById('strategy-list');
    if (!this._data.length) {
      c.innerHTML = '<div class="empty-state">No strategies configured</div>';
      return;
    }
    c.innerHTML = '';
    for (const s of this._data) {
      const row = document.createElement('div');
      row.className = 'strategy-row';
      const lastSig = s.last_signal;
      const sigText = lastSig
        ? `${lastSig.symbol} ${lastSig.direction.toUpperCase()} ${Math.round(lastSig.confidence * 100)}% — ${lastSig.action}`
        : 'no signals yet';
      row.innerHTML =
        '<span class="strategy-name">' + s.name.toUpperCase() + '</span>' +
        '<button class="strategy-toggle-btn' + (s.enabled ? ' on' : '') + '" data-name="' + s.name + '">' +
          (s.enabled ? 'ON' : 'OFF') +
        '</button>' +
        '<span class="strategy-last-signal' + (s.enabled ? '' : ' dim') + '" id="strat-last-' + s.name + '">' + sigText + '</span>';
      c.appendChild(row);
    }
    const anyOn = this._data.some(s => s.enabled);
    document.getElementById('auto-badge').textContent = anyOn ? 'AUTO ON' : 'manual';
    document.getElementById('auto-badge').style.color = anyOn ? 'var(--green)' : 'var(--dim)';

    c.querySelectorAll('.strategy-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => this._toggle(btn.dataset.name, btn.classList.contains('on')));
    });
  },

  async _toggle(name, currentlyOn) {
    try {
      const endpoint = currentlyOn ? 'disable' : 'enable';
      const res = await API._fetch('POST', `/strategies/${name}/${endpoint}`);
      if (res.ok) {
        State.strategies = res.strategies;
        this.render(res.strategies);
        Log.info(`Strategy ${name} ${currentlyOn ? 'disabled' : 'enabled'}`);
      }
    } catch (e) {
      Log.error('Strategy toggle failed: ' + e.message);
    }
  },

  updateLastSignal(name, sig) {
    const el = document.getElementById('strat-last-' + name);
    if (!el) return;
    const text = `${sig.symbol} ${sig.direction.toUpperCase()} ${Math.round(sig.confidence * 100)}% — ${sig.action}`;
    el.textContent = text;
    el.style.color = sig.action && sig.action.startsWith('SKIPPED') ? 'var(--dim)' : 'var(--purple)';
  },
};

// ============================================================
// APP
// ============================================================
const App = {
  async init() {
    Chart.init();
    OrderEntry.init();
    WS.connect();

    Header.tick();
    setInterval(() => Header.tick(), 1000);
    setInterval(() => this.refreshState(), 10000);

    await this.loadState();

    if (State.watchlist.length > 0) await this.selectSymbol(State.watchlist[0]);

    document.addEventListener('keydown', e => {
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
      if (e.key === 'b' || e.key === 'B') OrderEntry.focus('buy');
      if (e.key === 's' || e.key === 'S') OrderEntry.focus('sell');
    });

    document.querySelectorAll('.tf-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        State.activeTf = btn.dataset.tf;
        if (State.activeSymbol) await Chart.load(State.activeSymbol, State.activeTf);
      });
    });

    document.querySelectorAll('.ind-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        Chart.toggleInd(btn.dataset.ind);
      });
    });

    document.getElementById('wl-add-btn').addEventListener('click', async () => {
      const sym = prompt('Symbol to add:');
      if (!sym) return;
      const s = sym.toUpperCase().trim();
      try {
        const res = await API.addSymbol(s);
        State.watchlist = res.watchlist;
        Watchlist.render();
        Log.info('Added ' + s);
      } catch (e) {
        Log.error('Could not add ' + s + ': ' + e.message);
      }
    });
  },

  async loadState() {
    try {
      const data = await API.state();
      State.mode = data.mode;
      State.account = data.account || {};
      State.positions = data.positions || [];
      State.orders = data.orders || [];
      State.watchlist = data.watchlist || [];
      State.snapshots = data.snapshots || {};
      State.strategies = data.strategies || [];
      if (data.risk_score != null) _updateRiskScore(data.risk_score);
      Header.render();
      Watchlist.render();
      Positions.render();
      Orders.render();
      Strategies.render(State.strategies);
    } catch (e) {
      Log.error('State load: ' + e.message);
    }
  },

  async refreshState() {
    try {
      const data = await API.state();
      State.mode = data.mode;
      State.account = data.account || {};
      State.positions = data.positions || [];
      State.orders = data.orders || [];
      State.strategies = data.strategies || [];
      if (data.snapshots) Object.assign(State.snapshots, data.snapshots);
      if (data.risk_score != null) _updateRiskScore(data.risk_score);
      Header.render();
      Positions.render();
      Orders.render();
      Strategies.render(State.strategies);
    } catch (_) {}
  },

  async selectSymbol(sym) {
    State.activeSymbol = sym;
    document.getElementById('chart-symbol').textContent = sym;
    document.getElementById('chart-last').textContent = '--';
    document.getElementById('chart-change').textContent = '';
    document.getElementById('chart-change').className = '';
    document.getElementById('order-symbol').value = sym;

    const snap = State.snapshots[sym] || {};
    const q = State.quotes[sym] || {};
    const last = q.last ?? snap.last;
    const prev = snap.prev_close;
    if (last) {
      document.getElementById('chart-last').textContent = F.price(last);
      if (prev) {
        const pct = (last - prev) / prev * 100;
        const el = document.getElementById('chart-change');
        el.textContent = F.pct(pct);
        el.className = pct >= 0 ? 'green' : 'red';
      }
    }

    Watchlist.setActive(sym);
    await Chart.load(sym, State.activeTf);
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
